<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나중에 볼래요 | CineMatch</title>
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <style>
        :root {
            --bg: #F8F9FA;
            --surface: #FFFFFF;
            --blue: #3182F6;
            --blue-light: #EBF3FE;
            --text: #191F28;
            --text-2: #4E5968;
            --text-3: #8B95A1;
            --border: #E5E8EB;
            --radius: 16px;
            --radius-sm: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* Navbar */
        .nav {
            position: sticky; top: 0; z-index: 200;
            height: 56px; background: rgba(255,255,255,0.95);
            backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 24px; gap: 0;
        }
        .nav-left { display:flex;align-items:center;gap:16px;flex:1; }
        .back-btn {
            display:flex;align-items:center;gap:5px;text-decoration:none;
            color:var(--text-3);font-size:14px;font-weight:700;transition:color .12s;
        }
        .back-btn:hover { color:var(--text); }
        .back-btn svg { width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.4;stroke-linecap:round; }
        .nav-logo { display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text);font-size:15px;font-weight:800;letter-spacing:-0.03em; }
        .nav-logo-mark { width:28px;height:28px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center; }
        .nav-logo-mark svg { width:14px;height:14px;fill:white; }
        .nav-right { display:flex;align-items:center;gap:8px; }
        .nav-user { display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;background:var(--bg);border:1px solid var(--border);text-decoration:none;font-size:13px;font-weight:700;color:var(--text-2); }
        .nav-user svg { width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.2; }
        .nav-logout { height:34px;padding:0 16px;background:var(--text);color:white;border-radius:999px;font-size:13px;font-weight:700;text-decoration:none;display:flex;align-items:center; }
        .nav-logout:hover { opacity:.85; }

        /* Page */
        .page { max-width: 1100px; margin: 0 auto; padding: 28px 24px 80px; }

        /* 페이지 헤더 */
        .page-header {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 22px 26px;
            margin-bottom: 20px;
            display: flex; align-items: center; justify-content: space-between; gap: 16px;
        }
        .header-left h1 { font-size: 22px; font-weight: 900; color: var(--text); letter-spacing: -0.04em; margin-bottom: 4px; }
        .header-left p { font-size: 13px; color: var(--text-3); line-height: 1.6; }
        .header-count {
            font-size: 32px; font-weight: 900; color: var(--text);
            letter-spacing: -0.04em; line-height: 1;
        }
        .header-count-label { font-size: 12px; color: var(--text-3); text-align: right; margin-top: 3px; }

        /* 영화 그리드 */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 14px;
        }
        .movie-card {
            display: block; text-decoration: none; color: inherit;
        }
        .poster-box {
            aspect-ratio: 2/3; border-radius: var(--radius-sm);
            overflow: hidden; background: var(--border);
            border: 1px solid var(--border); position: relative;
            transition: transform .18s ease, box-shadow .18s ease;
        }
        .movie-card:hover .poster-box {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.1);
        }
        .poster-box img { width:100%;height:100%;object-fit:cover;display:block; }
        .poster-fallback {
            width:100%;height:100%;display:flex;align-items:center;justify-content:center;
            text-align:center;padding:12px;
            background:linear-gradient(135deg,var(--blue-light),#dbeafe);
            color:var(--blue);font-size:12px;font-weight:700;
        }
        .poster-overlay {
            position:absolute;inset:0;
            background:linear-gradient(to top,rgba(0,0,0,0.45),transparent 50%);
            opacity:0;transition:opacity .18s;
            display:flex;align-items:flex-end;padding:10px;
        }
        .movie-card:hover .poster-overlay { opacity:1; }
        .overlay-txt { font-size:11px;font-weight:800;color:white;background:rgba(0,0,0,0.4);padding:3px 8px;border-radius:999px; }
        .card-info { padding: 8px 2px 0; }
        .card-title { font-size:13px;font-weight:800;color:var(--text);line-height:1.4;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
        .card-sub { font-size:11px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }

        /* 빈 상태 */
        .empty-state {
            padding: 56px 24px; text-align: center;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-3); font-size: 14px; line-height: 1.9;
        }
        .empty-state a { color: var(--blue); text-decoration: none; font-weight: 700; }
        .empty-state a:hover { text-decoration: underline; }

        @media (max-width: 640px) {
            .nav { padding: 0 16px; }
            .page { padding: 20px 16px 60px; }
            .movie-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .page-header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
<nav class="nav">
    <div class="nav-left">
        <a class="back-btn" th:href="@{/mypage}">
            <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
            마이페이지
        </a>
        <a class="nav-logo" th:href="@{/charts}">
            <div class="nav-logo-mark">
                <svg viewBox="0 0 16 16"><path d="M2 2h3v3H2zm0 4.5h3v3H2zm0 4.5h3v3H2zM6.5 2h3v3h-3zm0 4.5h3v3h-3zm0 4.5h3v3h-3zM11 2h3v3h-3zm0 4.5h3v3H11zm0 4.5h3v3H11z"/></svg>
            </div>
            CineMatch
        </a>
    </div>
    <div class="nav-right">
        <a class="nav-user" th:href="@{/mypage}">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            <span th:text="${loginUserNickname}">nickname</span>
        </a>
        <a class="nav-logout" th:href="@{/logout}">로그아웃</a>
    </div>
</nav>

<main class="page">
    <!-- 헤더 -->
    <div class="page-header">
        <div class="header-left">
            <h1>나중에 볼래요</h1>
            <p th:text="|${loginUserNickname}님이 저장해둔 영화 목록이에요|">저장 목록</p>
        </div>
        <div>
            <div class="header-count" th:text="${laterMovies.size()}">0</div>
            <div class="header-count-label">편 저장됨</div>
        </div>
    </div>

    <!-- 영화 목록 -->
    <div class="movie-grid" th:if="${!#lists.isEmpty(laterMovies)}">
        <a class="movie-card" th:each="movie : ${laterMovies}" th:href="@{|/movies/${movie.movieCode}|}">
            <div class="poster-box">
                <img th:if="${!#strings.isEmpty(movie.posterImageUrl)}"
                     th:src="${movie.posterImageUrl}" th:alt="${movie.movieName}">
                <div class="poster-fallback" th:if="${#strings.isEmpty(movie.posterImageUrl)}">
                    <span th:text="${movie.movieName}">제목</span>
                </div>
                <div class="poster-overlay"><span class="overlay-txt">상세보기</span></div>
            </div>
            <div class="card-info">
                <div class="card-title" th:text="${movie.movieName}">제목</div>
                <div class="card-sub" th:text="${#strings.isEmpty(movie.movieNameEn)?movie.movieCode:movie.movieNameEn}">sub</div>
            </div>
        </a>
    </div>

    <!-- 빈 상태 -->
    <div class="empty-state" th:if="${#lists.isEmpty(laterMovies)}">
        아직 저장한 영화가 없어요.<br>
        영화 상세 페이지에서 <strong>나중에 볼래요</strong> 버튼을 눌러보세요.<br><br>
        <a th:href="@{/charts}">영화 둘러보러 가기 →</a>
    </div>
</main>
</body>
</html>
