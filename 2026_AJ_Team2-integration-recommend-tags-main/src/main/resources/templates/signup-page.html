<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 — CineMatch</title>
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <style>
        :root {
            --bg: #F8F9FA;
            --surface: #FFFFFF;
            --blue: #3182F6;
            --blue-hover: #1B64DA;
            --blue-light: #EBF3FE;
            --text: #191F28;
            --text-2: #4E5968;
            --text-3: #8B95A1;
            --border: #E5E8EB;
            --error: #F04452;
            --error-bg: #FFF0F2;
            --radius: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
        }
        .wrap { width: 100%; max-width: 420px; }

        /* 로고 */
        .logo {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 36px;
        }
        .logo-mark {
            width: 36px; height: 36px; background: var(--blue);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .logo-mark svg { width: 18px; height: 18px; fill: white; }
        .logo-name { font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -0.03em; }

        /* 타이틀 */
        .title-area { margin-bottom: 28px; }
        .title-area h1 {
            font-size: 26px; font-weight: 900; color: var(--text);
            letter-spacing: -0.04em; line-height: 1.2; margin-bottom: 6px;
        }
        .title-area p { font-size: 14px; color: var(--text-3); line-height: 1.6; }

        /* 에러 */
        .error-box {
            display: flex; align-items: center; gap: 8px;
            padding: 13px 16px; background: var(--error-bg);
            border-radius: var(--radius); margin-bottom: 18px;
            font-size: 14px; color: var(--error); font-weight: 600;
        }
        .error-box svg { width: 16px; height: 16px; flex-shrink: 0; }

        /* 폼 */
        .form-group { margin-bottom: 14px; }
        .form-label {
            display: block; font-size: 13px; font-weight: 700;
            color: var(--text-2); margin-bottom: 6px;
        }
        .form-input {
            width: 100%; height: 50px; padding: 0 16px;
            border: 1.5px solid var(--border); border-radius: var(--radius);
            background: var(--surface); font-family: inherit;
            font-size: 15px; color: var(--text); outline: none;
            transition: border-color .15s;
        }
        .form-input:focus { border-color: var(--blue); }
        .form-input::placeholder { color: var(--text-3); }

        /* 성별 선택 */
        .gender-group { display: flex; gap: 8px; }
        .gender-opt { flex: 1; position: relative; }
        .gender-opt input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
        .gender-opt label {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            height: 50px; border: 1.5px solid var(--border);
            border-radius: var(--radius); background: var(--surface);
            cursor: pointer; font-size: 14px; font-weight: 700;
            color: var(--text-2); transition: all .15s; margin: 0;
        }
        .gender-opt label svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
        .gender-opt input:checked + label {
            border-color: var(--blue); background: var(--blue-light); color: var(--blue);
        }
        .gender-opt label:hover { border-color: var(--blue); }

        /* 버튼 */
        .btn-primary {
            width: 100%; height: 52px;
            background: var(--blue); color: white;
            border: none; border-radius: var(--radius);
            font-family: inherit; font-size: 15px; font-weight: 700;
            cursor: pointer; margin-top: 8px;
            transition: background .15s, transform .1s;
        }
        .btn-primary:hover { background: var(--blue-hover); }
        .btn-primary:active { transform: scale(0.98); }

        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 18px 0;
        }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .divider span { font-size: 12px; color: var(--text-3); font-weight: 600; }

        .btn-secondary {
            display: flex; align-items: center; justify-content: center;
            width: 100%; height: 50px;
            background: var(--surface); color: var(--text-2);
            border: 1.5px solid var(--border); border-radius: var(--radius);
            font-family: inherit; font-size: 15px; font-weight: 700;
            text-decoration: none;
            transition: border-color .15s, color .15s;
        }
        .btn-secondary:hover { border-color: var(--blue); color: var(--blue); }

        /* 안내 */
        .info-box {
            margin-top: 20px; padding: 14px 16px;
            background: var(--blue-light); border-radius: var(--radius);
            font-size: 13px; color: var(--blue); line-height: 1.7;
        }
        .foot {
            margin-top: 24px; text-align: center;
            font-size: 12px; color: var(--text-3); line-height: 1.7;
        }
        .foot a { color: var(--text-3); text-decoration: underline; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="logo">
        <div class="logo-mark">
            <svg viewBox="0 0 16 16"><path d="M2 2h3v3H2zm0 4.5h3v3H2zm0 4.5h3v3H2zM6.5 2h3v3h-3zm0 4.5h3v3h-3zm0 4.5h3v3h-3zM11 2h3v3h-3zm0 4.5h3v3H11zm0 4.5h3v3H11z"/></svg>
        </div>
        <span class="logo-name">CineMatch</span>
    </div>

    <div class="title-area">
        <h1>계정 만들기</h1>
        <p>가입하면 나만의 영화 취향을 분석해 추천해드려요</p>
    </div>

    <div class="error-box" th:if="${signupError}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
        </svg>
        <span th:text="${signupError}">오류</span>
    </div>

    <form th:action="@{/signup}" method="post">
        <div class="form-group">
            <label class="form-label" for="id">아이디</label>
            <input class="form-input" id="id" name="id" type="text"
                   placeholder="사용할 아이디 입력" required autocomplete="username">
        </div>
        <div class="form-group">
            <label class="form-label" for="pw">비밀번호</label>
            <input class="form-input" id="pw" name="pw" type="password"
                   placeholder="비밀번호 입력" required autocomplete="new-password">
        </div>
        <div class="form-group">
            <label class="form-label" for="nickname">닉네임</label>
            <input class="form-input" id="nickname" name="nickname" type="text"
                   placeholder="닉네임 입력" required maxlength="100" autocomplete="nickname">
        </div>
        <div class="form-group">
            <label class="form-label">성별</label>
            <div class="gender-group">
                <div class="gender-opt">
                    <input id="male" name="gender" type="radio" value="MALE" required>
                    <label for="male">
                        <svg viewBox="0 0 24 24"><circle cx="10" cy="14" r="5"/><path d="M19 5l-5.5 5.5M19 5h-4M19 5v4"/></svg>
                        남성
                    </label>
                </div>
                <div class="gender-opt">
                    <input id="female" name="gender" type="radio" value="FEMALE">
                    <label for="female">
                        <svg viewBox="0 0 24 24"><circle cx="12" cy="9" r="5"/><path d="M12 14v6M9 17h6"/></svg>
                        여성
                    </label>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label" for="age">나이</label>
            <input class="form-input" id="age" name="age" type="number"
                   min="1" max="120" placeholder="나이 입력" required>
        </div>

        <button class="btn-primary" type="submit">가입 완료</button>
    </form>

    <div class="divider"><span>이미 계정이 있나요?</span></div>
    <a class="btn-secondary" th:href="@{/login}">로그인으로 돌아가기</a>

    <div class="info-box">
        가입 정보는 영화 추천 알고리즘에 활용됩니다.<br>
        취향·성별·나이를 기반으로 맞춤 추천을 제공해요.
    </div>

    <p class="foot">
        가입하면 <a href="#">이용약관</a>과 <a href="#">개인정보처리방침</a>에 동의하게 됩니다
    </p>
</div>
</body>
</html>
