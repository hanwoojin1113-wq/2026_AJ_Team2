<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${algorithm.title()} + ' | CineMatch'">랭킹 | CineMatch</title>
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <style>
        :root {
            --bg:#F8F9FA;--surface:#FFFFFF;--blue:#3182F6;--blue-hover:#1B64DA;--blue-light:#EBF3FE;
            --text:#191F28;--text-2:#4E5968;--text-3:#8B95A1;--border:#E5E8EB;--radius:16px;--radius-sm:12px;
        }
        * { box-sizing:border-box;margin:0;padding:0; }
        body { font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);min-height:100vh; }

        /* Navbar */
        .nav { position:sticky;top:0;z-index:200;height:56px;background:rgba(255,255,255,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:0; }
        .nav-left { display:flex;align-items:center;gap:16px;flex:1; }
        .back-btn { display:flex;align-items:center;gap:5px;text-decoration:none;color:var(--text-3);font-size:14px;font-weight:700;transition:color .12s; }
        .back-btn:hover { color:var(--text); }
        .back-btn svg { width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.4;stroke-linecap:round; }
        .nav-logo { display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text);font-size:15px;font-weight:800;letter-spacing:-0.03em; }
        .nav-logo-mark { width:28px;height:28px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center; }
        .nav-logo-mark svg { width:14px;height:14px;fill:white; }
        .nav-right { display:flex;align-items:center;gap:8px; }
        .nav-user { display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;background:var(--bg);border:1px solid var(--border);text-decoration:none;font-size:13px;font-weight:700;color:var(--text-2); }
        .nav-user svg { width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.2; }
        .nav-logout { height:34px;padding:0 16px;background:var(--text);color:white;border-radius:999px;font-size:13px;font-weight:700;text-decoration:none;display:flex;align-items:center; }

        .page { max-width:960px;margin:0 auto;padding:28px 24px 80px; }

        /* 페이지 헤더 */
        .page-header {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px 28px;
            margin-bottom: 16px;
            display: flex; justify-content: space-between; align-items: flex-start;
            gap: 16px;
        }
        .header-left { flex: 1; min-width: 0; }
        .header-cat {
            display: inline-flex; align-items: center;
            padding: 4px 10px; border-radius: 999px;
            font-size: 11px; font-weight: 800;
            background: var(--blue-light); color: var(--blue);
            margin-bottom: 10px;
        }
        .header-title {
            font-size: 22px; font-weight: 900; letter-spacing: -0.04em;
            color: var(--text); margin-bottom: 6px;
        }
        .header-desc { font-size: 14px; color: var(--text-3); line-height: 1.6; }
        .header-meta {
            display: flex; align-items: center; gap: 16px; margin-top: 14px;
        }
        .meta-item { font-size: 12px; color: var(--text-3); }
        .meta-item strong { color: var(--text-2); font-weight: 800; }
        .header-right { flex-shrink: 0; text-align: right; }
        .rank-count-display {
            font-size: 36px; font-weight: 900; letter-spacing: -0.04em; color: var(--text);
            line-height: 1;
        }
        .rank-count-label { font-size: 12px; color: var(--text-3); margin-top: 4px; }

        /* 순위 리스트 */
        .rank-list { display:flex;flex-direction:column;gap:8px;margin-bottom:32px; }
        .rank-item {
            display: grid;
            grid-template-columns: 40px 64px 1fr auto;
            align-items: center; gap: 14px;
            padding: 14px 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            text-decoration: none; color: inherit;
            transition: border-color .12s, box-shadow .12s, transform .12s;
        }
        .rank-item:hover {
            border-color: var(--blue);
            box-shadow: 0 4px 16px rgba(49,130,246,0.08);
            transform: translateX(3px);
        }
        /* 상위 3위 강조 */
        .rank-item:nth-child(1) { border-left: 3px solid #F59E0B; }
        .rank-item:nth-child(2) { border-left: 3px solid #94A3B8; }
        .rank-item:nth-child(3) { border-left: 3px solid #CD7C2E; }

        .rank-no {
            text-align: center; font-size: 18px; font-weight: 900;
            letter-spacing: -0.03em; color: var(--text-3);
        }
        .rank-item:nth-child(1) .rank-no { color: #F59E0B; font-size: 22px; }
        .rank-item:nth-child(2) .rank-no { color: #64748B; font-size: 20px; }
        .rank-item:nth-child(3) .rank-no { color: #CD7C2E; font-size: 20px; }

        .rank-poster {
            aspect-ratio: 2/3; border-radius: 8px; overflow: hidden;
            background: var(--border); border: 1px solid var(--border);
            position: relative;
        }
        .rank-poster img { width:100%;height:100%;object-fit:cover;display:block; }
        .rank-poster-fallback {
            width:100%;height:100%;display:flex;align-items:center;justify-content:center;
            text-align:center;padding:6px;
            background:linear-gradient(135deg,var(--blue-light),#dbeafe);
            color:var(--blue);font-size:10px;font-weight:700;
        }
        .rank-badge {
            position:absolute;left:4px;top:4px;
            padding:2px 6px;border-radius:4px;
            font-size:9px;font-weight:800;
            background:rgba(0,0,0,0.7);color:white;
            white-space:nowrap;
        }
        .rank-info { min-width:0; }
        .rank-title { font-size:15px;font-weight:800;color:var(--text);line-height:1.3;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
        .rank-sub { font-size:12px;color:var(--text-3);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
        .rank-year-chip { display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;background:var(--bg);color:var(--text-3); }
        .rank-metric { text-align:right;flex-shrink:0; }
        .metric-label { font-size:11px;color:var(--text-3);margin-bottom:3px; }
        .metric-value { font-size:15px;font-weight:900;color:var(--text);letter-spacing:-0.02em; }

        /* 빈 결과 */
        .empty { padding:48px;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-3);font-size:14px; }

        /* 연관 차트 */
        .related-head { font-size:14px;font-weight:800;color:var(--text-2);margin-bottom:10px; }
        .related-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px; }
        .related-card { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:6px;transition:border-color .12s; }
        .related-card:hover { border-color:var(--blue); }
        .related-title { font-size:14px;font-weight:800;color:var(--text); }
        .related-desc { font-size:12px;color:var(--text-3);line-height:1.5;flex:1; }
        .related-link { font-size:12px;font-weight:700;color:var(--blue);display:flex;align-items:center;gap:3px;margin-top:4px; }
        .related-link svg { width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round; }

        @media (max-width:640px) {
            .nav { padding:0 16px; }
            .page { padding:20px 16px 60px; }
            .page-header { flex-direction:column; }
            .rank-item { grid-template-columns:32px 52px 1fr; }
            .rank-metric { display:none; }
            .rank-item:nth-child(1) .rank-no { font-size:18px; }
        }
    </style>
</head>
<body>
<nav class="nav">
    <div class="nav-left">
        <a class="back-btn" th:href="@{/ranking}">
            <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
            차트 목록
        </a>
        <a class="nav-logo" th:href="@{/charts}">
            <div class="nav-logo-mark">
                <svg viewBox="0 0 16 16"><path d="M2 2h3v3H2zm0 4.5h3v3H2zm0 4.5h3v3H2zM6.5 2h3v3h-3zm0 4.5h3v3h-3zm0 4.5h3v3h-3zM11 2h3v3h-3zm0 4.5h3v3H11zm0 4.5h3v3H11z"/></svg>
            </div>
            CineMatch
        </a>
    </div>
    <div class="nav-right">
        <a class="nav-user" th:href="@{/mypage}">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            <span th:text="${loginUserNickname}">nickname</span>
        </a>
        <a class="nav-logout" th:href="@{/logout}">로그아웃</a>
    </div>
</nav>

<main class="page">
    <!-- 헤더 카드 -->
    <div class="page-header">
        <div class="header-left">
            <div class="header-cat" th:text="${algorithm.category().label()}">카테고리</div>
            <h1 class="header-title" th:text="${algorithm.title()}">차트 제목</h1>
            <p class="header-desc" th:text="${algorithm.description()}">설명</p>
            <div class="header-meta">
                <span class="meta-item"><strong>CineMatch</strong> 박스오피스 DB 기반</span>
            </div>
        </div>
        <div class="header-right">
            <div class="rank-count-display" th:text="${rows.size()}">0</div>
            <div class="rank-count-label">위까지 표시</div>
        </div>
    </div>

    <!-- 순위 리스트 -->
    <div class="rank-list" th:if="${!#lists.isEmpty(rows)}">
        <a class="rank-item" th:each="row : ${rows}" th:href="@{|/movies/${row.movieCode()}|}">
            <div class="rank-no" th:text="${row.rankNo()}">1</div>
            <div class="rank-poster">
                <img th:if="${!#strings.isEmpty(row.posterImageUrl())}"
                     th:src="${row.posterImageUrl()}" th:alt="${row.movieName()}">
                <div class="rank-poster-fallback" th:if="${#strings.isEmpty(row.posterImageUrl())}">
                    <span th:text="${row.movieName()}">영화</span>
                </div>
                <span class="rank-badge" th:if="${row.badgeLabel() != null}" th:text="${row.badgeLabel()}">뱃지</span>
            </div>
            <div class="rank-info">
                <div class="rank-title" th:text="${row.movieName()}">제목</div>
                <div class="rank-sub" th:text="${!#strings.isEmpty(row.movieNameEn()) ? row.movieNameEn() : row.movieCode()}">subtitle</div>
                <span class="rank-year-chip"
                      th:if="${row.productionYear() != null}"
                      th:text="${row.productionYear()}">2024</span>
                <span class="rank-year-chip"
                      th:if="${row.productionYear() == null and row.openDate() != null}"
                      th:text="${#temporals.format(row.openDate(), 'yyyy')}">2024</span>
            </div>
            <div class="rank-metric">
                <div class="metric-label" th:text="${row.metricLabel()}">지표</div>
                <div class="metric-value" th:text="${row.metricValue()}">—</div>
            </div>
        </a>
    </div>
    <div class="empty" th:if="${#lists.isEmpty(rows)}">표시할 데이터가 없습니다.</div>

    <!-- 연관 차트 -->
    <div th:if="${!#lists.isEmpty(relatedCharts)}">
        <p class="related-head">같은 카테고리 다른 차트</p>
        <div class="related-grid">
            <a class="related-card" th:each="r : ${relatedCharts}" th:href="@{|/ranking/${r.code()}|}">
                <div class="related-title" th:text="${r.title()}">차트</div>
                <div class="related-desc" th:text="${r.description()}">설명</div>
                <span class="related-link">
                    보기 <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </span>
            </a>
        </div>
    </div>
</main>
</body>
</html>
