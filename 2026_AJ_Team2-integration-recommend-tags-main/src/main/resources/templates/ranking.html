<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>랭킹 차트 | CineMatch</title>
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <style>
        :root {
            --blue: #0048FF;
            --blue-soft: #EEF2FF;
            --bg: #070B14;
            --surface: #101828;
            --card: #111827;
            --text: #F8FAFC;
            --text-sub: #CBD5E1;
            --text-hint: #94A3B8;
            --border: rgba(148,163,184,0.18);
            --shadow: 0 24px 60px rgba(2,6,23,0.42);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard', 'Segoe UI', sans-serif;
            background:
                radial-gradient(circle at top right, rgba(0,72,255,0.18), transparent 28%),
                linear-gradient(180deg, #06101f 0%, #070b14 45%, #0a1222 100%);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Navbar ── */
        .navbar {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 32px; height: 68px;
            background: rgba(7,11,20,0.82);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(148,163,184,0.12);
        }
        .navbar-logo {
            display: inline-flex; align-items: center; gap: 10px;
            color: white; text-decoration: none;
            font-size: 1.2rem; font-weight: 900; letter-spacing: -0.03em;
        }
        .logo-mark {
            width: 34px; height: 34px; border-radius: 10px;
            display: inline-flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0048FF, #38BDF8);
            box-shadow: 0 12px 24px rgba(0,72,255,0.28);
        }
        .logo-mark svg { width: 18px; height: 18px; fill: white; }
        .navbar-right { display: flex; align-items: center; gap: 12px; }
        .user-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 14px; border-radius: 999px;
            background: rgba(255,255,255,0.08);
            color: white; text-decoration: none;
            font-size: 0.88rem; font-weight: 700;
        }
        .logout-btn {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 92px; height: 40px; border-radius: 999px;
            background: white; color: #0F172A;
            text-decoration: none; font-size: 0.88rem; font-weight: 800;
        }

        /* ── Page ── */
        .page { max-width: 1440px; margin: 0 auto; padding: 28px 24px 72px; }

        /* ── Hero ── */
        .hero {
            padding: 40px 44px;
            border-radius: 28px;
            background:
                linear-gradient(120deg, rgba(0,72,255,0.88) 0%, rgba(14,165,233,0.72) 52%, rgba(10,18,34,0.94) 100%);
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            position: relative; overflow: hidden;
        }
        .hero::after {
            content: '';
            position: absolute; right: -30px; bottom: -30px;
            width: 220px; height: 220px; border-radius: 50%;
            background: rgba(255,255,255,0.07);
        }
        .hero-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 7px 14px; border-radius: 999px;
            background: rgba(255,255,255,0.16);
            color: rgba(255,255,255,0.92);
            font-size: 0.8rem; font-weight: 800; margin-bottom: 16px;
        }
        .hero h1 {
            font-size: clamp(2rem, 4vw, 3.2rem);
            line-height: 1.05; letter-spacing: -0.04em; margin-bottom: 12px;
        }
        .hero p {
            max-width: 580px;
            color: rgba(255,255,255,0.78); line-height: 1.7; font-size: 0.98rem;
        }

        /* ── 카테고리 탭 ── */
        .tabs {
            display: flex; flex-wrap: wrap; gap: 10px;
            margin-bottom: 24px;
        }
        .tab {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 10px 18px; border-radius: 999px;
            text-decoration: none; font-size: 0.88rem; font-weight: 700;
            border: 1px solid rgba(148,163,184,0.18);
            background: rgba(255,255,255,0.05);
            color: var(--text-hint);
            transition: all 0.15s ease;
        }
        .tab:hover { color: white; border-color: rgba(148,163,184,0.38); }
        .tab.active {
            background: white; color: #0F172A;
            border-color: white; box-shadow: 0 4px 14px rgba(255,255,255,0.12);
        }
        .tab-count {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 20px; height: 20px; padding: 0 6px;
            border-radius: 999px; font-size: 0.72rem; font-weight: 800;
            background: rgba(255,255,255,0.14); color: inherit;
        }
        .tab.active .tab-count { background: rgba(0,0,0,0.12); }

        /* ── 차트 그리드 ── */
        .section-head {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px;
        }
        .section-head h2 {
            font-size: 1.1rem; font-weight: 900; letter-spacing: -0.02em;
        }
        .section-head span { color: var(--text-hint); font-size: 0.88rem; }

        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        /* ── 차트 카드 ── */
        .chart-card {
            display: flex; flex-direction: column;
            padding: 22px 24px 20px;
            border-radius: 22px;
            background: rgba(14,23,38,0.92);
            border: 1px solid rgba(148,163,184,0.13);
            text-decoration: none; color: inherit;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            position: relative; overflow: hidden;
        }
        .chart-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, var(--accent-from), var(--accent-to));
            opacity: 0; transition: opacity 0.2s ease;
        }
        .chart-card:hover {
            transform: translateY(-4px);
            border-color: rgba(96,165,250,0.38);
            box-shadow: 0 20px 40px rgba(2,6,23,0.32);
        }
        .chart-card:hover::before { opacity: 1; }

        /* 카테고리별 accent 색상 */
        .chart-card[data-category="BOXOFFICE"] { --accent-from: #f59e0b; --accent-to: #ef4444; }
        .chart-card[data-category="AUDIENCE"]  { --accent-from: #3b82f6; --accent-to: #8b5cf6; }
        .chart-card[data-category="EFFICIENCY"]{ --accent-from: #10b981; --accent-to: #06b6d4; }
        .chart-card[data-category="TIME"]      { --accent-from: #6366f1; --accent-to: #ec4899; }
        .chart-card[data-category="GENRE"]     { --accent-from: #f97316; --accent-to: #facc15; }
        .chart-card[data-category="PEOPLE"]    { --accent-from: #a78bfa; --accent-to: #38bdf8; }

        .card-top {
            display: flex; align-items: flex-start;
            justify-content: space-between; gap: 12px;
            margin-bottom: 14px;
        }
        .card-icon {
            width: 44px; height: 44px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(148,163,184,0.14);
            flex-shrink: 0;
        }
        .card-icon svg { width: 22px; height: 22px; stroke: var(--text-sub); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
        .category-chip {
            padding: 5px 10px; border-radius: 999px;
            font-size: 0.72rem; font-weight: 800;
            background: rgba(255,255,255,0.07);
            color: var(--text-hint);
        }
        .card-title {
            font-size: 1.06rem; font-weight: 900;
            letter-spacing: -0.02em; margin-bottom: 6px;
        }
        .card-desc {
            font-size: 0.84rem; color: var(--text-hint);
            line-height: 1.6; flex: 1;
        }
        .card-footer {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 16px; padding-top: 14px;
            border-top: 1px solid rgba(148,163,184,0.1);
        }
        .card-cta {
            font-size: 0.82rem; font-weight: 800;
            color: rgba(96,165,250,0.9);
            display: flex; align-items: center; gap: 4px;
        }
        .card-cta svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
        .badge-new {
            padding: 4px 8px; border-radius: 6px;
            font-size: 0.7rem; font-weight: 800;
            background: rgba(0,72,255,0.22); color: #93c5fd;
        }
        .badge-hot {
            padding: 4px 8px; border-radius: 6px;
            font-size: 0.7rem; font-weight: 800;
            background: rgba(239,68,68,0.2); color: #fca5a5;
        }

        /* ── 반응형 ── */
        @media (max-width: 768px) {
            .navbar { padding: 0 16px; }
            .page { padding: 22px 16px 56px; }
            .hero { padding: 28px 22px; }
            .chart-grid { grid-template-columns: 1fr; gap: 12px; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <a class="navbar-logo" th:href="@{/charts}">
        <span class="logo-mark">
            <svg viewBox="0 0 16 16"><path d="M2 2h3v3H2zm0 4.5h3v3H2zm0 4.5h3v3H2zM6.5 2h3v3h-3zm0 4.5h3v3h-3zm0 4.5h3v3h-3zM11 2h3v3h-3zm0 4.5h3v3H11zm0 4.5h3v3H11z"/></svg>
        </span>
        <span>CineMatch</span>
    </a>
    <div class="navbar-right">
        <a class="user-badge" th:href="@{/mypage}">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            <span th:text="${loginUserNickname}">nickname</span>
        </a>
        <a class="logout-btn" th:href="@{/logout}">로그아웃</a>
    </div>
</nav>

<main class="page">
    <!-- Hero -->
    <section class="hero">
        <div class="hero-badge">CHART RANKINGS</div>
        <h1>랭킹 차트</h1>
        <p>매출·관객·효율·시대·장르·인물 6개 카테고리,
           총 <span th:text="${totalCount}">12</span>가지 알고리즘으로 한국 박스오피스를 다각도로 분석합니다.</p>
    </section>

    <!-- 카테고리 탭 -->
    <nav class="tabs">
        <!-- 전체 탭 -->
        <a class="tab"
           th:classappend="${selectedCategory == null} ? ' active' : ''"
           th:href="@{/ranking}">
            전체
            <span class="tab-count" th:text="${totalCount}">12</span>
        </a>
        <!-- 카테고리별 탭 -->
        <a class="tab"
           th:each="cat : ${categories}"
           th:classappend="${cat == selectedCategory} ? ' active' : ''"
           th:href="@{/ranking(category=${cat.name()})}"
           th:text="${cat.label()}">카테고리</a>
    </nav>

    <!-- 차트 카드 그리드 -->
    <div class="section-head">
        <h2 th:text="${selectedCategory != null} ? ${selectedCategory.label() + ' 차트'} : '전체 차트'">전체 차트</h2>
        <span th:text="|${entries.size()}개의 차트|">12개의 차트</span>
    </div>

    <div class="chart-grid">
        <a class="chart-card"
           th:each="entry : ${entries}"
           th:href="@{|/ranking/${entry.code()}|}"
           th:attr="data-category=${entry.category().name()}">

            <div class="card-top">
                <!-- 아이콘 (icon 식별자로 SVG 분기) -->
                <span class="card-icon">
                    <svg th:if="${entry.icon() == 'chart-bar'}" viewBox="0 0 24 24"><rect x="3" y="12" width="4" height="9"/><rect x="10" y="7" width="4" height="14"/><rect x="17" y="4" width="4" height="17"/></svg>
                    <svg th:if="${entry.icon() == 'users'}" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    <svg th:if="${entry.icon() == 'trending-up'}" viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
                    <svg th:if="${entry.icon() == 'eye'}" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
                    <svg th:if="${entry.icon() == 'seat'}" viewBox="0 0 24 24"><path d="M4 6V4a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v2"/><path d="M20 10v10H4V10"/><path d="M2 10h20"/><path d="M7 21v-5m10 5v-5"/></svg>
                    <svg th:if="${entry.icon() == 'film'}" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>
                    <svg th:if="${entry.icon() == 'zap'}" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                    <svg th:if="${entry.icon() == 'clock'}" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <svg th:if="${entry.icon() == 'star'}" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                    <svg th:if="${entry.icon() == 'calendar'}" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    <svg th:if="${entry.icon() == 'tag'}" viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                    <svg th:if="${entry.icon() == 'video'}" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                </span>
                <span class="category-chip" th:text="${entry.category().label()}">카테고리</span>
            </div>

            <div class="card-title" th:text="${entry.title()}">차트 제목</div>
            <div class="card-desc" th:text="${entry.description()}">차트 설명</div>

            <div class="card-footer">
                <span class="card-cta">
                    순위 보기
                    <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </span>
                <span th:if="${entry.isNew()}" class="badge-new">NEW</span>
                <span th:if="${entry.isHot()}" class="badge-hot">HOT</span>
            </div>
        </a>
    </div>
</main>
</body>
</html>
