<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch — 영화 차트</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <style>
        :root {
            --blue:      #0048FF;
            --blue-dark: #003AD1;
            --blue-soft: #EEF2FF;
            --blue-mid:  #C7D2FE;
            --white:     #FFFFFF;
            --bg:        #F7F8FC;
            --surface:   #FFFFFF;
            --text:      #0F172A;
            --text-sub:  #475569;
            --text-hint: #94A3B8;
            --border:    rgba(15,23,42,0.08);
            --shadow-sm: 0 2px 8px rgba(0,72,255,0.06);
            --shadow-md: 0 8px 24px rgba(0,72,255,0.10);
            --shadow-lg: 0 20px 48px rgba(0,72,255,0.14);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* 네비게이션 */
        .navbar {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 32px; height: 64px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        .navbar-logo {
            display: flex; align-items: center; gap: 8px;
            font-size: 1.2rem; font-weight: 800; color: var(--blue);
            text-decoration: none; letter-spacing: -0.03em;
        }
        .logo-icon {
            width: 30px; height: 30px; background: var(--blue);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
        }
        .logo-icon svg { width: 16px; height: 16px; fill: white; }
        .navbar-right { display: flex; align-items: center; gap: 12px; }
        .user-badge {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 14px; background: var(--blue-soft);
            border-radius: 999px; font-size: 0.875rem; font-weight: 600; color: var(--blue);
        }
        .logout-btn {
            padding: 8px 18px; background: var(--text); color: white;
            border-radius: 999px; font-size: 0.875rem; font-weight: 600;
            text-decoration: none; transition: background 0.15s;
        }
        .logout-btn:hover { background: #334155; }

        /* 히어로 */
        .page { max-width: 1280px; margin: 0 auto; padding: 40px 24px 80px; }
        .hero {
            margin-bottom: 36px; padding: 40px 44px;
            background: linear-gradient(135deg, #0048FF 0%, #2563EB 55%, #0EA5E9 100%);
            border-radius: 24px; position: relative; overflow: hidden;
        }
        .hero::before {
            content: ''; position: absolute; top: -60px; right: -60px;
            width: 300px; height: 300px;
            background: rgba(255,255,255,0.07); border-radius: 50%;
        }
        .hero::after {
            content: ''; position: absolute; bottom: -80px; right: 100px;
            width: 220px; height: 220px;
            background: rgba(255,255,255,0.04); border-radius: 50%;
        }
        .hero-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 14px; background: rgba(255,255,255,0.18);
            border-radius: 999px; font-size: 0.78rem; font-weight: 700;
            color: rgba(255,255,255,0.9); letter-spacing: 0.08em;
            text-transform: uppercase; margin-bottom: 14px;
        }
        .hero h1 {
            font-size: clamp(2rem,4vw,3rem); font-weight: 900;
            color: white; line-height: 1.1; letter-spacing: -0.04em; margin-bottom: 10px;
        }
        .hero-sub {
            color: rgba(255,255,255,0.75); font-size: 1rem;
            line-height: 1.6; max-width: 520px;
        }

        /* 섹션 타이틀 */
        .section-label {
            font-size: 0.8rem; font-weight: 700; color: var(--text-hint);
            letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 20px;
        }

        /* 그리드 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(168px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }

        /* 카드 */
        .card {
            display: block; text-decoration: none; color: inherit;
            border-radius: 16px; background: var(--surface);
            border: 1px solid var(--border); box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: transform 220ms cubic-bezier(0.34,1.56,0.64,1),
                        box-shadow 220ms ease, border-color 220ms ease;
            animation: fadeUp 0.4s ease both;
        }
        .card:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: var(--shadow-lg); border-color: var(--blue-mid);
        }
        .card:active { transform: translateY(-3px) scale(1.01); }

        /* 포스터 래퍼 */
        .card-poster-wrap {
            position: relative; aspect-ratio: 2/3; overflow: hidden;
        }
        .poster {
            width: 100%; height: 100%; object-fit: cover; display: block;
            transition: transform 300ms ease;
        }
        .card:hover .poster { transform: scale(1.08); }

        .poster-fallback {
            width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; gap: 10px;
            background: linear-gradient(135deg, #EEF2FF, #DBEAFE);
            color: var(--blue); font-size: 0.82rem; font-weight: 700;
            text-align: center; padding: 16px;
        }
        .poster-fallback svg { width: 32px; height: 32px; opacity: 0.35; }

        /* 랭킹 배지 */
        .rank-badge {
            position: absolute; top: 10px; left: 10px; z-index: 2;
            width: 32px; height: 32px; background: var(--blue); color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 0.78rem; font-weight: 900;
            box-shadow: 0 2px 10px rgba(0,72,255,0.45);
        }
        .rank-badge.gold {
            background: linear-gradient(135deg, #F59E0B, #EF4444);
        }

        /* 호버 오버레이 */
        .card-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(
                to top,
                rgba(0,40,160,0.95) 0%,
                rgba(0,72,255,0.75) 45%,
                transparent 100%
            );
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 16px; opacity: 0;
            transition: opacity 200ms ease;
        }
        .card:hover .card-overlay { opacity: 1; }

        .overlay-title {
            font-size: 0.92rem; font-weight: 800; color: white;
            line-height: 1.3; margin-bottom: 4px;
        }
        .overlay-en {
            font-size: 0.72rem; color: rgba(255,255,255,0.65); margin-bottom: 10px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .overlay-cta {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 6px 13px; background: white; color: var(--blue);
            border-radius: 999px; font-size: 0.76rem; font-weight: 800;
            width: fit-content;
        }

        /* 카드 바디 */
        .card-body { padding: 13px 14px 15px; }
        .card-title {
            font-size: 0.92rem; font-weight: 700; color: var(--text);
            line-height: 1.4; margin-bottom: 3px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            transition: color 160ms;
        }
        .card:hover .card-title { color: var(--blue); }
        .card-sub {
            font-size: 0.78rem; color: var(--text-hint);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* 빈 상태 */
        .empty { grid-column: 1/-1; padding: 60px; text-align: center; color: var(--text-hint); }

        /* 페이지네이션 */
        .pagination {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 8px;
        }
        .page-link {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 42px; height: 42px; padding: 0 14px;
            border-radius: 999px; border: 1px solid var(--border);
            background: var(--surface); color: var(--text-sub);
            font-size: 0.875rem; font-weight: 600; text-decoration: none;
            transition: all 0.15s;
        }
        .page-link:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-soft); }
        .page-link.current {
            background: var(--blue); border-color: var(--blue); color: white;
            box-shadow: 0 4px 14px rgba(0,72,255,0.35);
        }

        /* 애니메이션 */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .card:nth-child(1)  { animation-delay: 0.03s; }
        .card:nth-child(2)  { animation-delay: 0.07s; }
        .card:nth-child(3)  { animation-delay: 0.11s; }
        .card:nth-child(4)  { animation-delay: 0.15s; }
        .card:nth-child(5)  { animation-delay: 0.19s; }
        .card:nth-child(6)  { animation-delay: 0.23s; }
        .card:nth-child(7)  { animation-delay: 0.27s; }
        .card:nth-child(8)  { animation-delay: 0.31s; }
        .card:nth-child(9)  { animation-delay: 0.35s; }
        .card:nth-child(10) { animation-delay: 0.39s; }

        @media (max-width: 600px) {
            .navbar { padding: 0 16px; }
            .page   { padding: 24px 16px 60px; }
            .hero   { padding: 24px 20px; }
            .grid   { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a class="navbar-logo" th:href="@{/charts}">
        <div class="logo-icon">
            <svg viewBox="0 0 16 16"><path d="M2 2h3v3H2zm0 4.5h3v3H2zm0 4.5h3v3H2zM6.5 2h3v3h-3zm0 4.5h3v3h-3zm0 4.5h3v3h-3zM11 2h3v3h-3zm0 4.5h3v3H11zm0 4.5h3v3H11z"/></svg>
        </div>
        CineMatch
    </a>
    <div class="navbar-right">
        <div class="user-badge">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            <span th:text="${loginUserId}">user</span>
        </div>
        <a class="logout-btn" th:href="@{/logout}">로그아웃</a>
    </div>
</nav>

<main class="page">
    <section class="hero">
        <div class="hero-badge">🎬 KOBIS 박스오피스</div>
        <h1>영화 차트</h1>
        <p class="hero-sub">역대 누적 관객 TOP 50 영화 목록입니다. 포스터에 마우스를 올리면 상세 정보를 미리 볼 수 있어요.</p>
    </section>

    <p class="section-label">전체 목록 — 페이지 <span th:text="${currentPage}">1</span> / <span th:text="${totalPages}">5</span></p>

    <section class="grid" th:if="${!#lists.isEmpty(movies)}">
        <a class="card" th:each="movie : ${movies}" th:href="@{|/movies/${movie.movieCode}|}">
            <div class="card-poster-wrap">

                <div class="rank-badge"
                     th:classappend="${movie.ranking <= 3} ? ' gold' : ''"
                     th:text="${movie.ranking}">1</div>

                <img class="poster"
                     th:if="${!#strings.isEmpty(movie.posterImageUrl)}"
                     th:src="${movie.posterImageUrl}"
                     th:alt="${movie.movieName}"
                     loading="lazy">

                <div class="poster-fallback" th:if="${#strings.isEmpty(movie.posterImageUrl)}">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18 4H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2zM8 8h3v4H8V8zm0 6h8v1H8v-1zm0 2h8v1H8v-1zm5-8h3v4h-3V8z"/>
                    </svg>
                    <span th:text="${movie.movieName}">제목</span>
                </div>

                <div class="card-overlay">
                    <div class="overlay-title" th:text="${movie.movieName}">영화 제목</div>
                    <div class="overlay-en"
                         th:text="${#strings.isEmpty(movie.movieNameEn) ? '' : movie.movieNameEn}"></div>
                    <div class="overlay-cta">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="3">
                            <path d="M5 12h14M12 5l7 7-7 7"/>
                        </svg>
                        상세 보기
                    </div>
                </div>

            </div>
            <div class="card-body">
                <p class="card-title" th:text="${movie.movieName}">영화 제목</p>
                <p class="card-sub"
                   th:text="${#strings.isEmpty(movie.movieNameEn) ? movie.movieCode : movie.movieNameEn}"></p>
            </div>
        </a>
    </section>

    <section class="grid" th:if="${#lists.isEmpty(movies)}">
        <div class="empty">아직 영화 데이터가 없습니다.</div>
    </section>

    <nav class="pagination" th:if="${totalPages > 1}">
        <a class="page-link" th:if="${hasPrevious}" th:href="@{|/charts?page=${previousPage}|}">← 이전</a>
        <a class="page-link"
           th:each="pageNumber : ${pages}"
           th:classappend="${pageNumber == currentPage} ? ' current' : ''"
           th:href="@{|/charts?page=${pageNumber}|}"
           th:text="${pageNumber}">1</a>
        <a class="page-link" th:if="${hasNext}" th:href="@{|/charts?page=${nextPage}|}">다음 →</a>
    </nav>
</main>
</body>
</html>
