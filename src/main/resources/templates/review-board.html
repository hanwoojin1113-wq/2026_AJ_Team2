<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리뷰 게시판 | CineMatch</title>
    <link rel="stylesheet" href="/css/hp-theme.css">
    <style>
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 18% 0%, rgba(2,74,216,0.18), transparent 28%),
                linear-gradient(180deg, #0f1117 0%, #090b10 100%);
            color: var(--hp-text);
        }
        .board-page {
            width: min(100%, 980px);
            margin: 0 auto;
            padding: 48px 24px 80px;
        }
        .board-header {
            display: flex;
            align-items: end;
            justify-content: space-between;
            gap: 18px;
            margin-bottom: 28px;
        }
        .board-kicker {
            color: var(--hp-blue-bright);
            font-size: 0.76rem;
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .board-title {
            margin: 8px 0 0;
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 900;
            letter-spacing: 0;
        }
        .board-copy {
            margin: 8px 0 0;
            color: var(--hp-text-sub);
            line-height: 1.6;
            font-size: 0.95rem;
        }
        .board-search {
            display: flex;
            align-items: center;
            flex: 1;
            min-width: 210px;
            height: 42px;
            border: 1px solid var(--hp-border);
            border-radius: var(--r-md);
            background: rgba(255,255,255,0.06);
            color: var(--hp-text-hint);
        }
        .board-search:focus-within {
            border-color: rgba(96,165,250,0.55);
            box-shadow: 0 0 0 3px rgba(2,74,216,0.18);
        }
        .board-search input {
            flex: 1;
            min-width: 0;
            height: 100%;
            border: 0;
            padding: 0 12px 0 14px;
            font: inherit;
            color: var(--hp-text);
            background: transparent;
            outline: none;
        }
        .board-search input::placeholder {
            color: var(--hp-text-hint);
        }
        .board-search svg {
            width: 18px;
            height: 18px;
            margin-right: 12px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }
        .board-controls {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            gap: 10px;
            width: min(430px, 100%);
        }
        .sort-filter {
            flex: 0 0 140px;
            height: 42px;
            border: 1px solid var(--hp-border);
            border-radius: var(--r-md);
            background: rgba(255,255,255,0.06);
            color: var(--hp-text);
            padding: 0 12px;
            font: inherit;
            font-size: 0.9rem;
            font-weight: 800;
            outline: none;
        }
        .sort-filter:focus {
            border-color: rgba(96,165,250,0.55);
            box-shadow: 0 0 0 3px rgba(2,74,216,0.18);
        }
        .sort-filter option {
            background: #151923;
            color: #fff;
        }
        .review-table-wrap {
            overflow: hidden;
            border: 1px solid var(--hp-border);
            border-radius: var(--r-xl);
            background: rgba(30,35,48,0.92);
            box-shadow: 0 26px 54px rgba(2,6,23,0.34);
        }
        .review-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        .review-table th,
        .review-table td {
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 15px 16px;
            font-size: 0.94rem;
            vertical-align: middle;
        }
        .review-table tbody tr:last-child td {
            border-bottom: 0;
        }
        .review-table th {
            color: var(--hp-text-sub);
            font-size: 0.78rem;
            font-weight: 900;
            letter-spacing: 0;
            text-align: center;
            background: rgba(15,17,23,0.62);
        }
        .review-table tbody tr {
            transition: background 0.15s;
        }
        .review-table tbody tr:hover {
            background: rgba(255,255,255,0.04);
        }
        .col-date { width: 128px; text-align: center; color: var(--hp-text-hint); }
        .col-title { width: auto; }
        .col-views { width: 92px; text-align: center; color: var(--hp-text-sub); }
        .col-author { width: 128px; text-align: center; color: var(--hp-text-sub); }
        .review-link {
            display: grid;
            grid-template-columns: 44px minmax(0, 1fr);
            align-items: center;
            gap: 13px;
            color: inherit;
            text-decoration: none;
        }
        .review-poster,
        .review-poster-fallback {
            width: 40px;
            height: 58px;
            border-radius: var(--r-md);
            object-fit: cover;
            background: rgba(255,255,255,0.08);
        }
        .review-poster-fallback {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--hp-text-hint);
            font-size: 0.68rem;
            font-weight: 900;
        }
        .review-title {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
            font-weight: 900;
        }
        .review-title strong {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .rating {
            flex: 0 0 auto;
            color: #facc15;
            font-size: 0.78rem;
            font-weight: 900;
            letter-spacing: 0;
        }
        .rating.empty {
            color: var(--hp-text-hint);
        }
        .review-preview {
            display: block;
            margin-top: 5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--hp-text-sub);
            font-size: 0.86rem;
            line-height: 1.45;
        }
        .view-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 54px;
            height: 28px;
            border-radius: var(--r-md);
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-size: 0.82rem;
            font-weight: 900;
        }
        .board-empty {
            padding: 58px 20px;
            border: 1px solid var(--hp-border);
            border-radius: var(--r-xl);
            text-align: center;
            color: var(--hp-text-hint);
            background: rgba(30,35,48,0.72);
        }
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 22px;
        }
        .page-link,
        .page-current {
            min-width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--r-md);
            border: 1px solid var(--hp-border);
            color: var(--hp-text-sub);
            text-decoration: none;
            font-size: 0.86rem;
            font-weight: 900;
        }
        .page-link:hover {
            color: #fff;
            background: rgba(255,255,255,0.08);
        }
        .page-current {
            color: #fff;
            background: var(--hp-blue);
            border-color: var(--hp-blue);
        }
        @media (max-width: 768px) {
            .board-page {
                padding: 30px 14px 64px;
            }
            .board-header {
                align-items: stretch;
                flex-direction: column;
            }
            .board-controls,
            .board-search {
                width: 100%;
            }
            .board-controls {
                flex-direction: column;
                align-items: stretch;
            }
            .sort-filter {
                flex-basis: auto;
                width: 100%;
            }
            .col-author {
                display: none;
            }
            .col-date {
                width: 86px;
            }
            .col-views {
                width: 72px;
            }
            .review-table th,
            .review-table td {
                padding: 12px 10px;
                font-size: 0.86rem;
            }
            .review-link {
                grid-template-columns: 36px minmax(0, 1fr);
                gap: 10px;
            }
            .review-poster,
            .review-poster-fallback {
                width: 32px;
                height: 46px;
            }
            .view-count {
                min-width: 42px;
                font-size: 0.78rem;
            }
        }
    </style>
</head>
<body data-app-shell-notif="true">
<div th:replace="~{fragments/app-shell :: shell}"></div>

<main class="board-page">
    <header class="board-header">
        <div>
            <div class="board-kicker">Review Board</div>
            <h1 class="board-title">리뷰 게시판</h1>
            <p class="board-copy">사용자가 남긴 영화 리뷰를 최신순으로 확인하세요.</p>
        </div>
        <div class="board-controls">
            <label class="board-search">
                <input id="reviewSearch" type="search" placeholder="리뷰 검색" autocomplete="off">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="11" cy="11" r="7"></circle>
                    <path d="m16.5 16.5 4 4"></path>
                </svg>
            </label>
            <select class="sort-filter" id="reviewSort" aria-label="리뷰 정렬">
                <option value="latest" th:selected="${selectedSort == 'latest'}">날짜순</option>
                <option value="views" th:selected="${selectedSort == 'views'}">조회수순</option>
            </select>
        </div>
    </header>

    <div class="review-table-wrap" th:if="${reviews != null and !reviews.isEmpty()}">
        <table class="review-table">
            <thead>
            <tr>
                <th class="col-date">작성일</th>
                <th class="col-title">리뷰</th>
                <th class="col-views">조회수</th>
                <th class="col-author">작성자</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="review : ${reviews}">
                <td class="col-date" th:text="${review.createdAt}">2026.05.21</td>
                <td class="col-title">
                    <a class="review-link" th:href="@{|/reviews/${review.reviewId}|}">
                        <img class="review-poster"
                             th:if="${review.moviePosterUrl != null and !#strings.isEmpty(review.moviePosterUrl)}"
                             th:src="${review.moviePosterUrl}"
                             th:alt="${review.movieTitle}">
                        <span class="review-poster-fallback"
                              th:if="${review.moviePosterUrl == null or #strings.isEmpty(review.moviePosterUrl)}">MOVIE</span>
                        <span>
                            <span class="review-title">
                                <strong th:text="${review.movieTitle}">영화 제목</strong>
                                <span class="rating"
                                      th:if="${review.rating != null}"
                                      th:text="|★ ${review.rating}/5|">★ 5/5</span>
                                <span class="rating empty"
                                      th:if="${review.rating == null}">평점 없음</span>
                            </span>
                            <span class="review-preview" th:text="${review.content}">작성된 리뷰 미리보기</span>
                        </span>
                    </a>
                </td>
                <td class="col-views"><span class="view-count" th:text="${review.viewCount}">0</span></td>
                <td class="col-author" th:text="${review.nickname}">CineMatch</td>
            </tr>
            </tbody>
        </table>
    </div>

    <nav class="pagination"
         th:if="${reviews != null and !reviews.isEmpty() and totalPages > 1}"
         aria-label="리뷰 게시판 페이지">
        <a class="page-link"
           th:if="${hasPrevPage}"
           th:href="@{/reviews(page=${currentPage - 1},sort=${selectedSort})}">이전</a>
        <span th:each="pageNo : ${#numbers.sequence(1, totalPages)}">
            <span class="page-current"
                  th:if="${pageNo == currentPage}"
                  th:text="${pageNo}">1</span>
            <a class="page-link"
               th:if="${pageNo != currentPage}"
               th:href="@{/reviews(page=${pageNo},sort=${selectedSort})}"
               th:text="${pageNo}">2</a>
        </span>
        <a class="page-link"
           th:if="${hasNextPage}"
           th:href="@{/reviews(page=${currentPage + 1},sort=${selectedSort})}">다음</a>
    </nav>

    <div class="board-empty" th:if="${reviews == null or reviews.isEmpty()}">
        아직 작성된 리뷰가 없습니다.
    </div>
</main>

<script>
    const reviewSearch = document.getElementById('reviewSearch');
    const reviewSort = document.getElementById('reviewSort');
    reviewSearch?.addEventListener('input', () => {
        const query = reviewSearch.value.trim().toLowerCase();
        document.querySelectorAll('.review-table tbody tr').forEach((row) => {
            row.style.display = row.textContent.toLowerCase().includes(query) ? '' : 'none';
        });
    });
    reviewSort?.addEventListener('change', () => {
        const params = new URLSearchParams(window.location.search);
        params.set('sort', reviewSort.value);
        params.set('page', '1');
        window.location.href = `${window.location.pathname}?${params.toString()}`;
    });
</script>
</body>
</html>
