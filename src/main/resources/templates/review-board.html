<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리뷰 게시판 | CineMatch</title>
    <link rel="stylesheet" href="/css/hp-theme.css">
    <style>
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 18% 0%, rgba(2,74,216,0.18), transparent 28%),
                linear-gradient(180deg, #0f1117 0%, #090b10 100%);
            color: var(--hp-text);
        }
        .board-page {
            width: min(100%, 980px);
            margin: 0 auto;
            padding: 48px 24px 80px;
        }
        .board-header {
            margin-bottom: 28px;
        }
        .board-kicker {
            color: var(--hp-blue-bright);
            font-size: 0.76rem;
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .board-title {
            margin: 8px 0 0;
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 900;
        }
        .board-copy {
            margin: 8px 0 0;
            color: var(--hp-text-sub);
            line-height: 1.6;
            font-size: 0.95rem;
        }
        .board-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 22px;
            flex-wrap: wrap;
        }
        .board-count {
            flex: 1;
            font-size: 0.86rem;
            color: var(--hp-text-hint);
            font-weight: 700;
            min-width: 0;
        }
        .board-search {
            display: flex;
            align-items: center;
            width: 220px;
            height: 40px;
            border: 1px solid var(--hp-border);
            border-radius: var(--r-md);
            background: rgba(255,255,255,0.06);
            color: var(--hp-text-hint);
        }
        .board-search:focus-within {
            border-color: rgba(96,165,250,0.55);
            box-shadow: 0 0 0 3px rgba(2,74,216,0.18);
        }
        .board-search input {
            flex: 1;
            min-width: 0;
            height: 100%;
            border: 0;
            padding: 0 10px 0 14px;
            font: inherit;
            font-size: 0.88rem;
            color: var(--hp-text);
            background: transparent;
            outline: none;
        }
        .board-search input::placeholder { color: var(--hp-text-hint); }
        .board-search svg {
            width: 16px; height: 16px;
            margin-right: 12px;
            stroke: currentColor; fill: none; stroke-width: 2;
            flex-shrink: 0;
        }
        .sort-filter {
            width: 110px;
            height: 40px;
            border: 1px solid var(--hp-border);
            border-radius: var(--r-md);
            background: rgba(255,255,255,0.06);
            color: var(--hp-text);
            padding: 0 12px;
            font: inherit;
            font-size: 0.88rem;
            font-weight: 800;
            outline: none;
            cursor: pointer;
        }
        .sort-filter:focus {
            border-color: rgba(96,165,250,0.55);
            box-shadow: 0 0 0 3px rgba(2,74,216,0.18);
        }
        .sort-filter option { background: #151923; color: #fff; }

        /* Card Grid */
        .review-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .review-card {
            display: flex;
            flex-direction: column;
            background: rgba(22,26,38,0.97);
            border: 1px solid rgba(255,255,255,0.08);
            border-top-color: rgba(255,255,255,0.13);
            border-radius: 16px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(2,6,23,0.25);
        }
        .review-card:hover {
            border-color: rgba(96,165,250,0.35);
            transform: translateY(-3px);
            box-shadow: 0 14px 40px rgba(2,6,23,0.45);
        }
        .card-top {
            display: flex;
            gap: 14px;
            padding: 18px 18px 12px;
        }
        .card-poster,
        .card-poster-fallback {
            flex-shrink: 0;
            width: 62px;
            height: 93px;
            border-radius: 8px;
            object-fit: cover;
            background: rgba(255,255,255,0.08);
        }
        .card-poster-fallback {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--hp-text-hint);
            font-size: 0.6rem;
            font-weight: 900;
        }
        .card-meta {
            min-width: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .card-movie-title {
            font-size: 0.93rem;
            font-weight: 900;
            line-height: 1.35;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .card-stars {
            display: flex;
            gap: 1px;
        }
        .star { font-size: 0.82rem; color: #facc15; }
        .star.empty { color: rgba(255,255,255,0.18); }
        .no-rating {
            font-size: 0.74rem;
            color: var(--hp-text-hint);
        }
        .card-author {
            font-size: 0.76rem;
            color: var(--hp-text-sub);
            font-weight: 700;
            margin-top: auto;
        }

        /* Preview */
        .card-preview {
            padding: 2px 18px 16px;
            margin: 0;
            font-size: 0.875rem;
            color: var(--hp-text-sub);
            line-height: 1.7;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            flex: 1;
        }

        /* Stats row */
        .card-stats {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 18px;
            border-top: 1px solid rgba(255,255,255,0.06);
            background: rgba(0,0,0,0.15);
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.78rem;
            color: var(--hp-text-hint);
            font-weight: 700;
        }
        .stat-item svg {
            width: 13px; height: 13px;
            stroke: currentColor; fill: none; stroke-width: 2;
            flex-shrink: 0;
        }
        .stat-date {
            margin-left: auto;
            font-size: 0.74rem;
            color: var(--hp-text-hint);
        }

        /* Empty */
        .board-empty {
            padding: 58px 20px;
            border: 1px solid var(--hp-border);
            border-radius: var(--r-xl);
            text-align: center;
            color: var(--hp-text-hint);
            background: rgba(30,35,48,0.72);
        }

        /* Pagination */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 28px;
        }
        .page-link,
        .page-current {
            min-width: 36px; height: 36px;
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: var(--r-md);
            border: 1px solid var(--hp-border);
            color: var(--hp-text-sub);
            text-decoration: none;
            font-size: 0.86rem; font-weight: 900;
        }
        .page-link:hover { color: #fff; background: rgba(255,255,255,0.08); }
        .page-current { color: #fff; background: var(--hp-blue); border-color: var(--hp-blue); }
        .page-ellipsis {
            min-width: 36px; height: 36px;
            display: inline-flex; align-items: center; justify-content: center;
            color: var(--hp-text-hint); font-size: 0.86rem;
        }

        @media (max-width: 680px) {
            .board-page { padding: 30px 14px 64px; }
            .review-grid { grid-template-columns: 1fr; }
            .board-count { width: 100%; flex: 0 0 100%; }
            .board-search { flex: 1; width: auto; }
        }
    </style>
</head>
<body data-app-shell-notif="true">
<div th:replace="~{fragments/app-shell :: shell}"></div>

<main class="board-page">
    <header class="board-header">
        <div class="board-kicker">Review Board</div>
        <h1 class="board-title">리뷰 게시판</h1>
        <p class="board-copy">CineMatch 유저들의 진심 어린 영화 감상을 확인하세요.</p>
    </header>

    <div class="board-controls">
        <span class="board-count" th:text="|총 ${reviewCount}개의 리뷰|">총 0개의 리뷰</span>
        <label class="board-search">
            <input id="reviewSearch" type="search" placeholder="리뷰 검색" autocomplete="off">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="7"></circle>
                <path d="m16.5 16.5 4 4"></path>
            </svg>
        </label>
        <select class="sort-filter" id="reviewSort" aria-label="리뷰 정렬">
            <option value="latest" th:selected="${selectedSort == 'latest'}">최신순</option>
            <option value="views" th:selected="${selectedSort == 'views'}">조회수순</option>
        </select>
    </div>

    <div class="review-grid" th:if="${reviews != null and !reviews.isEmpty()}">
        <a class="review-card"
           th:each="review : ${reviews}"
           th:href="@{|/reviews/${review.reviewId}|}">
            <div class="card-top">
                <img class="card-poster"
                     th:if="${review.moviePosterUrl != null and !#strings.isEmpty(review.moviePosterUrl)}"
                     th:src="${review.moviePosterUrl}"
                     th:alt="${review.movieTitle}">
                <div class="card-poster-fallback"
                     th:if="${review.moviePosterUrl == null or #strings.isEmpty(review.moviePosterUrl)}">NO IMG</div>
                <div class="card-meta">
                    <div class="card-movie-title" th:text="${review.movieTitle}">영화 제목</div>
                    <div class="card-stars" th:if="${review.rating != null}">
                        <span th:each="i : ${#numbers.sequence(1, 5)}"
                              th:class="${i <= review.rating} ? 'star' : 'star empty'"
                              th:text="${i <= review.rating} ? '★' : '★'">★</span>
                    </div>
                    <span class="no-rating" th:if="${review.rating == null}">평점 없음</span>
                    <div class="card-author" th:text="${review.nickname}">작성자</div>
                </div>
            </div>
            <p class="card-preview" th:text="${review.content}">리뷰 미리보기</p>
            <div class="card-stats">
                <span class="stat-item">
                    <svg viewBox="0 0 24 24">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                    <span th:text="${review.viewCount}">0</span>
                </span>
                <span class="stat-item">
                    <svg viewBox="0 0 24 24">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                    </svg>
                    <span th:text="${review.likeCount}">0</span>
                </span>
                <span class="stat-date" th:text="${review.createdAt}">2026.05.21</span>
            </div>
        </a>
    </div>

    <nav class="pagination"
         th:if="${reviews != null and !reviews.isEmpty() and totalPages > 1}"
         aria-label="리뷰 게시판 페이지">
        <a class="page-link"
           th:if="${hasPrevPage}"
           th:href="@{/reviews(page=${currentPage - 1},sort=${selectedSort})}">이전</a>

        <th:block th:if="${pageStart > 1}">
            <span class="page-current" th:if="${currentPage == 1}">1</span>
            <a class="page-link" th:if="${currentPage != 1}"
               th:href="@{/reviews(page=1,sort=${selectedSort})}">1</a>
        </th:block>
        <span class="page-ellipsis" th:if="${pageStart > 2}">…</span>

        <th:block th:each="pageNo : ${#numbers.sequence(pageStart, pageEnd)}">
            <span class="page-current" th:if="${pageNo == currentPage}" th:text="${pageNo}"></span>
            <a class="page-link"
               th:if="${pageNo != currentPage}"
               th:href="@{/reviews(page=${pageNo},sort=${selectedSort})}"
               th:text="${pageNo}"></a>
        </th:block>

        <span class="page-ellipsis" th:if="${pageEnd < totalPages - 1}">…</span>
        <th:block th:if="${pageEnd < totalPages}">
            <span class="page-current" th:if="${currentPage == totalPages}" th:text="${totalPages}"></span>
            <a class="page-link" th:if="${currentPage != totalPages}"
               th:href="@{/reviews(page=${totalPages},sort=${selectedSort})}"
               th:text="${totalPages}"></a>
        </th:block>

        <a class="page-link"
           th:if="${hasNextPage}"
           th:href="@{/reviews(page=${currentPage + 1},sort=${selectedSort})}">다음</a>
    </nav>

    <div class="board-empty" th:if="${reviews == null or reviews.isEmpty()}">
        아직 작성된 리뷰가 없습니다.
    </div>
</main>

<script>
    const reviewSearch = document.getElementById('reviewSearch');
    const reviewSort = document.getElementById('reviewSort');

    reviewSearch?.addEventListener('input', () => {
        const query = reviewSearch.value.trim().toLowerCase();
        document.querySelectorAll('.review-card').forEach((card) => {
            card.style.display = card.textContent.toLowerCase().includes(query) ? '' : 'none';
        });
    });

    reviewSort?.addEventListener('change', () => {
        const params = new URLSearchParams(window.location.search);
        params.set('sort', reviewSort.value);
        params.set('page', '1');
        window.location.href = `${window.location.pathname}?${params.toString()}`;
    });
</script>
</body>
</html>
