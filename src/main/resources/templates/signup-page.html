<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 — CineMatch</title>
    <link rel="stylesheet" href="/css/hp-theme.css">
    <style>
        body {
            min-height: 100vh; display: grid; place-items: center; padding: 24px;
            background: var(--hp-bg);
        }
        .card {
            width: min(100%, 480px); padding: 40px;
            background: var(--hp-surface); border: 1px solid var(--hp-border-strong);
            border-radius: var(--r-xl); box-shadow: var(--hp-shadow-lg);
        }
        .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
        .logo-icon {
            width: 36px; height: 36px; background: var(--hp-blue);
            border-radius: var(--r-lg); display: flex; align-items: center; justify-content: center;
        }
        .logo-icon svg { width: 18px; height: 18px; fill: white; }
        .logo-text { font-size: 1.1rem; font-weight: 700; color: var(--hp-text); letter-spacing: -0.01em; }
        .eyebrow {
            font-size: 12px; font-weight: 600; color: var(--hp-blue-bright);
            letter-spacing: 0.7px; text-transform: uppercase; margin-bottom: 6px;
        }
        h1 { font-size: 32px; font-weight: 500; letter-spacing: -0.01em; margin-bottom: 6px; }
        .subtitle { font-size: 16px; color: var(--hp-text-sub); line-height: 1.5; margin-bottom: 28px; }
        .error-box {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 12px 16px; margin-bottom: 20px;
            background: rgba(179,38,43,0.12); border: 1px solid rgba(248,113,113,0.3);
            border-radius: var(--r-lg); font-size: 14px; color: #f87171;
        }
        label { display: block; font-size: 14px; font-weight: 600; color: var(--hp-text-sub); margin-bottom: 6px; }
        input[type="text"], input[type="password"], input[type="number"] {
            width: 100%; padding: 12px 16px;
            border: 1px solid var(--hp-border-strong); border-radius: var(--r-md);
            background: var(--hp-surface-2); font-family: inherit; font-size: 16px;
            color: var(--hp-text); margin-bottom: 16px; transition: border-color 0.15s; outline: none;
        }
        input:focus { border-color: var(--hp-blue-bright); }
        .gender-label { margin-bottom: 8px; }
        .gender-group { display: flex; gap: 10px; margin-bottom: 16px; }
        .gender-option { flex: 1; position: relative; }
        .gender-option input[type="radio"] { position: absolute; opacity: 0; width: 0; height: 0; }
        .gender-option label {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 12px; border: 1px solid var(--hp-border-strong);
            border-radius: var(--r-md); background: var(--hp-surface-2);
            cursor: pointer; font-size: 14px; font-weight: 600;
            color: var(--hp-text-sub); transition: all 0.15s; margin: 0;
        }
        .gender-option input:checked + label {
            border-color: var(--hp-blue); background: var(--hp-blue-soft); color: var(--hp-blue-bright);
        }
        .gender-option label:hover { border-color: var(--hp-blue-bright); }
        .btn-primary {
            width: 100%; height: 44px; background: var(--hp-blue); color: white;
            border: none; border-radius: var(--r-md);
            font-family: inherit; font-size: 13px; font-weight: 600;
            letter-spacing: 0.7px; text-transform: uppercase;
            cursor: pointer; margin-bottom: 10px; transition: background 0.15s;
        }
        .btn-primary:hover { background: var(--hp-blue-deep); }
        .btn-secondary {
            display: block; width: 100%; height: 44px; line-height: 44px;
            background: transparent; color: var(--hp-text-sub);
            border: 1px solid var(--hp-border-strong); border-radius: var(--r-md);
            font-family: inherit; font-size: 13px; font-weight: 600;
            letter-spacing: 0.7px; text-transform: uppercase;
            text-align: center; text-decoration: none; transition: border-color 0.15s, color 0.15s;
        }
        .btn-secondary:hover { border-color: var(--hp-blue-bright); color: var(--hp-blue-bright); }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="logo-icon">
            <svg viewBox="0 0 16 16"><path d="M2 2h3v3H2zm0 4.5h3v3H2zm0 4.5h3v3H2zM6.5 2h3v3h-3zm0 4.5h3v3h-3zm0 4.5h3v3h-3zM11 2h3v3h-3zm0 4.5h3v3H11zm0 4.5h3v3H11z"/></svg>
        </div>
        <span class="logo-text">CineMatch</span>
    </div>

    <p class="eyebrow">Create Account</p>
    <h1>회원가입</h1>
    <p class="subtitle">가입 정보는 DB에 저장되며, 이후 영화 추천 알고리즘에 활용됩니다.</p>

    <div class="error-box" th:if="${signupError}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
        </svg>
        <span th:text="${signupError}">오류</span>
    </div>

    <form th:action="@{/signup}" method="post">
        <label for="id">아이디</label>
        <input id="id" name="id" type="text" placeholder="사용할 아이디를 입력하세요" required autocomplete="username">

        <label for="pw">비밀번호</label>
        <input id="pw" name="pw" type="password" placeholder="비밀번호를 입력하세요" required autocomplete="new-password">

        <label for="nickname">NickName</label>
        <input id="nickname" name="nickname" type="text" placeholder="NickName을 입력하세요" required maxlength="100" autocomplete="nickname">

        <p class="gender-label" style="font-size:0.875rem;font-weight:700;color:var(--text-sub)">성별</p>
        <div class="gender-group">
            <div class="gender-option">
                <input id="male" name="gender" type="radio" value="MALE" required>
                <label for="male">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="10" cy="14" r="5"/><path d="M19 5l-5.5 5.5M19 5h-4M19 5v4"/>
                    </svg>
                    남성
                </label>
            </div>
            <div class="gender-option">
                <input id="female" name="gender" type="radio" value="FEMALE">
                <label for="female">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="9" r="5"/><path d="M12 14v6M9 17h6"/>
                    </svg>
                    여성
                </label>
            </div>
        </div>

        <label for="age">나이</label>
        <input id="age" name="age" type="number" min="1" max="120" placeholder="나이를 입력하세요" required>

        <button class="btn-primary" type="submit">가입 완료</button>
        <a class="btn-secondary" th:href="@{/login}">로그인으로 돌아가기</a>
    </form>
</div>
</body>
</html>
