<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나중에 볼래요 | CineMatch</title>
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <style>
        :root {
            --blue: #0048FF;
            --blue-soft: #EEF2FF;
            --bg: #F7F8FC;
            --surface: #FFFFFF;
            --text: #0F172A;
            --text-hint: #94A3B8;
            --border: rgba(15,23,42,0.08);
            --shadow-sm: 0 2px 8px rgba(0,72,255,0.06);
            --shadow-lg: 0 20px 48px rgba(0,72,255,0.14);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        body.modal-open { overflow: hidden; }
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            height: 64px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        .back-btn, .logout-btn {
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .back-btn { color: var(--blue); }
        .navbar-right { display: flex; align-items: center; gap: 12px; }
        .user-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: var(--blue-soft);
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--blue);
            text-decoration: none;
        }
        .user-badge-btn {
            border: none;
            cursor: pointer;
            font: inherit;
        }
        .logout-btn {
            color: white;
            background: var(--text);
            padding: 8px 18px;
            border-radius: 999px;
        }
        .page {
            max-width: 1280px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }
        .hero {
            margin-bottom: 28px;
            padding: 34px;
            border-radius: 28px;
            background: linear-gradient(135deg, #0048FF 0%, #2563EB 60%, #0EA5E9 100%);
            color: white;
        }
        .hero p {
            opacity: 0.78;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-size: 0.78rem;
            font-weight: 700;
        }
        .hero h1 {
            font-size: clamp(2rem, 4vw, 2.8rem);
            line-height: 1.1;
            letter-spacing: -0.04em;
            margin-bottom: 8px;
        }
        .hero span { color: rgba(255,255,255,0.82); }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 20px;
        }
        .movie-card {
            display: block;
            text-decoration: none;
            color: inherit;
            border-radius: 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }
        .movie-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(0,72,255,0.24);
        }
        .poster-wrap {
            aspect-ratio: 2/3;
            overflow: hidden;
            background: linear-gradient(135deg, #EEF2FF, #DBEAFE);
        }
        .poster {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .poster-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 16px;
            color: var(--blue);
            font-size: 0.84rem;
            font-weight: 800;
        }
        .card-body {
            padding: 13px 14px 15px;
        }
        .card-title {
            font-size: 0.92rem;
            font-weight: 800;
            line-height: 1.4;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-sub {
            font-size: 0.78rem;
            color: var(--text-hint);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .empty {
            padding: 52px;
            text-align: center;
            color: var(--text-hint);
            border: 1px dashed rgba(0,72,255,0.2);
            border-radius: 20px;
            background: rgba(255,255,255,0.7);
        }
        .social-modal-backdrop { position:fixed; inset:0; z-index:200; display:flex; align-items:center; justify-content:center; padding:24px; background:rgba(2,6,23,0.76); backdrop-filter:blur(12px); opacity:0; pointer-events:none; transition:opacity .18s ease; }
        .social-modal-backdrop.open { opacity:1; pointer-events:auto; }
        .social-modal-card { width:min(520px,100%); max-height:min(82vh,760px); display:flex; flex-direction:column; padding:20px; border-radius:28px; background:linear-gradient(180deg, rgba(10,17,30,.98), rgba(13,22,39,.98)); border:1px solid rgba(148,163,184,.16); box-shadow:0 32px 70px rgba(2,6,23,.5); color:#f8fafc; }
        .social-modal-head { display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:14px; }
        .social-modal-title { font-size:1.06rem; font-weight:900; letter-spacing:-.02em; }
        .social-close { width:42px; height:42px; border:none; border-radius:50%; background:rgba(255,255,255,.08); color:#fff; font-size:1.4rem; cursor:pointer; }
        .social-search { width:100%; height:44px; padding:0 14px; border-radius:14px; border:1px solid rgba(148,163,184,.14); background:rgba(255,255,255,.06); color:#fff; font:inherit; outline:none; }
        .social-search::placeholder { color:rgba(203,213,225,.58); }
        .social-modal-body { margin-top:14px; overflow:auto; display:grid; gap:10px; }
        .social-user-card { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:12px; border-radius:18px; background:rgba(255,255,255,.04); border:1px solid rgba(148,163,184,.1); }
        .social-user-main { display:flex; align-items:center; gap:12px; min-width:0; }
        .social-user-link { display:flex; align-items:center; gap:12px; min-width:0; flex:1; color:inherit; text-decoration:none; cursor:pointer; }
        .social-user-link:hover .social-user-id,
        .social-user-link:hover .social-user-name { color:#dbeafe; text-decoration:underline; }
        .social-user-link:hover .social-user-avatar { filter:brightness(1.08); }
        .social-user-avatar { width:52px; height:52px; border-radius:50%; overflow:hidden; background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03)); flex:0 0 auto; }
        .social-user-avatar img { width:100%; height:100%; object-fit:cover; display:block; }
        .social-user-fallback { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
        .social-user-fallback svg { width:32px; height:32px; fill:#c4ccd7; }
        .social-user-copy { min-width:0; }
        .social-user-id { font-weight:800; }
        .social-user-name { color:#cbd5e1; font-size:.8rem; margin-top:2px; }
        .social-user-meta { color:#94a3b8; font-size:.76rem; margin-top:6px; }
        .social-action-btn { min-width:92px; height:38px; padding:0 14px; border:none; border-radius:999px; background:rgba(255,255,255,.92); color:#0f172a; font:inherit; font-weight:800; cursor:pointer; }
        .social-action-btn.following { background:rgba(255,255,255,.1); color:#fff; border:1px solid rgba(255,255,255,.12); }
        .social-empty { display:none; padding:24px; border-radius:16px; text-align:center; color:#94a3b8; background:rgba(255,255,255,.03); border:1px dashed rgba(148,163,184,.18); }
        .social-empty.visible { display:block; }
        @media (max-width: 640px) {
            .navbar { padding: 0 16px; }
            .page { padding: 24px 16px 56px; }
            .hero { padding: 24px; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <a class="back-btn" th:href="@{/mypage}">MyPage로 돌아가기</a>
    <div class="navbar-right">
        <button class="user-badge user-badge-btn" type="button" data-social-open="suggested">People</button>
        <a class="user-badge" th:href="@{/mypage}">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            <span th:text="${loginUserNickname}">nickname</span>
        </a>
        <a class="logout-btn" th:href="@{/logout}">로그아웃</a>
    </div>
</nav>

<main class="page">
    <section class="hero">
        <p>Later List</p>
        <h1>나중에 볼래요</h1>
        <span th:text="|${loginUserNickname}님이 저장해둔 영화 목록|">저장 목록</span>
    </section>

    <section class="grid" th:if="${!#lists.isEmpty(laterMovies)}">
        <a class="movie-card" th:each="movie : ${laterMovies}" th:href="@{|/movies/${movie.movieCode}|}">
            <div class="poster-wrap">
                <img class="poster"
                     th:if="${!#strings.isEmpty(movie.posterImageUrl)}"
                     th:src="${movie.posterImageUrl}"
                     th:alt="${movie.movieName}">
                <div class="poster-fallback" th:if="${#strings.isEmpty(movie.posterImageUrl)}">
                    <span th:text="${movie.movieName}">영화 제목</span>
                </div>
            </div>
            <div class="card-body">
                <p class="card-title" th:text="${movie.movieName}">영화 제목</p>
                <p class="card-sub" th:text="${#strings.isEmpty(movie.movieNameEn) ? movie.movieCode : movie.movieNameEn}">movie</p>
            </div>
        </a>
    </section>

    <div class="empty" th:if="${#lists.isEmpty(laterMovies)}">
        아직 나중에 볼래요 한 영화가 없습니다.
    </div>
</main>
<div class="social-modal-backdrop" id="social-modal">
    <div class="social-modal-card" role="dialog" aria-modal="true" aria-labelledby="social-modal-title">
        <div class="social-modal-head">
            <div class="social-modal-title" id="social-modal-title">추천 친구</div>
            <button class="social-close" type="button" id="social-modal-close" aria-label="닫기">×</button>
        </div>
        <input class="social-search" id="social-search-input" type="text" placeholder="검색">
        <div class="social-modal-body" id="social-modal-body">
            <article class="social-user-card"
                     th:each="userCard : ${socialSuggestedUsers}"
                     data-social-item
                     data-social-keywords=""
                     th:attr="data-social-keywords=${(userCard.loginId + ' ' + userCard.nickname)}">
                <div class="social-user-main">
                    <a class="social-user-link" th:href="@{|/users/${userCard.loginId}|}">
                        <div class="social-user-avatar">
                            <img th:if="${!#strings.isEmpty(userCard.profileImageUrl)}" th:src="${userCard.profileImageUrl}" th:alt="${userCard.nickname}">
                            <div class="social-user-fallback" th:if="${#strings.isEmpty(userCard.profileImageUrl)}">
                                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12.2c2.6 0 4.6-2 4.6-4.5S14.6 3.2 12 3.2 7.4 5.2 7.4 7.7s2 4.5 4.6 4.5Zm0 2.3c-4.1 0-7.5 2.4-8.3 5.8-.1.5.2.9.7.9h15.2c.5 0 .8-.4.7-.9-.8-3.4-4.2-5.8-8.3-5.8Z"/></svg>
                            </div>
                        </div>
                        <div class="social-user-copy">
                            <div class="social-user-id" th:text="${userCard.loginId}">testuser01</div>
                            <div class="social-user-name" th:text="${userCard.nickname}">nickname</div>
                            <div class="social-user-meta" th:text="|팔로워 ${userCard.followerCount} · 팔로잉 ${userCard.followingCount}|">팔로워 0 · 팔로잉 0</div>
                        </div>
                    </a>
                </div>
                <button class="social-action-btn"
                        type="button"
                        data-follow-toggle
                        th:classappend="${userCard.followingByCurrentUser} ? ' following' : ''"
                        th:attr="data-login-id=${userCard.loginId},data-following=${userCard.followingByCurrentUser}">
                    <span th:text="${userCard.followingByCurrentUser ? '팔로잉' : '팔로우'}">팔로우</span>
                </button>
            </article>
            <div class="social-empty" id="social-empty">표시할 추천 친구가 없습니다.</div>
        </div>
    </div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const modal = document.getElementById('social-modal');
        const searchInput = document.getElementById('social-search-input');
        const closeButton = document.getElementById('social-modal-close');
        const body = document.getElementById('social-modal-body');

        const filterCards = () => {
            const keyword = (searchInput.value || '').trim().toLowerCase();
            const cards = [...body.querySelectorAll('[data-social-item]')];
            let visibleCount = 0;
            cards.forEach((card) => {
                const haystack = (card.dataset.socialKeywords || '').toLowerCase();
                const visible = !keyword || haystack.includes(keyword);
                card.style.display = visible ? 'flex' : 'none';
                if (visible) visibleCount += 1;
            });
            modal.querySelector('#social-empty')?.classList.toggle('visible', visibleCount === 0);
        };

        const setOpen = (open) => {
            modal.classList.toggle('open', open);
            document.body.classList.toggle('modal-open', open);
            if (!open) {
                searchInput.value = '';
                filterCards();
            }
        };

        document.querySelectorAll('[data-social-open="suggested"]').forEach((trigger) => {
            trigger.addEventListener('click', () => setOpen(true));
        });
        closeButton?.addEventListener('click', () => setOpen(false));
        modal?.addEventListener('click', (event) => {
            if (event.target === modal) setOpen(false);
        });
        searchInput?.addEventListener('input', filterCards);

        document.addEventListener('click', async (event) => {
            const followButton = event.target.closest('[data-follow-toggle]');
            if (!followButton || !modal.contains(followButton)) return;
            const loginId = followButton.dataset.loginId;
            const following = followButton.dataset.following === 'true';
            const endpoint = following ? '/api/people/unfollow' : '/api/people/follow';
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8',
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: `loginId=${encodeURIComponent(loginId)}`
            });
            if (!response.ok) {
                alert('팔로우 상태를 변경하지 못했습니다.');
                return;
            }
            const payload = await response.json();
            modal.querySelectorAll(`[data-follow-toggle][data-login-id="${payload.loginId}"]`).forEach((button) => {
                const isFollowing = !!payload.followingByCurrentUser;
                button.dataset.following = String(isFollowing);
                button.classList.toggle('following', isFollowing);
                button.querySelector('span').textContent = isFollowing ? '팔로잉' : '팔로우';
            });
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && modal.classList.contains('open')) {
                setOpen(false);
            }
        });

        filterCards();
    });
</script>
</body>
</html>
