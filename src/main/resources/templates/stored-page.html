<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>찜한 영화 | CineMatch</title>
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <style>
        :root {
            --blue: #0048FF;
            --blue-mid: #C7D2FE;
            --bg: #F7F8FC;
            --surface: #FFFFFF;
            --text: #0F172A;
            --text-hint: #94A3B8;
            --border: rgba(15,23,42,0.08);
            --shadow-sm: 0 2px 8px rgba(0,72,255,0.06);
            --shadow-lg: 0 20px 48px rgba(0,72,255,0.14);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .navbar {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 32px; height: 64px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        .back-btn, .logout-btn {
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .back-btn { color: var(--blue); }
        .navbar-right { display: flex; align-items: center; gap: 12px; }
        .user-badge {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 14px; background: #eef2ff;
            border-radius: 999px; font-size: 0.875rem; font-weight: 600; color: var(--blue);
            text-decoration: none; transition: background 0.15s, transform 0.15s;
        }
        .user-badge:hover { background: #dfe7ff; transform: translateY(-1px); }
        .logout-btn {
            color: white;
            background: var(--text);
            padding: 8px 18px;
            border-radius: 999px;
        }
        .page {
            max-width: 1280px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }
        .hero {
            margin-bottom: 28px;
            padding: 34px;
            border-radius: 28px;
            background: linear-gradient(135deg, #0048FF 0%, #2563EB 60%, #0EA5E9 100%);
            color: white;
        }
        .hero p {
            opacity: 0.78;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-size: 0.78rem;
            font-weight: 700;
        }
        .hero h1 {
            font-size: clamp(2rem, 4vw, 2.8rem);
            line-height: 1.1;
            letter-spacing: -0.04em;
            margin-bottom: 8px;
        }
        .hero span { color: rgba(255,255,255,0.82); }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(168px, 1fr));
            gap: 20px;
        }
        .card {
            display: block;
            text-decoration: none;
            color: inherit;
            border-radius: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: transform 220ms cubic-bezier(0.34,1.56,0.64,1), box-shadow 220ms ease, border-color 220ms ease;
        }
        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--shadow-lg);
            border-color: var(--blue-mid);
        }
        .card-poster-wrap {
            position: relative;
            aspect-ratio: 2/3;
            overflow: hidden;
        }
        .poster {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .poster-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, #EEF2FF, #DBEAFE);
            color: var(--blue);
            font-size: 0.82rem;
            font-weight: 700;
            text-align: center;
            padding: 16px;
        }
        .poster-fallback svg { width: 32px; height: 32px; opacity: 0.35; }
        .rank-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 2;
            width: 32px;
            height: 32px;
            background: var(--blue);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
            font-weight: 900;
            box-shadow: 0 2px 10px rgba(0,72,255,0.45);
        }
        .card-body { padding: 13px 14px 15px; }
        .card-title {
            font-size: 0.92rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-sub {
            font-size: 0.78rem;
            color: var(--text-hint);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .empty {
            padding: 52px;
            text-align: center;
            color: var(--text-hint);
            border: 1px dashed var(--blue-mid);
            border-radius: 20px;
            background: rgba(255,255,255,0.7);
        }
        @media (max-width: 640px) {
            .navbar { padding: 0 16px; }
            .page { padding: 24px 16px 56px; }
            .hero { padding: 24px; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <a class="back-btn" th:href="@{/mypage}">MyPage로 돌아가기</a>
    <div class="navbar-right">
        <a class="user-badge" th:href="@{/mypage}">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            <span th:text="${loginUserNickname}">nickname</span>
        </a>
        <a class="logout-btn" th:href="@{/logout}">로그아웃</a>
    </div>
</nav>

<main class="page">
    <section class="hero">
        <p>Stored Movies</p>
        <h1>내가 찜한 영화</h1>
        <span th:text="|${loginUserNickname}님의 저장 목록|">저장 목록</span>
    </section>

    <section class="grid" th:if="${!#lists.isEmpty(storedMovies)}">
        <a class="card" th:each="movie : ${storedMovies}" th:href="@{|/movies/${movie.movieCode}|}">
            <div class="card-poster-wrap">
                <div class="rank-badge" th:text="${movie.ranking}">1</div>
                <img class="poster"
                     th:if="${!#strings.isEmpty(movie.posterImageUrl)}"
                     th:src="${movie.posterImageUrl}"
                     th:alt="${movie.movieName}">
                <div class="poster-fallback" th:if="${#strings.isEmpty(movie.posterImageUrl)}">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18 4H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2zM8 8h3v4H8V8zm0 6h8v1H8v-1zm0 2h8v1H8v-1zm5-8h3v4h-3V8z"/>
                    </svg>
                    <span th:text="${movie.movieName}">영화 제목</span>
                </div>
            </div>
            <div class="card-body">
                <p class="card-title" th:text="${movie.movieName}">영화 제목</p>
                <p class="card-sub" th:text="${#strings.isEmpty(movie.movieNameEn) ? movie.movieCode : movie.movieNameEn}">movie</p>
            </div>
        </a>
    </section>

    <div class="empty" th:if="${#lists.isEmpty(storedMovies)}">
        아직 찜한 영화가 없습니다.
    </div>
</main>
</body>
</html>
