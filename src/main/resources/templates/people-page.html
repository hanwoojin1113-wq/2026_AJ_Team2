<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>친구 | CineMatch</title>
    <link rel="stylesheet" href="/css/hp-theme.css">
    <style>
        :root {
            --bg: var(--hp-bg); --surface: var(--hp-surface);
            --border: var(--hp-border); --sub: var(--hp-text-sub);
            --blue: var(--hp-blue); --shadow: var(--hp-shadow-lg);
        }

        .page {
            max-width: 1360px;
            margin: 0 auto;
            padding: 28px 20px 56px;
        }

        /* ── 프로필 히어로 ── */
        .hero {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 24px;
            flex-wrap: wrap;
            padding: 22px 24px;
            border-radius: var(--r-xl);
            background: var(--hp-surface);
            border: 1px solid var(--hp-border);
            border-left: 4px solid var(--hp-blue);
        }

        .profile-summary { display: flex; gap: 16px; align-items: center; }

        .avatar {
            width: 72px; height: 72px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.14);
            flex: 0 0 auto;
            background: rgba(255,255,255,0.08);
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .avatar-fallback {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.7rem; font-weight: 900; color: #fff;
            background: var(--hp-surface-2);
        }

        .profile-copy h1 {
            font-size: clamp(1.4rem, 2.5vw, 2rem);
            letter-spacing: -0.03em;
            line-height: 1.15;
        }
        .profile-copy .login-id {
            margin-top: 3px;
            color: rgba(255,255,255,0.45);
            font-size: 0.82rem;
        }

        .stats { display: flex; gap: 8px; margin-top: 10px; }

        .stat-link {
            display: inline-flex;
            flex-direction: column;
            gap: 2px;
            min-width: 90px;
            padding: 7px 12px;
            border-radius: 10px;
            text-decoration: none;
            color: #fff;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            transition: background 0.15s;
        }
        .stat-link:hover { background: rgba(255,255,255,0.12); }
        .stat-count { font-size: 0.95rem; font-weight: 900; }
        .stat-label { font-size: 0.7rem; color: rgba(255,255,255,0.55); }

        .hero-actions { display: flex; gap: 8px; align-items: center; }

        .action-btn {
            display: inline-flex; align-items: center; justify-content: center;
            height: 38px; padding: 0 18px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.16);
            background: rgba(12,19,32,0.3);
            color: #fff; font: inherit; font-size: 0.84rem; font-weight: 700;
            cursor: pointer; text-decoration: none;
            transition: background 0.15s;
        }
        .action-btn:hover { background: rgba(255,255,255,0.09); }
        .action-btn.primary { background: var(--hp-blue); border-color: var(--hp-blue); }
        .action-btn.primary:hover { background: #0339b8; }

        /* ── 섹션 공통 ── */
        .section {
            margin-top: 16px;
            padding: 18px 20px;
            border-radius: 18px;
            background: var(--surface);
            border: 1px solid var(--border);
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .section-head h2 {
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.55);
        }

        /* ── 검색 바 ── */
        .search-form { display: flex; gap: 8px; }
        .search-input {
            flex: 1;
            height: 42px; padding: 0 18px;
            border-radius: 999px;
            border: 1px solid rgba(148,163,184,0.16);
            background: rgba(255,255,255,0.05);
            color: #fff; font: inherit; font-size: 0.88rem;
            outline: none;
            transition: border-color 0.15s;
        }
        .search-input:focus { border-color: rgba(2,74,216,0.45); }
        .search-input::placeholder { color: rgba(159,176,199,0.45); }
        .search-submit {
            height: 42px; padding: 0 20px;
            border: none; border-radius: 999px;
            background: var(--hp-blue); color: #fff;
            font: inherit; font-size: 0.82rem; font-weight: 700;
            cursor: pointer; transition: background 0.15s;
        }
        .search-submit:hover { background: #0339b8; }

        /* ── 팔로워/팔로잉 2단 ── */
        .rel-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        .rel-col {
            padding: 16px;
            border-radius: 14px;
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(148,163,184,0.09);
        }

        .rel-col-head {
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.45);
            margin-bottom: 10px;
        }

        .rel-list { display: flex; flex-direction: column; gap: 6px; }

        /* ── 카드 그리드 (추천/검색) ── */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 8px;
        }

        /* ── 사용자 카드 공통 ── */
        .user-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(255,255,255,0.035);
            border: 1px solid rgba(148,163,184,0.09);
            transition: border-color 0.15s, background 0.15s;
        }
        .user-card:hover { background: rgba(255,255,255,0.06); border-color: rgba(148,163,184,0.18); }

        .user-main { display: flex; gap: 9px; min-width: 0; flex: 1; align-items: center; }

        .user-avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            overflow: hidden;
            background: rgba(255,255,255,0.07);
            flex: 0 0 auto;
        }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .user-avatar-fallback {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; font-weight: 900; color: #fff;
            background: var(--hp-surface-2);
        }

        .user-copy { min-width: 0; }
        .user-link { text-decoration: none; color: inherit; }
        .user-link:hover .user-name { color: #93c5fd; }
        .user-name { font-weight: 800; font-size: 0.86rem; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-id { margin-top: 1px; color: var(--sub); font-size: 0.75rem; }

        .user-badges { display: flex; gap: 4px; margin-top: 4px; }
        .badge {
            display: inline-flex; align-items: center;
            height: 16px; padding: 0 6px;
            border-radius: 999px;
            font-size: 0.64rem; font-weight: 700; letter-spacing: 0.03em;
        }
        .badge-follows-me {
            background: rgba(59,130,246,0.15);
            color: #93c5fd;
            border: 1px solid rgba(59,130,246,0.25);
        }

        .user-actions { display: flex; align-items: center; flex-shrink: 0; }

        .follow-btn {
            height: 32px; padding: 0 13px;
            border: 1px solid var(--hp-border);
            border-radius: 999px;
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.6);
            font: inherit; font-size: 0.76rem; font-weight: 700;
            cursor: pointer; white-space: nowrap;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }
        .follow-btn:hover { background: rgba(255,255,255,0.1); }
        .follow-btn.active { background: var(--hp-blue); color: #fff; border-color: var(--hp-blue); }
        .follow-btn.active:hover { background: #0339b8; }

        .empty {
            padding: 22px;
            border-radius: 12px;
            text-align: center;
            color: var(--sub);
            font-size: 0.84rem;
            background: rgba(255,255,255,0.02);
            border: 1px dashed rgba(148,163,184,0.12);
        }

        @media (max-width: 900px) {
            .rel-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 640px) {
            .page { padding: 14px 12px 48px; }
            .hero { padding: 16px; }
            .cards { grid-template-columns: 1fr; }
            .search-form { flex-direction: column; }
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/app-shell :: shell}"></div>

<main class="page">

    <!-- 프로필 히어로 -->
    <section class="hero">
        <div class="profile-summary">
            <div class="avatar">
                <img th:if="${!#strings.isEmpty(targetUser.profileImageUrl)}"
                     th:src="${targetUser.profileImageUrl}" th:alt="${targetUser.nickname}">
                <div class="avatar-fallback"
                     th:if="${#strings.isEmpty(targetUser.profileImageUrl)}"
                     th:text="${#strings.substring(targetUser.nickname, 0, 1)}">C</div>
            </div>
            <div class="profile-copy">
                <h1 th:text="${targetUser.nickname}">nickname</h1>
                <div class="login-id" th:text="|@${targetUser.loginId}|">@loginId</div>
                <div class="stats">
                    <a class="stat-link" href="#followers">
                        <span class="stat-count" th:text="${targetUser.followerCount}">0</span>
                        <span class="stat-label">팔로워</span>
                    </a>
                    <a class="stat-link" href="#following">
                        <span class="stat-count" th:text="${targetUser.followingCount}">0</span>
                        <span class="stat-label">팔로잉</span>
                    </a>
                </div>
            </div>
        </div>

        <div class="hero-actions">
            <a class="action-btn" th:href="@{/mypage}" th:if="${targetUser.self}">마이페이지</a>
            <form th:if="${!targetUser.self and !targetUser.followedByCurrentUser}"
                  th:action="@{/people/follow}" method="post">
                <input type="hidden" name="loginId" th:value="${targetUser.loginId}">
                <input type="hidden" name="redirectTo" th:value="@{/people(user=${targetUser.loginId})}">
                <button class="action-btn primary" type="submit">팔로우</button>
            </form>
            <form th:if="${!targetUser.self and targetUser.followedByCurrentUser}"
                  th:action="@{/people/unfollow}" method="post">
                <input type="hidden" name="loginId" th:value="${targetUser.loginId}">
                <input type="hidden" name="redirectTo" th:value="@{/people(user=${targetUser.loginId})}">
                <button class="action-btn" type="submit">팔로잉</button>
            </form>
        </div>
    </section>

    <!-- 검색 -->
    <section class="section">
        <form class="search-form" th:action="@{/people}" method="get">
            <input type="hidden" name="user" th:value="${targetUser.loginId}">
            <input class="search-input" type="text" name="query"
                   th:value="${searchQuery}" placeholder="닉네임 또는 아이디로 검색">
            <button class="search-submit" type="submit">검색</button>
        </form>
    </section>

    <!-- 팔로워 / 팔로잉 동시 표시 -->
    <section class="section">
        <div class="rel-grid">
            <div class="rel-col" id="followers">
                <div class="rel-col-head">팔로워</div>
                <div class="rel-list" th:if="${!#lists.isEmpty(followerUsers)}">
                    <article class="user-card" th:each="userCard : ${followerUsers}">
                        <div class="user-main">
                            <a class="user-link" th:href="@{|/users/${userCard.loginId}|}">
                                <div class="user-avatar">
                                    <img th:if="${!#strings.isEmpty(userCard.profileImageUrl)}"
                                         th:src="${userCard.profileImageUrl}" th:alt="${userCard.nickname}">
                                    <div class="user-avatar-fallback"
                                         th:if="${#strings.isEmpty(userCard.profileImageUrl)}"
                                         th:text="${#strings.substring(userCard.nickname, 0, 1)}">C</div>
                                </div>
                            </a>
                            <div class="user-copy">
                                <a class="user-link" th:href="@{|/users/${userCard.loginId}|}">
                                    <div class="user-name" th:text="${userCard.nickname}">nickname</div>
                                    <div class="user-id" th:text="|@${userCard.loginId}|">@loginId</div>
                                </a>
                            </div>
                        </div>
                        <div class="user-actions">
                            <form th:if="${!userCard.followingByCurrentUser}"
                                  th:action="@{/people/follow}" method="post">
                                <input type="hidden" name="loginId" th:value="${userCard.loginId}">
                                <input type="hidden" name="redirectTo"
                                       th:value="@{/people(user=${targetUser.loginId}, query=${searchQuery})}">
                                <button class="follow-btn active" type="submit">팔로우</button>
                            </form>
                            <form th:if="${userCard.followingByCurrentUser}"
                                  th:action="@{/people/unfollow}" method="post">
                                <input type="hidden" name="loginId" th:value="${userCard.loginId}">
                                <input type="hidden" name="redirectTo"
                                       th:value="@{/people(user=${targetUser.loginId}, query=${searchQuery})}">
                                <button class="follow-btn" type="submit">팔로잉</button>
                            </form>
                        </div>
                    </article>
                </div>
                <div class="empty" th:if="${#lists.isEmpty(followerUsers)}">팔로워가 없습니다.</div>
            </div>

            <div class="rel-col" id="following">
                <div class="rel-col-head">팔로잉</div>
                <div class="rel-list" th:if="${!#lists.isEmpty(followingUsers)}">
                    <article class="user-card" th:each="userCard : ${followingUsers}">
                        <div class="user-main">
                            <a class="user-link" th:href="@{|/users/${userCard.loginId}|}">
                                <div class="user-avatar">
                                    <img th:if="${!#strings.isEmpty(userCard.profileImageUrl)}"
                                         th:src="${userCard.profileImageUrl}" th:alt="${userCard.nickname}">
                                    <div class="user-avatar-fallback"
                                         th:if="${#strings.isEmpty(userCard.profileImageUrl)}"
                                         th:text="${#strings.substring(userCard.nickname, 0, 1)}">C</div>
                                </div>
                            </a>
                            <div class="user-copy">
                                <a class="user-link" th:href="@{|/users/${userCard.loginId}|}">
                                    <div class="user-name" th:text="${userCard.nickname}">nickname</div>
                                    <div class="user-id" th:text="|@${userCard.loginId}|">@loginId</div>
                                </a>
                            </div>
                        </div>
                        <div class="user-actions">
                            <form th:if="${!userCard.followingByCurrentUser}"
                                  th:action="@{/people/follow}" method="post">
                                <input type="hidden" name="loginId" th:value="${userCard.loginId}">
                                <input type="hidden" name="redirectTo"
                                       th:value="@{/people(user=${targetUser.loginId}, query=${searchQuery})}">
                                <button class="follow-btn active" type="submit">팔로우</button>
                            </form>
                            <form th:if="${userCard.followingByCurrentUser}"
                                  th:action="@{/people/unfollow}" method="post">
                                <input type="hidden" name="loginId" th:value="${userCard.loginId}">
                                <input type="hidden" name="redirectTo"
                                       th:value="@{/people(user=${targetUser.loginId}, query=${searchQuery})}">
                                <button class="follow-btn" type="submit">팔로잉</button>
                            </form>
                        </div>
                    </article>
                </div>
                <div class="empty" th:if="${#lists.isEmpty(followingUsers)}">팔로잉이 없습니다.</div>
            </div>
        </div>
    </section>

    <!-- 추천 사용자 / 검색 결과 -->
    <section class="section">
        <div class="section-head">
            <h2 th:text="${searchSectionTitle}">추천할 만한 사용자</h2>
        </div>
        <div class="cards" th:if="${!#lists.isEmpty(searchResults)}">
            <article class="user-card" th:each="userCard : ${searchResults}">
                <div class="user-main">
                    <a class="user-link" th:href="@{|/users/${userCard.loginId}|}">
                        <div class="user-avatar">
                            <img th:if="${!#strings.isEmpty(userCard.profileImageUrl)}"
                                 th:src="${userCard.profileImageUrl}" th:alt="${userCard.nickname}">
                            <div class="user-avatar-fallback"
                                 th:if="${#strings.isEmpty(userCard.profileImageUrl)}"
                                 th:text="${#strings.substring(userCard.nickname, 0, 1)}">C</div>
                        </div>
                    </a>
                    <div class="user-copy">
                        <a class="user-link" th:href="@{|/users/${userCard.loginId}|}">
                            <div class="user-name" th:text="${userCard.nickname}">nickname</div>
                            <div class="user-id" th:text="|@${userCard.loginId}|">@loginId</div>
                        </a>
                        <div class="user-badges" th:if="${userCard.followsCurrentUser}">
                            <span class="badge badge-follows-me">팔로우 중</span>
                        </div>
                    </div>
                </div>
                <div class="user-actions">
                    <button class="follow-btn suggest-follow-btn"
                            th:classappend="${!userCard.followingByCurrentUser} ? ' active' : ''"
                            th:data-login-id="${userCard.loginId}"
                            th:data-state="${userCard.followingByCurrentUser} ? 'following' : 'follow'">
                        <span th:text="${userCard.followingByCurrentUser} ? '팔로잉' : '팔로우'">팔로우</span>
                    </button>
                </div>
            </article>
        </div>
        <div class="empty" th:if="${#lists.isEmpty(searchResults)}">표시할 사용자가 없습니다.</div>
    </section>

</main>
<script>
(function () {
    document.querySelectorAll('.suggest-follow-btn').forEach(function (btn) {
        btn.addEventListener('click', async function () {
            const loginId = this.dataset.loginId;
            const isFollowing = this.dataset.state === 'following';
            const endpoint = isFollowing ? '/api/people/unfollow' : '/api/people/follow';
            try {
                const resp = await fetch(endpoint, {
                    method: 'POST',
                    body: new URLSearchParams({ loginId }),
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                });
                if (!resp.ok) return;
                if (isFollowing) {
                    this.classList.add('active');
                    this.querySelector('span').textContent = '팔로우';
                    this.dataset.state = 'follow';
                } else {
                    this.classList.remove('active');
                    this.querySelector('span').textContent = '팔로잉';
                    this.dataset.state = 'following';
                }
            } catch (_) {}
        });
    });
})();
</script>
</body>
</html>
