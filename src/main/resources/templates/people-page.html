<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>친구 | CineMatch</title>
    <link rel="stylesheet" href="/css/hp-theme.css">
    <style>
        :root {
            --bg: var(--hp-bg); --surface: var(--hp-surface); --surface-soft: rgba(255,255,255,0.04);
            --border: var(--hp-border); --text: var(--hp-text); --sub: var(--hp-text-sub);
            --blue: var(--hp-blue); --blue-soft: var(--hp-blue-soft); --shadow: var(--hp-shadow-lg);
        }
        .nav {
            position: sticky; top: 0; z-index: 200;
            display: flex; align-items: center; justify-content: space-between; gap: 16px;
            padding: 0 24px; height: 64px;
            background: rgba(15,15,15,0.88); border-bottom: 1px solid var(--hp-border);
            backdrop-filter: blur(18px);
        }

        .nav a {
            text-decoration: none;
            color: #fff;
            font-weight: 800;
        }

        .nav-right {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .pill {
            padding: 8px 14px;
            border-radius: var(--r-md);
            background: var(--hp-surface-2);
            border: 1px solid var(--hp-border);
        }

        .logout {
            background: var(--hp-blue) !important;
            color: #fff !important;
            border: none !important;
            font-size: 12px; letter-spacing: 0.7px; text-transform: uppercase;
        }
        .post-create-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            color: #fff;
            text-decoration: none;
            transition: background 0.2s;
            margin-right: 8px;
        }
        .post-create-btn:hover { background: rgba(255,255,255,0.2); }
        .notif-wrap { position: relative; }
        .notif-btn { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; border: none; background: rgba(255,255,255,0.08); color: white; cursor: pointer; transition: background 0.15s; }
        .notif-btn:hover { background: rgba(255,255,255,0.15); }
        .notif-badge { position: absolute; top: 4px; right: 4px; min-width: 16px; height: 16px; padding: 0 3px; border-radius: 999px; background: #EF4444; color: white; font-size: 0.65rem; font-weight: 900; display: flex; align-items: center; justify-content: center; }
        .notif-badge:empty { display: none; }
        .notif-panel { position: absolute; top: calc(100% + 10px); right: 0; width: 360px; max-height: 480px; border-radius: var(--r-xl); background: var(--hp-surface); border: 1px solid var(--hp-border); box-shadow: var(--hp-shadow-lg); z-index: 9999; overflow: hidden; display: flex; flex-direction: column; }
        .notif-panel[hidden] { display: none; }
        .notif-panel-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; border-bottom: 1px solid rgba(148,163,184,0.1); font-weight: 800; font-size: 0.95rem; flex-shrink: 0; }
        .notif-read-all-btn { border: none; background: none; color: #60A5FA; font-size: 0.78rem; font-weight: 700; cursor: pointer; padding: 4px 8px; border-radius: 6px; font-family: inherit; }
        .notif-read-all-btn:hover { background: rgba(96,165,250,0.1); }
        .notif-list { overflow-y: auto; flex: 1; }
        .notif-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-bottom: 1px solid rgba(148,163,184,0.07); text-decoration: none; color: inherit; transition: background 0.12s; }
        .notif-item:hover { background: rgba(255,255,255,0.04); }
        .notif-item.unread { background: rgba(0,72,255,0.07); }
        .notif-item.unread:hover { background: rgba(0,72,255,0.12); }
        .notif-avatar { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.12); flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1rem; color: white; }
        .notif-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .notif-content { flex: 1; min-width: 0; }
        .notif-text { font-size: 0.83rem; line-height: 1.45; color: #CBD5E1; }
        .notif-text strong { color: white; font-weight: 700; }
        .notif-time { margin-top: 3px; font-size: 0.73rem; color: #64748B; }
        .notif-movie-thumb { width: 46px; height: 64px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: rgba(255,255,255,0.06); }
        .notif-empty { padding: 40px 20px; text-align: center; color: #64748B; font-size: 0.88rem; }

        .page {
            max-width: 1360px;
            margin: 0 auto;
            padding: 28px 20px 56px;
        }

        .hero {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 24px;
            flex-wrap: wrap;
            padding: 24px;
            border-radius: var(--r-xl);
            background: var(--hp-surface);
            border: 1px solid var(--hp-border);
            border-left: 4px solid var(--hp-blue);
        }

        .profile-summary {
            display: flex;
            gap: 18px;
            align-items: flex-start;
        }

        .avatar {
            width: 92px;
            height: 92px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.16);
            box-shadow: 0 14px 34px rgba(2, 6, 23, 0.28);
            flex: 0 0 auto;
            background: rgba(255, 255, 255, 0.12);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .avatar-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 900;
            color: #fff;
            background: var(--hp-surface-2);
        }

        .profile-copy p {
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .profile-copy h1 {
            margin-top: 8px;
            font-size: clamp(2rem, 4vw, 3rem);
            letter-spacing: -0.04em;
        }

        .profile-copy span {
            display: block;
            margin-top: 10px;
            color: rgba(255, 255, 255, 0.82);
            line-height: 1.65;
        }

        .stats {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        .stat-link {
            display: inline-flex;
            flex-direction: column;
            gap: 4px;
            min-width: 110px;
            padding: 10px 12px;
            border-radius: 16px;
            text-decoration: none;
            color: #fff;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.16);
        }

        .stat-link.active {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .stat-count {
            font-size: 0.98rem;
            font-weight: 900;
        }

        .stat-label {
            font-size: 0.76rem;
            color: rgba(255, 255, 255, 0.74);
        }

        .hero-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 44px;
            padding: 0 18px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(12, 19, 32, 0.34);
            color: #fff;
            font: inherit;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
        }

        .action-btn.primary {
            background: var(--hp-blue);
            color: #fff;
            border-color: var(--hp-blue);
        }

        .action-btn.self {
            cursor: default;
            background: rgba(12, 19, 32, 0.28);
        }

        .section {
            margin-top: 24px;
            padding: 22px;
            border-radius: 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .section-head h2 {
            font-size: 1.08rem;
            font-weight: 900;
            letter-spacing: -0.02em;
        }

        .section-head p {
            margin-top: 6px;
            color: var(--sub);
            line-height: 1.6;
            font-size: 0.9rem;
        }

        .search-form {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 220px;
            height: 48px;
            padding: 0 16px;
            border-radius: 14px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            font: inherit;
            outline: none;
        }

        .search-input::placeholder {
            color: rgba(159, 176, 199, 0.64);
        }

        .search-submit {
            height: 48px;
            padding: 0 18px;
            border: none;
            border-radius: var(--r-md);
            background: var(--hp-blue);
            color: #fff;
            font: inherit;
            font-size: 0.84rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            cursor: pointer;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 14px;
        }

        .user-card {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(148, 163, 184, 0.12);
        }

        .user-main {
            display: flex;
            gap: 12px;
            min-width: 0;
            flex: 1;
        }

        .user-avatar {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.08);
            flex: 0 0 auto;
        }

        .user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .user-avatar-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 900;
            color: #fff;
            background: var(--hp-surface-2);
        }

        .user-copy {
            min-width: 0;
        }

        .user-link {
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }

        .user-link:hover .user-name,
        .user-link:hover .user-id {
            color: #dbeafe;
            text-decoration: underline;
        }

        .user-link:hover .user-avatar {
            filter: brightness(1.08);
        }

        .user-name {
            font-weight: 900;
            line-height: 1.35;
        }

        .user-id {
            margin-top: 2px;
            color: var(--sub);
            font-size: 0.84rem;
        }

        .user-meta {
            margin-top: 8px;
            color: var(--sub);
            font-size: 0.78rem;
            line-height: 1.5;
        }

        .user-actions {
            display: flex;
            align-items: center;
        }

        .follow-btn {
            min-width: 92px;
            height: 40px;
            padding: 0 14px;
            border: 1px solid var(--hp-border);
            border-radius: var(--r-md);
            background: var(--hp-surface-2);
            color: var(--hp-text-sub);
            font: inherit;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            cursor: pointer;
        }

        .follow-btn.active {
            background: var(--hp-blue);
            color: #fff;
            border-color: var(--hp-blue);
        }

        .empty {
            padding: 34px;
            border-radius: 18px;
            text-align: center;
            color: var(--sub);
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed rgba(148, 163, 184, 0.18);
        }

        @media (max-width: 760px) {
            .nav {
                padding: 16px;
            }

            .page {
                padding: 22px 16px 48px;
            }

            .hero {
                padding: 22px;
            }

            .profile-summary {
                width: 100%;
            }

            .hero-actions {
                width: 100%;
            }

            .action-btn {
                width: 100%;
            }

            .cards {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/app-shell :: shell}"></div>

<main class="page">
    <section class="hero">
        <div class="profile-summary">
            <div class="avatar">
                <img th:if="${!#strings.isEmpty(targetUser.profileImageUrl)}" th:src="${targetUser.profileImageUrl}" th:alt="${targetUser.nickname}">
                <div class="avatar-fallback" th:if="${#strings.isEmpty(targetUser.profileImageUrl)}" th:text="${#strings.substring(targetUser.nickname, 0, 1)}">C</div>
            </div>
            <div class="profile-copy">
                <p>Friends</p>
                <h1 th:text="${targetUser.nickname}">nickname</h1>
                <span th:text="|ID ${targetUser.loginId} · 취향이 맞는 친구를 찾고 팔로우 관계를 관리할 수 있어요.|">ID target · 취향이 맞는 친구를 찾고 팔로우 관계를 관리할 수 있어요.</span>
                <div class="stats">
                    <a class="stat-link" th:classappend="${selectedView == 'followers'} ? ' active' : ''"
                       th:href="@{/people(user=${targetUser.loginId}, view='followers', query=${searchQuery})}">
                        <span class="stat-count" th:text="${targetUser.followerCount}">0</span>
                        <span class="stat-label">팔로워</span>
                    </a>
                    <a class="stat-link" th:classappend="${selectedView == 'following'} ? ' active' : ''"
                       th:href="@{/people(user=${targetUser.loginId}, view='following', query=${searchQuery})}">
                        <span class="stat-count" th:text="${targetUser.followingCount}">0</span>
                        <span class="stat-label">팔로잉</span>
                    </a>
                </div>
            </div>
        </div>

        <div class="hero-actions">
            <a class="action-btn" th:href="@{/mypage}" th:if="${targetUser.self}">마이페이지로 돌아가기</a>
            <form th:if="${!targetUser.self and !targetUser.followedByCurrentUser}" th:action="@{/people/follow}" method="post">
                <input type="hidden" name="loginId" th:value="${targetUser.loginId}">
                <input type="hidden" name="redirectTo" th:value="@{/people(user=${targetUser.loginId}, view=${selectedView}, query=${searchQuery})}">
                <button class="action-btn primary" type="submit">팔로우</button>
            </form>
            <form th:if="${!targetUser.self and targetUser.followedByCurrentUser}" th:action="@{/people/unfollow}" method="post">
                <input type="hidden" name="loginId" th:value="${targetUser.loginId}">
                <input type="hidden" name="redirectTo" th:value="@{/people(user=${targetUser.loginId}, view=${selectedView}, query=${searchQuery})}">
                <button class="action-btn" type="submit">팔로잉</button>
            </form>
        </div>
    </section>

    <section class="section">
        <div class="section-head">
            <div>
                <h2>친구 검색</h2>
                <p>로그인 ID 또는 닉네임 일부로 검색해서 바로 팔로우할 수 있습니다.</p>
            </div>
        </div>
        <form class="search-form" th:action="@{/people}" method="get">
            <input type="hidden" name="user" th:value="${targetUser.loginId}">
            <input type="hidden" name="view" th:value="${selectedView}">
            <input class="search-input" type="text" name="query" th:value="${searchQuery}" placeholder="testuser01, movieadmin, 닉네임 검색">
            <button class="search-submit" type="submit">검색</button>
        </form>
    </section>

    <section class="section">
        <div class="section-head">
            <div>
                <h2 th:text="${searchSectionTitle}">검색 결과</h2>
                <p th:text="${#strings.isEmpty(searchQuery) ? '검색어가 없으면 다른 사용자를 먼저 보여줍니다.' : '현재 검색어와 일치하는 사용자 목록입니다.'}">검색 결과 설명</p>
            </div>
        </div>
        <div class="cards" th:if="${!#lists.isEmpty(searchResults)}">
            <article class="user-card" th:each="userCard : ${searchResults}">
                <div class="user-main">
                    <a class="user-link" th:href="@{|/users/${userCard.loginId}|}">
                        <div class="user-avatar">
                            <img th:if="${!#strings.isEmpty(userCard.profileImageUrl)}" th:src="${userCard.profileImageUrl}" th:alt="${userCard.nickname}">
                            <div class="user-avatar-fallback" th:if="${#strings.isEmpty(userCard.profileImageUrl)}" th:text="${#strings.substring(userCard.nickname, 0, 1)}">C</div>
                        </div>
                    </a>
                    <div class="user-copy">
                        <a class="user-link" th:href="@{|/users/${userCard.loginId}|}">
                            <div class="user-name" th:text="${userCard.nickname}">nickname</div>
                            <div class="user-id" th:text="|@${userCard.loginId}|">@loginId</div>
                        </a>
                        <div class="user-meta" th:text="|팔로워 ${userCard.followerCount} · 팔로잉 ${userCard.followingCount}|">팔로워 0 · 팔로잉 0</div>
                    </div>
                </div>
                <div class="user-actions">
                    <form th:if="${!userCard.followingByCurrentUser}" th:action="@{/people/follow}" method="post">
                        <input type="hidden" name="loginId" th:value="${userCard.loginId}">
                        <input type="hidden" name="redirectTo" th:value="@{/people(user=${targetUser.loginId}, view=${selectedView}, query=${searchQuery})}">
                        <button class="follow-btn active" type="submit">팔로우</button>
                    </form>
                    <form th:if="${userCard.followingByCurrentUser}" th:action="@{/people/unfollow}" method="post">
                        <input type="hidden" name="loginId" th:value="${userCard.loginId}">
                        <input type="hidden" name="redirectTo" th:value="@{/people(user=${targetUser.loginId}, view=${selectedView}, query=${searchQuery})}">
                        <button class="follow-btn" type="submit">팔로잉</button>
                    </form>
                </div>
            </article>
        </div>
        <div class="empty" th:if="${#lists.isEmpty(searchResults)}">표시할 검색 결과가 없습니다.</div>
    </section>

    <section class="section">
        <div class="section-head">
            <div>
                <h2 th:text="${relationshipTitle + ' 목록'}">팔로워 목록</h2>
                <p th:text="|${targetUser.nickname} 사용자의 ${relationshipTitle} 목록입니다.|">관계 목록</p>
            </div>
        </div>
        <div class="cards" th:if="${!#lists.isEmpty(relationshipUsers)}">
            <article class="user-card" th:each="userCard : ${relationshipUsers}">
                <div class="user-main">
                    <a class="user-link" th:href="@{|/users/${userCard.loginId}|}">
                        <div class="user-avatar">
                            <img th:if="${!#strings.isEmpty(userCard.profileImageUrl)}" th:src="${userCard.profileImageUrl}" th:alt="${userCard.nickname}">
                            <div class="user-avatar-fallback" th:if="${#strings.isEmpty(userCard.profileImageUrl)}" th:text="${#strings.substring(userCard.nickname, 0, 1)}">C</div>
                        </div>
                    </a>
                    <div class="user-copy">
                        <a class="user-link" th:href="@{|/users/${userCard.loginId}|}">
                            <div class="user-name" th:text="${userCard.nickname}">nickname</div>
                            <div class="user-id" th:text="|@${userCard.loginId}|">@loginId</div>
                        </a>
                        <div class="user-meta" th:text="|팔로워 ${userCard.followerCount} · 팔로잉 ${userCard.followingCount}|">팔로워 0 · 팔로잉 0</div>
                    </div>
                </div>
                <div class="user-actions">
                    <form th:if="${!userCard.followingByCurrentUser}" th:action="@{/people/follow}" method="post">
                        <input type="hidden" name="loginId" th:value="${userCard.loginId}">
                        <input type="hidden" name="redirectTo" th:value="@{/people(user=${targetUser.loginId}, view=${selectedView}, query=${searchQuery})}">
                        <button class="follow-btn active" type="submit">팔로우</button>
                    </form>
                    <form th:if="${userCard.followingByCurrentUser}" th:action="@{/people/unfollow}" method="post">
                        <input type="hidden" name="loginId" th:value="${userCard.loginId}">
                        <input type="hidden" name="redirectTo" th:value="@{/people(user=${targetUser.loginId}, view=${selectedView}, query=${searchQuery})}">
                        <button class="follow-btn" type="submit">팔로잉</button>
                    </form>
                </div>
            </article>
        </div>
        <div class="empty" th:if="${#lists.isEmpty(relationshipUsers)}">표시할 관계 목록이 아직 없습니다.</div>
    </section>
</main>
<script>
(function () {
    const btn = document.getElementById('notifBtn'), panel = document.getElementById('notifPanel'),
          badge = document.getElementById('notifBadge'), list = document.getElementById('notifList'),
          readAllBtn = document.getElementById('notifReadAll');
    function timeAgo(s) { if (!s) return ''; const d = Math.floor((Date.now() - new Date(s)) / 1000); if (d < 60) return '방금 전'; if (d < 3600) return Math.floor(d/60)+'분 전'; if (d < 86400) return Math.floor(d/3600)+'시간 전'; return Math.floor(d/86400)+'일 전'; }
    function renderItems(items) {
        if (!items || !items.length) { list.innerHTML = '<div class="notif-empty">새 알림이 없습니다</div>'; return; }
        list.innerHTML = items.map(item => {
            const av = item.actorProfileImageUrl ? `<img src="${item.actorProfileImageUrl}" alt="">` : (item.actorNickname||'?')[0];
            const th = item.moviePosterUrl ? `<img class="notif-movie-thumb" src="${item.moviePosterUrl}" alt="">` : '';
            const txt = item.notifText || (item.type === 'FOLLOW' ? `<strong>${item.actorNickname}</strong>님이 회원님을 팔로우하기 시작했습니다` : `<strong>${item.actorNickname}</strong>님이 <strong>${item.movieName}</strong>을(를) 인생영화로 추가했습니다`);
            return `<a class="notif-item${!item.isRead?' unread':''}" href="${item.linkUrl||'#'}"><div class="notif-avatar">${av}</div><div class="notif-content"><div class="notif-text">${txt}</div><div class="notif-time">${timeAgo(item.createdAt)}</div></div>${th}</a>`;
        }).join('');
    }
    function upd(n) { badge.textContent = n > 0 ? (n > 99 ? '99+' : n) : ''; }
    fetch('/api/notifications').then(r => r.ok ? r.json() : null).then(d => { if (d) upd(d.unreadCount); }).catch(()=>{});
    btn.addEventListener('click', e => { e.stopPropagation(); const op = panel.hidden; panel.hidden = !op; if (!op) return; fetch('/api/notifications').then(r => r.ok ? r.json() : null).then(d => { if (!d) return; upd(d.unreadCount); renderItems(d.items); }).catch(()=>{}); });
    readAllBtn.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); fetch('/api/notifications/read-all',{method:'POST'}).then(() => { upd(0); document.querySelectorAll('.notif-item.unread').forEach(el=>el.classList.remove('unread')); }).catch(()=>{}); });
    document.addEventListener('click', e => { if (!panel.hidden && !panel.contains(e.target) && e.target !== btn) panel.hidden = true; });
})();
</script>
</body>
</html>
