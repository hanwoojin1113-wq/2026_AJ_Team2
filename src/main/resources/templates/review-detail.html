<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${review.movieTitle} + ' 리뷰 | CineMatch'">리뷰 | CineMatch</title>
    <link rel="stylesheet" href="/css/hp-theme.css">
    <style>
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 18% 0%, rgba(2,74,216,0.18), transparent 28%),
                linear-gradient(180deg, #0f1117 0%, #090b10 100%);
            color: var(--hp-text);
        }
        .review-page {
            width: min(100%, 860px);
            margin: 0 auto;
            padding: 48px 24px 80px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 18px;
            color: var(--hp-text-sub);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 800;
        }
        .back-link:hover {
            color: #fff;
        }
        .review-card {
            overflow: hidden;
            border: 1px solid var(--hp-border);
            border-radius: var(--r-xl);
            background: rgba(30,35,48,0.92);
            box-shadow: 0 26px 54px rgba(2,6,23,0.34);
        }
        .review-head {
            display: grid;
            grid-template-columns: 96px minmax(0, 1fr);
            gap: 20px;
            padding: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            background: rgba(15,17,23,0.42);
        }
        .poster,
        .poster-fallback {
            width: 96px;
            aspect-ratio: 2 / 3;
            border-radius: var(--r-md);
            object-fit: cover;
            background: rgba(255,255,255,0.08);
        }
        .poster-fallback {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--hp-text-hint);
            font-size: 0.78rem;
            font-weight: 900;
        }
        .movie-title {
            margin: 0;
            font-size: clamp(1.7rem, 4vw, 2.5rem);
            font-weight: 900;
            letter-spacing: 0;
        }
        .meta-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
            color: var(--hp-text-sub);
            font-size: 0.9rem;
            font-weight: 800;
        }
        .author-link {
            color: #fff;
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.35);
        }
        .author-link:hover {
            color: var(--hp-blue-bright);
            border-bottom-color: currentColor;
        }
        .metric {
            display: inline-flex;
            align-items: center;
            min-height: 30px;
            padding: 0 10px;
            border-radius: var(--r-md);
            background: rgba(255,255,255,0.06);
            color: #fff;
        }
        .rating {
            color: #facc15;
        }
        .review-body {
            padding: 26px 28px 30px;
        }
        .review-content {
            margin: 0;
            color: #e2e8f0;
            font-size: 1rem;
            line-height: 1.85;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .review-edit-btn {
            margin-top: 12px;
            border: none; background: transparent; padding: 0;
            color: rgba(255,255,255,0.4); font-size: 0.82rem; font-weight: 600; cursor: pointer;
        }
        .review-edit-btn:hover { color: #60a5fa; }
        .inline-edit-box { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
        .inline-edit-box textarea {
            width: 100%; box-sizing: border-box; padding: 12px 14px;
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px; color: #fff; font: inherit; font-size: 0.9rem;
            resize: vertical; min-height: 100px; outline: none; line-height: 1.6;
        }
        .inline-edit-box textarea:focus { border-color: #024ad8; }
        .inline-edit-actions { display: flex; gap: 8px; justify-content: flex-end; }
        .inline-edit-actions button {
            padding: 0 18px; height: 36px; border-radius: 999px; border: none;
            font: inherit; font-size: 0.82rem; font-weight: 700; cursor: pointer;
        }
        .inline-edit-cancel { background: transparent; border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.6); }
        .inline-edit-save { background: #024ad8; color: #fff; }
        .inline-edit-save:disabled { opacity: 0.5; cursor: not-allowed; }
        .movie-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            margin-top: 26px;
            padding: 0 16px;
            border-radius: var(--r-md);
            background: var(--hp-blue);
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 900;
        }
        @media (max-width: 640px) {
            .review-page {
                padding: 30px 14px 64px;
            }
            .review-head {
                grid-template-columns: 72px minmax(0, 1fr);
                gap: 14px;
                padding: 18px;
            }
            .poster,
            .poster-fallback {
                width: 72px;
            }
            .review-body {
                padding: 22px 18px 24px;
            }
        }
    </style>
</head>
<body data-app-shell-notif="true">
<div th:replace="~{fragments/app-shell :: shell}"></div>

<main class="review-page">
    <a class="back-link" th:href="@{/reviews}">← 리뷰 게시판으로</a>

    <article class="review-card">
        <header class="review-head">
            <img class="poster"
                 th:if="${review.moviePosterUrl != null and !#strings.isEmpty(review.moviePosterUrl)}"
                 th:src="${review.moviePosterUrl}"
                 th:alt="${review.movieTitle}">
            <div class="poster-fallback"
                 th:if="${review.moviePosterUrl == null or #strings.isEmpty(review.moviePosterUrl)}">MOVIE</div>
            <div>
                <h1 class="movie-title" th:text="${review.movieTitle}">영화 제목</h1>
                <div class="meta-row">
                    <a class="author-link"
                       th:href="@{|/users/${review.loginId}|}"
                       th:text="${review.nickname}">작성자</a>
                    <span th:text="${review.createdAt}">2026.05.21</span>
                    <span class="metric rating"
                          th:if="${review.rating != null}"
                          th:text="|★ ${review.rating}/5|">★ 5/5</span>
                    <span class="metric" th:text="|조회 ${review.viewCount}|">조회 0</span>
                    <span class="metric" th:text="|좋아요 ${review.likeCount}|">좋아요 0</span>
                </div>
            </div>
        </header>
        <div class="review-body">
            <p class="review-content" id="reviewContent" th:text="${review.content}" th:attr="data-review-id=${review.reviewId}">리뷰 내용</p>
            <button class="review-edit-btn" type="button" id="reviewEditBtn"
                    th:if="${loginUserId != null and loginUserId == review.loginId}">수정</button>
            <a class="movie-link" th:href="@{|/movies/${review.movieCode}|}">영화 정보 보기</a>
        </div>
    </article>
</main>
<script>
(function () {
    const editBtn = document.getElementById('reviewEditBtn');
    if (!editBtn) return;
    const contentEl = document.getElementById('reviewContent');

    function startInlineEdit(displayEl, currentText, updateUrl, onSave) {
        if (displayEl.nextElementSibling && displayEl.nextElementSibling.classList.contains('inline-edit-box')) return;
        displayEl.style.display = 'none';
        const box = document.createElement('div');
        box.className = 'inline-edit-box';
        const textarea = document.createElement('textarea');
        textarea.maxLength = 1000;
        textarea.value = currentText;
        const actions = document.createElement('div');
        actions.className = 'inline-edit-actions';
        const cancelBtn = document.createElement('button');
        cancelBtn.type = 'button'; cancelBtn.className = 'inline-edit-cancel'; cancelBtn.textContent = '취소';
        const saveBtn = document.createElement('button');
        saveBtn.type = 'button'; saveBtn.className = 'inline-edit-save'; saveBtn.textContent = '저장';
        actions.append(cancelBtn, saveBtn);
        box.append(textarea, actions);
        displayEl.insertAdjacentElement('afterend', box);
        textarea.focus();

        const close = () => { box.remove(); displayEl.style.display = ''; };
        cancelBtn.addEventListener('click', close);
        saveBtn.addEventListener('click', async () => {
            const value = textarea.value.trim();
            if (!value) return;
            saveBtn.disabled = true;
            try {
                const response = await fetch(updateUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'content=' + encodeURIComponent(value)
                });
                if (!response.ok) throw new Error();
                const data = await response.json();
                if (!data.ok) throw new Error();
                onSave(value);
                close();
            } catch (_) {
                alert('수정에 실패했습니다.');
                saveBtn.disabled = false;
            }
        });
    }

    editBtn.addEventListener('click', () => {
        const reviewId = contentEl.dataset.reviewId;
        startInlineEdit(contentEl, contentEl.textContent, `/api/reviews/${reviewId}/update`, (value) => {
            contentEl.textContent = value;
        });
    });
})();
</script>
</body>
</html>
