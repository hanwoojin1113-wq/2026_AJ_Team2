<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영화 배틀 | CineMatch</title>
    <link rel="stylesheet" href="/css/hp-theme.css">
    <style>
        body { min-height: 100vh; background: linear-gradient(180deg, #0f0f0f 0%, #151515 100%); color: var(--hp-text); }
        .battle-page { width: min(100%, 1040px); margin: 0 auto; padding: 40px 24px 80px; }
        .battle-header { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; margin-bottom: 28px; }
        .battle-kicker { color: var(--hp-blue-bright); font-size: 0.76rem; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; }
        .battle-title { margin: 8px 0 6px; font-size: clamp(2rem, 4vw, 3rem); font-weight: 900; }
        .battle-copy { color: var(--hp-text-sub); font-size: 0.95rem; }
        .battle-grid { display: grid; gap: 24px; }
        .battle-card { display: block; color: inherit; background: var(--hp-surface); border: 1px solid var(--hp-border); border-radius: 8px; padding: 20px; transition: border-color 0.2s, transform 0.2s; }
        .battle-card:hover { border-color: rgba(41,110,249,0.45); transform: translateY(-2px); }
        .battle-card-link { display: block; color: inherit; text-decoration: none; }
        .battle-card-label { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 16px; }
        .battle-card-title { font-size: 1rem; font-weight: 800; line-height: 1.35; }
        .battle-card-meta { margin-top: 4px; color: var(--hp-text-hint); font-size: 0.76rem; }
        .battle-type-badge { flex: 0 0 auto; font-size: 0.68rem; font-weight: 900; letter-spacing: 0.08em; padding: 4px 8px; border-radius: 4px; background: var(--hp-blue-soft); color: var(--hp-blue-bright); border: 1px solid rgba(41,110,249,0.24); }
        .battle-preview { display: grid; grid-template-columns: 1fr 44px 1fr; gap: 12px; align-items: center; }
        .battle-option { min-width: 0; border-radius: 8px; background: var(--hp-surface-2); padding: 12px; }
        .battle-poster-wrap { width: 100%; aspect-ratio: 2 / 3; border-radius: 6px; overflow: hidden; background: rgba(255,255,255,0.06); }
        .battle-poster { width: 100%; height: 100%; object-fit: cover; display: block; }
        .battle-option-name { margin-top: 10px; font-size: 0.88rem; font-weight: 800; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .battle-option-result { display: grid; gap: 6px; margin-top: 8px; }
        .battle-option-track { height: 6px; border-radius: 999px; background: rgba(255,255,255,0.1); overflow: hidden; }
        .battle-option-fill { height: 100%; border-radius: 999px; background: var(--hp-blue-bright); }
        .battle-option-percent { color: var(--hp-text-sub); font-size: 0.76rem; font-weight: 800; text-align: right; }
        .battle-vs-badge { display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.08); border: 1px solid var(--hp-border); font-size: 0.72rem; font-weight: 900; color: var(--hp-text-sub); }
        .battle-total-votes { margin-top: 14px; font-size: 0.78rem; color: var(--hp-text-hint); text-align: center; }
        .battle-top-comment { margin-top: 14px; padding: 10px; border-radius: 6px; background: rgba(255,255,255,0.04); color: var(--hp-text-sub); font-size: 0.82rem; line-height: 1.45; }
        .battle-top-comment-meta { display: block; margin-bottom: 4px; color: var(--hp-text-hint); font-size: 0.74rem; font-weight: 800; }
        .battle-card-actions { display: flex; justify-content: flex-end; margin-top: 14px; }
        .battle-share-btn { display: inline-flex; align-items: center; gap: 6px; min-height: 36px; border: 1px solid rgba(41,110,249,0.34); border-radius: 6px; background: rgba(41,110,249,0.12); color: var(--hp-blue-bright); padding: 0 12px; font-size: 0.82rem; font-weight: 900; cursor: pointer; }
        .battle-share-btn:hover { background: rgba(41,110,249,0.2); }
        .battle-login-notice, .battle-empty { margin-bottom: 24px; padding: 14px; border: 1px solid var(--hp-border); border-radius: 8px; color: var(--hp-text-sub); background: var(--hp-surface); text-align: center; font-size: 0.9rem; }
        .battle-login-notice a { color: var(--hp-blue-bright); text-decoration: none; }
        .battle-share-modal[hidden] { display: none; }
        .battle-share-modal { position: fixed; inset: 0; z-index: 80; display: flex; align-items: center; justify-content: center; padding: 24px; background: rgba(0,0,0,0.62); }
        .battle-share-dialog { width: min(100%, 420px); max-height: min(680px, calc(100vh - 48px)); display: flex; flex-direction: column; background: var(--hp-surface); border: 1px solid var(--hp-border); border-radius: 8px; box-shadow: 0 24px 80px rgba(0,0,0,0.45); overflow: hidden; }
        .battle-share-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 18px 20px; border-bottom: 1px solid var(--hp-border); }
        .battle-share-head strong { font-size: 1rem; }
        .battle-share-close { width: 34px; height: 34px; border: 1px solid var(--hp-border); border-radius: 6px; background: var(--hp-surface-2); color: var(--hp-text); cursor: pointer; font-size: 1.1rem; }
        .battle-share-list { display: grid; gap: 8px; padding: 14px; overflow-y: auto; }
        .battle-share-user { display: flex; align-items: center; gap: 12px; width: 100%; border: 1px solid var(--hp-border); border-radius: 8px; background: var(--hp-surface-2); color: var(--hp-text); padding: 10px; text-align: left; cursor: pointer; }
        .battle-share-user:hover { border-color: rgba(41,110,249,0.45); }
        .battle-share-avatar { flex: 0 0 auto; width: 42px; height: 42px; border-radius: 50%; object-fit: cover; background: rgba(255,255,255,0.08); }
        .battle-share-avatar-fallback { display: flex; align-items: center; justify-content: center; color: var(--hp-blue-bright); font-weight: 900; }
        .battle-share-name { display: block; font-size: 0.92rem; font-weight: 900; }
        .battle-share-login { display: block; margin-top: 2px; color: var(--hp-text-hint); font-size: 0.76rem; }
        .battle-share-empty { padding: 28px 16px; color: var(--hp-text-sub); text-align: center; font-size: 0.9rem; }
        @media (min-width: 700px) { .battle-grid { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 640px) {
            .battle-header { align-items: stretch; flex-direction: column; }
            .battle-header .hp-btn { width: 100%; }
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/app-shell :: shell}"></div>

<main class="app-main">
    <div class="battle-page">
        <header class="battle-header">
            <div>
                <p class="battle-kicker">MOVIE BATTLE</p>
                <h1 class="battle-title">영화 배틀</h1>
                <p class="battle-copy">배틀을 열어 투표하고 댓글로 의견을 남겨보세요.</p>
            </div>
            <a th:if="${loginUserId != null}" class="hp-btn hp-btn-primary" th:href="@{/battles/create}">배틀 만들기</a>
        </header>

        <div th:if="${loginUserId == null}" class="battle-login-notice">
            <a th:href="@{/login}">로그인</a>하면 배틀 생성과 투표를 할 수 있습니다.
        </div>

        <div class="battle-grid">
            <article th:each="b : ${battles}" class="battle-card">
                <a class="battle-card-link" th:href="@{|/battles/${b.id}|}">
                <div class="battle-card-label">
                    <div>
                        <div class="battle-card-title" th:text="${b.battleLabel}">배틀 타이틀</div>
                        <div class="battle-card-meta">
                            <span th:text="${b.creatorNickname != null ? b.creatorNickname : '익명'}">작성자</span>
                            <span> · </span>
                            <span th:text="${b.createdAt}">작성일</span>
                        </div>
                    </div>
                    <span class="battle-type-badge">VS</span>
                </div>

                <div class="battle-preview">
                    <div class="battle-option">
                        <div class="battle-poster-wrap">
                            <img class="battle-poster" th:src="${b.optionAImageUrl}" th:alt="${b.optionALabel}" loading="lazy">
                        </div>
                        <div class="battle-option-name" th:text="${b.optionALabel}">선택지 A</div>
                        <div class="battle-option-result">
                            <div class="battle-option-track">
                                <div class="battle-option-fill" th:style="'width:' + ${b.pctA} + '%'"></div>
                            </div>
                            <div class="battle-option-percent" th:text="${b.pctA} + '%'">50%</div>
                        </div>
                    </div>
                    <div class="battle-vs-badge">VS</div>
                    <div class="battle-option">
                        <div class="battle-poster-wrap">
                            <img class="battle-poster" th:src="${b.optionBImageUrl}" th:alt="${b.optionBLabel}" loading="lazy">
                        </div>
                        <div class="battle-option-name" th:text="${b.optionBLabel}">선택지 B</div>
                        <div class="battle-option-result">
                            <div class="battle-option-track">
                                <div class="battle-option-fill" th:style="'width:' + ${b.pctB} + '%'"></div>
                            </div>
                            <div class="battle-option-percent" th:text="${b.pctB} + '%'">50%</div>
                        </div>
                    </div>
                </div>

                <p class="battle-total-votes">
                    총 <span th:text="${b.voteA + b.voteB}"></span>표
                </p>

                <div class="battle-top-comment" th:if="${b.hasTopComment}">
                    <span class="battle-top-comment-meta">
                        추천 <span th:text="${b.topComment.likeCount}">0</span> ·
                        <span th:text="${b.topComment.nickname}">작성자</span>
                    </span>
                    <span th:text="${b.topComment.content}">댓글</span>
                </div>
                </a>
                <div class="battle-card-actions" th:if="${loginUserId != null}">
                    <button class="battle-share-btn" type="button" th:data-battle-id="${b.id}">공유</button>
                </div>
            </article>

            <div th:if="${battles.isEmpty()}" class="battle-empty">
                아직 생성된 배틀이 없습니다.
            </div>
        </div>
    </div>

    <div class="battle-share-modal" id="battleShareModal" hidden>
        <div class="battle-share-dialog" role="dialog" aria-modal="true" aria-labelledby="battleShareTitle">
            <div class="battle-share-head">
                <strong id="battleShareTitle">배틀 공유</strong>
                <button class="battle-share-close" type="button" aria-label="닫기" data-share-close>&times;</button>
            </div>
            <div class="battle-share-list" id="battleShareList">
                <div class="battle-share-empty">공유 대상을 불러오는 중입니다.</div>
            </div>
        </div>
    </div>
</main>

<script>
    document.querySelectorAll('[data-app-nav]').forEach(el => el.classList.remove('active'));
    document.querySelector('[data-app-nav="battle"]')?.classList.add('active');

    const shareModal = document.getElementById('battleShareModal');
    const shareList = document.getElementById('battleShareList');
    let activeShareBattleId = null;

    document.querySelectorAll('.battle-share-btn').forEach(button => {
        button.addEventListener('click', () => openShareModal(button.dataset.battleId));
    });

    document.querySelectorAll('[data-share-close]').forEach(button => {
        button.addEventListener('click', closeShareModal);
    });

    shareModal?.addEventListener('click', event => {
        if (event.target === shareModal) closeShareModal();
    });

    async function openShareModal(battleId) {
        activeShareBattleId = battleId;
        shareModal.hidden = false;
        shareList.innerHTML = '<div class="battle-share-empty">공유 대상을 불러오는 중입니다.</div>';
        try {
            const response = await fetch(`/api/battles/${battleId}/share-targets`);
            if (!response.ok) throw new Error('failed');
            const users = await response.json();
            renderShareTargets(users);
        } catch (error) {
            shareList.innerHTML = '<div class="battle-share-empty">공유 대상을 불러오지 못했습니다.</div>';
        }
    }

    function closeShareModal() {
        shareModal.hidden = true;
        activeShareBattleId = null;
    }

    function renderShareTargets(users) {
        if (!Array.isArray(users) || users.length === 0) {
            shareList.innerHTML = '<div class="battle-share-empty">서로 팔로우 중인 사용자가 없습니다.</div>';
            return;
        }
        shareList.innerHTML = users.map(user => {
            const nickname = escapeHtml(user.nickname || user.loginId || '사용자');
            const loginId = escapeHtml(user.loginId || '');
            const avatar = user.profileImageUrl
                ? `<img class="battle-share-avatar" src="${escapeHtml(user.profileImageUrl)}" alt="">`
                : `<span class="battle-share-avatar battle-share-avatar-fallback">${nickname.charAt(0)}</span>`;
            return `<button class="battle-share-user" type="button" data-user-id="${user.userId}">
                ${avatar}
                <span>
                    <span class="battle-share-name">${nickname}</span>
                    <span class="battle-share-login">${loginId}</span>
                </span>
            </button>`;
        }).join('');
        shareList.querySelectorAll('.battle-share-user').forEach(button => {
            button.addEventListener('click', () => shareBattle(button.dataset.userId));
        });
    }

    async function shareBattle(receiverUserId) {
        if (!activeShareBattleId || !receiverUserId) return;
        try {
            const response = await fetch(`/api/battles/${activeShareBattleId}/share`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ receiverUserId })
            });
            if (!response.ok) throw new Error('failed');
            alert('배틀을 공유했습니다.');
            closeShareModal();
        } catch (error) {
            alert('배틀 공유에 실패했습니다.');
        }
    }

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }
</script>
</body>
</html>
