<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${algorithm.title()} + ' | CineMatch'">랭킹 상세 | CineMatch</title>
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <style>
        :root {
            --blue: #0048FF;
            --bg: #070B14;
            --text: #F8FAFC;
            --text-sub: #CBD5E1;
            --text-hint: #94A3B8;
            --shadow: 0 24px 60px rgba(2,6,23,0.42);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard', 'Segoe UI', sans-serif;
            background:
                radial-gradient(ellipse at top right, rgba(0,72,255,0.13) 0%, transparent 50%),
                #070B14;
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Navbar ── */
        .navbar {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 32px; height: 60px;
            background: rgba(7,11,20,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(148,163,184,0.1);
        }
        .navbar-left { display: flex; align-items: center; gap: 14px; }
        .back-btn {
            display: inline-flex; align-items: center; gap: 5px;
            color: var(--text-hint); text-decoration: none;
            font-size: 0.84rem; font-weight: 700;
            transition: color 0.14s;
        }
        .back-btn:hover { color: white; }
        .back-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
        .navbar-logo {
            display: inline-flex; align-items: center; gap: 9px;
            color: white; text-decoration: none;
            font-size: 1.08rem; font-weight: 900; letter-spacing: -0.03em;
        }
        .logo-mark {
            width: 30px; height: 30px; border-radius: 8px;
            display: inline-flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0048FF, #38BDF8);
        }
        .logo-mark svg { width: 14px; height: 14px; fill: white; }
        .navbar-right { display: flex; align-items: center; gap: 10px; }
        .user-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 7px 13px; border-radius: 999px;
            background: rgba(255,255,255,0.07);
            color: white; text-decoration: none;
            font-size: 0.84rem; font-weight: 700;
        }
        .logout-btn {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 84px; height: 36px; border-radius: 999px;
            background: white; color: #0F172A;
            text-decoration: none; font-size: 0.84rem; font-weight: 800;
        }
        .notif-wrap { position: relative; }
        .notif-btn { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; border: none; background: rgba(255,255,255,0.08); color: white; cursor: pointer; transition: background 0.15s; }
        .notif-btn:hover { background: rgba(255,255,255,0.15); }
        .notif-badge { position: absolute; top: 4px; right: 4px; min-width: 16px; height: 16px; padding: 0 3px; border-radius: 999px; background: #EF4444; color: white; font-size: 0.65rem; font-weight: 900; display: flex; align-items: center; justify-content: center; }
        .notif-badge:empty { display: none; }
        .notif-panel { position: absolute; top: calc(100% + 10px); right: 0; width: 360px; max-height: 480px; border-radius: 16px; background: #111827; border: 1px solid rgba(148,163,184,0.15); box-shadow: 0 24px 60px rgba(2,6,23,0.55); z-index: 9999; overflow: hidden; display: flex; flex-direction: column; }
        .notif-panel[hidden] { display: none; }
        .notif-panel-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; border-bottom: 1px solid rgba(148,163,184,0.1); font-weight: 800; font-size: 0.95rem; flex-shrink: 0; }
        .notif-read-all-btn { border: none; background: none; color: #60A5FA; font-size: 0.78rem; font-weight: 700; cursor: pointer; padding: 4px 8px; border-radius: 6px; font-family: inherit; }
        .notif-read-all-btn:hover { background: rgba(96,165,250,0.1); }
        .notif-list { overflow-y: auto; flex: 1; }
        .notif-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-bottom: 1px solid rgba(148,163,184,0.07); text-decoration: none; color: inherit; transition: background 0.12s; }
        .notif-item:hover { background: rgba(255,255,255,0.04); }
        .notif-item.unread { background: rgba(0,72,255,0.07); }
        .notif-item.unread:hover { background: rgba(0,72,255,0.12); }
        .notif-avatar { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.12); flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1rem; color: white; }
        .notif-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .notif-content { flex: 1; min-width: 0; }
        .notif-text { font-size: 0.83rem; line-height: 1.45; color: #CBD5E1; }
        .notif-text strong { color: white; font-weight: 700; }
        .notif-time { margin-top: 3px; font-size: 0.73rem; color: #64748B; }
        .notif-movie-thumb { width: 46px; height: 64px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: rgba(255,255,255,0.06); }
        .notif-empty { padding: 40px 20px; text-align: center; color: #64748B; font-size: 0.88rem; }

        /* ── Page ── */
        .page { max-width: 1280px; margin: 0 auto; padding: 24px 24px 80px; }

        /* ── Hero ── */
        .hero {
            padding: 32px 40px;
            border-radius: 24px;
            background: linear-gradient(120deg,
                rgba(0,72,255,0.88) 0%,
                rgba(14,165,233,0.72) 52%,
                rgba(10,18,34,0.95) 100%);
            margin-bottom: 28px;
            position: relative; overflow: hidden;
        }
        .hero::after {
            content: ''; position: absolute; right: -20px; bottom: -20px;
            width: 180px; height: 180px; border-radius: 50%;
            background: rgba(255,255,255,0.06); pointer-events: none;
        }
        .hero-top {
            display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
        }
        .hero-cat {
            padding: 4px 11px; border-radius: 999px;
            background: rgba(255,255,255,0.18);
            font-size: 0.74rem; font-weight: 800;
            color: rgba(255,255,255,0.92);
        }
        .hero h1 {
            font-size: clamp(1.7rem, 3.5vw, 2.8rem);
            line-height: 1.06; letter-spacing: -0.04em; margin-bottom: 8px;
        }
        .hero p {
            max-width: 520px;
            color: rgba(255,255,255,0.75); font-size: 0.93rem; line-height: 1.65;
            margin-bottom: 14px;
        }
        .hero-meta {
            display: flex; align-items: center; gap: 18px;
        }
        .hero-meta-item { font-size: 0.8rem; color: rgba(255,255,255,0.68); }
        .hero-meta-item strong { color: white; font-weight: 800; margin-right: 4px; }

        /* ── 뷰 토글 ── */
        .view-bar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px;
        }
        .result-count { font-size: 0.86rem; color: var(--text-hint); }
        .result-count strong { color: var(--text-sub); font-weight: 800; }
        .view-toggle { display: flex; gap: 4px; }
        .view-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(148,163,184,0.15);
            color: var(--text-hint); cursor: pointer;
            transition: all 0.14s ease;
        }
        .view-btn:hover { color: white; }
        .view-btn.active { background: rgba(255,255,255,0.12); color: white; border-color: rgba(255,255,255,0.22); }
        .view-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

        /* ═══════════════════════════════════════════
           GRID VIEW (기본)
        ═══════════════════════════════════════════ */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-bottom: 40px;
        }

        .movie-card {
            display: flex; flex-direction: column;
            text-decoration: none; color: inherit;
        }
        .card-poster {
            position: relative;
            aspect-ratio: 2/3;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(148,163,184,0.1);
            margin-bottom: 8px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .movie-card:hover .card-poster {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .card-poster img {
            width: 100%; height: 100%; display: block; object-fit: cover;
        }
        .card-poster-fallback {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 8px;
            background: linear-gradient(135deg, rgba(0,72,255,0.22), rgba(14,165,233,0.18));
            color: rgba(255,255,255,0.65); font-size: 0.7rem; font-weight: 700; line-height: 1.35;
        }

        /* 순위 오버레이 */
        .card-rank {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 30px 8px 6px;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
            font-size: 1.9rem; font-weight: 900; letter-spacing: -0.05em;
            color: white; line-height: 1;
        }
        .movie-card:nth-child(1) .card-rank { color: #fbbf24; }
        .movie-card:nth-child(2) .card-rank { color: #cbd5e1; }
        .movie-card:nth-child(3) .card-rank { color: #d97706; }

        /* 뱃지 */
        .card-badge {
            position: absolute; top: 6px; left: 6px;
            padding: 2px 6px; border-radius: 5px;
            font-size: 0.6rem; font-weight: 800;
            background: rgba(10,16,28,0.92); color: #fde68a;
            z-index: 2;
        }

        /* 플로팅 호버 프리뷰 */
        .hover-preview {
            position: fixed; z-index: 2000; width: 220px;
            border-radius: 14px; overflow: hidden;
            box-shadow: 0 28px 64px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.08);
            pointer-events: none; opacity: 0; transform: scale(0.88);
            transition: opacity 0.18s ease, transform 0.18s ease;
            background: #0a1425;
        }
        .hover-preview.visible { opacity: 1; transform: scale(1); pointer-events: auto; }
        .hp-poster-wrap { position: relative; aspect-ratio: 2/3; background: #111; }
        .hp-poster-wrap img { width: 100%; height: 100%; display: block; object-fit: cover; }
        .hp-fallback { width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(0,72,255,0.3),rgba(14,165,233,0.2));color:rgba(255,255,255,0.7);font-size:0.8rem;font-weight:700;text-align:center;padding:12px; }
        .hp-rank { position:absolute;bottom:0;left:0;right:0;padding:40px 10px 7px;background:linear-gradient(to top,rgba(0,0,0,0.85),transparent);font-size:2.4rem;font-weight:900;letter-spacing:-0.05em;color:white;line-height:1; }
        .hp-badge { position:absolute;top:8px;left:8px;padding:2px 7px;border-radius:5px;font-size:0.62rem;font-weight:800;background:rgba(10,16,28,0.9);color:#fde68a; }
        .hp-body { padding: 12px 12px 14px; }
        .hp-title { font-size:0.9rem;font-weight:800;line-height:1.35;color:#F8FAFC;margin-bottom:3px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical; }
        .hp-meta { font-size:0.72rem;color:#94A3B8;margin-bottom:8px; }
        .hp-metric { font-size:0.72rem;color:#7DD3FC;margin-bottom:10px;background:rgba(56,189,248,0.1);padding:3px 7px;border-radius:5px;display:inline-block; }
        .hp-actions { display:flex;gap:6px;align-items:center; }
        .hp-btn { flex:1;height:34px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.13s,transform 0.1s;font-size:0; }
        .hp-btn:hover { background:rgba(255,255,255,0.16);transform:scale(1.06); }
        .hp-btn svg { width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none; }
        .hp-btn.active[data-action="like"]       { background:rgba(244,63,94,0.55);border-color:#F43F5E; }
        .hp-btn.active[data-action="dislike"]    { background:rgba(100,116,139,0.55);border-color:#64748B; }
        .hp-btn.active[data-action="later"]      { background:rgba(245,158,11,0.55);border-color:#F59E0B; }
        .hp-btn.active[data-action="collection"] { background:rgba(139,92,246,0.55);border-color:#8B5CF6; }
        .hp-detail-btn { display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:8px;background:white;color:#0F172A;text-decoration:none;flex-shrink:0; }
        .hp-detail-btn svg { width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round; }
        /* 리스트뷰 액션버튼 */
        .cact-btn { width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,0.18);background:rgba(15,23,42,0.75);color:white;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:background 0.14s,transform 0.1s; }
        .cact-btn:hover { transform:scale(1.12); }
        .cact-btn svg { width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;pointer-events:none; }
        .cact-btn.active[data-action="like"]       { background:rgba(244,63,94,0.65);border-color:#F43F5E; }
        .cact-btn.active[data-action="dislike"]    { background:rgba(100,116,139,0.65);border-color:#64748B; }
        .cact-btn.active[data-action="later"]      { background:rgba(245,158,11,0.65);border-color:#F59E0B; }
        .cact-btn.active[data-action="collection"] { background:rgba(139,92,246,0.65);border-color:#8B5CF6; }

        /* 카드 정보 */
        .card-info { padding: 0 2px; }
        .card-title {
            font-size: 0.79rem; font-weight: 700; line-height: 1.35;
            overflow: hidden;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            margin-bottom: 3px; color: var(--text-sub);
        }
        .movie-card:hover .card-title { color: white; }
        .card-year { font-size: 0.69rem; color: var(--text-hint); }

        /* ═══════════════════════════════════════════
           LIST VIEW
        ═══════════════════════════════════════════ */
        .rank-list { display: none; flex-direction: column; gap: 8px; margin-bottom: 40px; }

        .rank-card {
            display: grid;
            grid-template-columns: 52px 76px 1fr auto;
            align-items: center;
            gap: 14px;
            padding: 13px 20px;
            border-radius: 16px;
            background: rgba(12,20,34,0.85);
            border: 1px solid rgba(148,163,184,0.1);
            text-decoration: none; color: inherit;
            transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
        }
        .rank-card:hover {
            transform: translateX(4px);
            border-color: rgba(96,165,250,0.32);
            box-shadow: 0 10px 26px rgba(0,0,0,0.26);
        }
        .rank-no {
            text-align: center;
            font-size: 1.5rem; font-weight: 900; letter-spacing: -0.04em;
            color: var(--text-hint);
        }
        .rank-card:nth-child(1) .rank-no { color: #fbbf24; font-size: 1.8rem; }
        .rank-card:nth-child(2) .rank-no { color: #94a3b8; font-size: 1.6rem; }
        .rank-card:nth-child(3) .rank-no { color: #d97706; font-size: 1.6rem; }
        .rank-poster-wrap {
            aspect-ratio: 2/3; border-radius: 9px; overflow: hidden;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(148,163,184,0.12);
            position: relative;
        }
        .rank-poster { width: 100%; height: 100%; display: block; object-fit: cover; }
        .rank-poster-fallback {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 7px;
            background: linear-gradient(135deg, rgba(0,72,255,0.22), rgba(14,165,233,0.18));
            color: rgba(255,255,255,0.7); font-size: 0.68rem; font-weight: 800;
        }
        .rank-badge {
            position: absolute; left: 5px; top: 5px;
            padding: 2px 6px; border-radius: 5px;
            font-size: 0.6rem; font-weight: 800;
            background: rgba(10,16,28,0.9); color: #fde68a;
        }
        .rank-info { min-width: 0; }
        .rank-title {
            font-size: 1rem; font-weight: 800; line-height: 1.35; margin-bottom: 4px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .rank-sub {
            font-size: 0.78rem; color: var(--text-hint); margin-bottom: 6px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .rank-year {
            display: inline-block;
            font-size: 0.73rem; color: var(--text-hint);
            padding: 2px 8px; border-radius: 999px;
            background: rgba(255,255,255,0.06);
        }
        .rank-metric { text-align: right; flex-shrink: 0; }
        .rank-metric-label { font-size: 0.72rem; color: var(--text-hint); margin-bottom: 4px; }
        .rank-metric-value { font-size: 0.98rem; font-weight: 900; color: white; letter-spacing: -0.02em; }

        /* 전환: body.list-view */
        body.list-view .movie-grid { display: none; }
        body.list-view .rank-list { display: flex; }

        /* ── 빈 결과 ── */
        .empty {
            padding: 52px; text-align: center;
            color: var(--text-hint);
            border: 1px dashed rgba(148,163,184,0.18);
            border-radius: 20px;
        }

        /* ── 연관 차트 ── */
        .related-section { margin-top: 16px; }
        .related-head {
            font-size: 0.96rem; font-weight: 900;
            margin-bottom: 12px; color: var(--text-sub);
        }
        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 10px;
        }
        .related-card {
            display: flex; flex-direction: column;
            padding: 16px 18px 14px;
            border-radius: 14px;
            background: rgba(12,20,34,0.85);
            border: 1px solid rgba(148,163,184,0.1);
            text-decoration: none; color: inherit;
            transition: transform 0.16s ease, border-color 0.16s ease;
        }
        .related-card:hover {
            transform: translateY(-3px);
            border-color: rgba(96,165,250,0.28);
        }
        .related-card-title { font-size: 0.9rem; font-weight: 800; margin-bottom: 5px; }
        .related-card-desc { font-size: 0.76rem; color: var(--text-hint); line-height: 1.5; flex: 1; }
        .related-card-cta {
            display: flex; align-items: center; gap: 4px;
            margin-top: 10px; font-size: 0.74rem; font-weight: 800;
            color: rgba(96,165,250,0.8);
        }
        .related-card-cta svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }

        /* ── 반응형 ── */
        @media (max-width: 1024px) {
            .movie-grid { grid-template-columns: repeat(5, 1fr); }
        }
        @media (max-width: 768px) {
            .navbar { padding: 0 16px; }
            .page { padding: 18px 14px 60px; }
            .hero { padding: 26px 20px; }
            .movie-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
            .card-rank { font-size: 1.5rem; }
            .rank-card { grid-template-columns: 40px 60px 1fr; padding: 10px 14px; }
            .rank-metric { display: none; }
        }
        @media (max-width: 480px) {
            .movie-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-left">
        <a class="back-btn" th:href="@{/ranking}">
            <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
            차트 목록
        </a>
        <a class="navbar-logo" th:href="@{/charts}">
            <span class="logo-mark">
                <svg viewBox="0 0 16 16"><path d="M2 2h3v3H2zm0 4.5h3v3H2zm0 4.5h3v3H2zM6.5 2h3v3h-3zm0 4.5h3v3h-3zm0 4.5h3v3h-3zM11 2h3v3h-3zm0 4.5h3v3H11zm0 4.5h3v3H11z"/></svg>
            </span>
            <span>CineMatch</span>
        </a>
    </div>
    <div class="navbar-right">
        <div class="notif-wrap">
            <button class="notif-btn" id="notifBtn" aria-label="알림">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
                <span class="notif-badge" id="notifBadge"></span>
            </button>
            <div class="notif-panel" id="notifPanel" hidden>
                <div class="notif-panel-header">
                    <span>알림</span>
                    <button class="notif-read-all-btn" id="notifReadAll">전체 읽음</button>
                </div>
                <div class="notif-list" id="notifList">
                    <div class="notif-empty">새 알림이 없습니다</div>
                </div>
            </div>
        </div>
        <a class="user-badge" th:href="@{/mypage}">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            <span th:text="${loginUserNickname}">nickname</span>
        </a>
        <a class="logout-btn" th:href="@{/logout}">로그아웃</a>
    </div>
</nav>

<main class="page">
    <!-- Hero -->
    <section class="hero">
        <div class="hero-top">
            <span class="hero-cat" th:text="${algorithm.category().label()}">카테고리</span>
        </div>
        <h1 th:text="${algorithm.title()}">차트 제목</h1>
        <p th:text="${algorithm.description()}">차트 설명</p>
        <div class="hero-meta">
            <div class="hero-meta-item">
                <strong th:text="${rows.size()}">0</strong>위까지 표시
            </div>
            <div class="hero-meta-item">
                <strong>CineMatch</strong> 데이터 기반
            </div>
        </div>
    </section>

    <!-- 뷰 토글 바 -->
    <div class="view-bar" th:if="${!#lists.isEmpty(rows)}">
        <div class="result-count">
            총 <strong th:text="${rows.size()}">0</strong>개 작품
        </div>
        <div class="view-toggle">
            <button class="view-btn active" id="btn-grid" onclick="setView('grid')" title="그리드">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            </button>
            <button class="view-btn" id="btn-list" onclick="setView('list')" title="리스트">
                <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            </button>
        </div>
    </div>

    <!-- 그리드 뷰 (기본) -->
    <div class="movie-grid" th:if="${!#lists.isEmpty(rows)}">
        <a class="movie-card"
           th:each="row : ${rows}"
           th:href="@{|/movies/${row.movieCode()}|}"
           th:attr="data-code=${row.movieCode()},
                    data-poster=${row.posterImageUrl()},
                    data-title=${row.movieName()},
                    data-year=${row.productionYear()},
                    data-rank=${row.rankNo()},
                    data-metric=${row.metricLabel() + ': ' + (row.metricValue() != null ? row.metricValue() : '-')}">
            <div class="card-poster">
                <img th:if="${!#strings.isEmpty(row.posterImageUrl())}"
                     th:src="${row.posterImageUrl()}"
                     th:alt="${row.movieName()}"
                     loading="lazy">
                <div class="card-poster-fallback"
                     th:if="${#strings.isEmpty(row.posterImageUrl())}"
                     th:text="${row.movieName()}">영화</div>
                <span class="card-badge"
                      th:if="${row.badgeLabel() != null}"
                      th:text="${row.badgeLabel()}">뱃지</span>
                <div class="card-rank" th:text="${row.rankNo()}">1</div>
            </div>
            <div class="card-info">
                <div class="card-title" th:text="${row.movieName()}">영화 제목</div>
                <div class="card-year"
                     th:text="${row.productionYear() != null ? row.productionYear() : (row.openDate() != null ? #temporals.format(row.openDate(), 'yyyy') : '')}">2024</div>
            </div>
        </a>
    </div>

    <!-- 리스트 뷰 -->
    <div class="rank-list" th:if="${!#lists.isEmpty(rows)}">
        <a class="rank-card"
           th:each="row : ${rows}"
           th:href="${row.movieCode() != null ? '/movies/' + row.movieCode() : null}">

            <!-- 순위 번호 -->
            <div class="rank-no" th:text="${row.rankNo()}">1</div>
            <div class="rank-poster-wrap">
                <img class="rank-poster"
                     th:if="${!#strings.isEmpty(row.posterImageUrl())}"
                     th:src="${row.posterImageUrl()}"
                     th:alt="${row.movieName()}" loading="lazy">
                <div class="rank-poster-fallback"
                     th:unless="${!#strings.isEmpty(row.posterImageUrl())}"
                     th:text="${row.movieName()}">영화</div>
                <span class="rank-badge"
                      th:if="${row.badgeLabel() != null}"
                      th:text="${row.badgeLabel()}">뱃지</span>
            </div>
            <div class="rank-info">
                <div class="rank-title" th:text="${row.movieName()}">영화 제목</div>
                <div class="rank-sub"
                     th:if="${!#strings.isEmpty(row.movieNameEn())}"
                     th:text="${row.movieNameEn()}">English Title</div>
                <span class="rank-year"
                      th:if="${row.productionYear() != null}"
                      th:text="${row.productionYear()}">2024</span>
                <span class="rank-year"
                      th:if="${row.productionYear() == null and row.openDate() != null}"
                      th:text="${#temporals.format(row.openDate(), 'yyyy')}">2024</span>
            </div>
            <div class="rank-metric">
                <div class="rank-metric-label" th:text="${row.metricLabel()}">지표</div>
                <div class="rank-metric-value" th:text="${row.metricValue()}">—</div>
            </div>
        </a>
    </div>

    <!-- 빈 결과 -->
    <div class="empty" th:if="${#lists.isEmpty(rows)}">
        해당 차트에 표시할 데이터가 없습니다.<br>
        <span style="font-size:0.82rem; margin-top:6px; display:block;">TMDB 동기화 후 데이터가 채워집니다.</span>
    </div>

    <!-- 연관 차트 -->
    <section class="related-section" th:if="${!#lists.isEmpty(relatedCharts)}">
        <div class="related-head">같은 카테고리 다른 차트</div>
        <div class="related-grid">
            <a class="related-card"
               th:each="related : ${relatedCharts}"
               th:href="@{|/ranking/${related.code()}|}">
                <div class="related-card-title" th:text="${related.title()}">차트 이름</div>
                <div class="related-card-desc" th:text="${related.description()}">차트 설명</div>
                <div class="related-card-cta">
                    순위 보기
                    <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </div>
            </a>
        </div>
    </section>
</main>

<div class="hover-preview" id="hoverPreview"></div>

<script>
(function () {
    const btn = document.getElementById('notifBtn'), panel = document.getElementById('notifPanel'),
          badge = document.getElementById('notifBadge'), list = document.getElementById('notifList'),
          readAllBtn = document.getElementById('notifReadAll');
    function timeAgo(s) { if (!s) return ''; const d = Math.floor((Date.now() - new Date(s)) / 1000); if (d < 60) return '방금 전'; if (d < 3600) return Math.floor(d/60)+'분 전'; if (d < 86400) return Math.floor(d/3600)+'시간 전'; return Math.floor(d/86400)+'일 전'; }
    function renderItems(items) {
        if (!items || !items.length) { list.innerHTML = '<div class="notif-empty">새 알림이 없습니다</div>'; return; }
        list.innerHTML = items.map(item => {
            const av = item.actorProfileImageUrl ? `<img src="${item.actorProfileImageUrl}" alt="">` : (item.actorNickname||'?')[0];
            const th = item.moviePosterUrl ? `<img class="notif-movie-thumb" src="${item.moviePosterUrl}" alt="">` : '';
            const txt = item.notifText || (item.type === 'FOLLOW' ? `<strong>${item.actorNickname}</strong>님이 회원님을 팔로우하기 시작했습니다` : `<strong>${item.actorNickname}</strong>님이 <strong>${item.movieName}</strong>을(를) 인생영화로 추가했습니다`);
            return `<a class="notif-item${!item.isRead?' unread':''}" href="${item.linkUrl||'#'}"><div class="notif-avatar">${av}</div><div class="notif-content"><div class="notif-text">${txt}</div><div class="notif-time">${timeAgo(item.createdAt)}</div></div>${th}</a>`;
        }).join('');
    }
    function upd(n) { badge.textContent = n > 0 ? (n > 99 ? '99+' : n) : ''; }
    fetch('/api/notifications').then(r => r.ok ? r.json() : null).then(d => { if (d) upd(d.unreadCount); }).catch(()=>{});
    btn.addEventListener('click', e => { e.stopPropagation(); const op = panel.hidden; panel.hidden = !op; if (!op) return; fetch('/api/notifications').then(r => r.ok ? r.json() : null).then(d => { if (!d) return; upd(d.unreadCount); renderItems(d.items); }).catch(()=>{}); });
    readAllBtn.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); fetch('/api/notifications/read-all',{method:'POST'}).then(() => { upd(0); document.querySelectorAll('.notif-item.unread').forEach(el=>el.classList.remove('unread')); }).catch(()=>{}); });
    document.addEventListener('click', e => { if (!panel.hidden && !panel.contains(e.target) && e.target !== btn) panel.hidden = true; });
})();

function setView(mode) {
    document.body.classList.toggle('list-view', mode === 'list');
    document.getElementById('btn-grid').classList.toggle('active', mode === 'grid');
    document.getElementById('btn-list').classList.toggle('active', mode === 'list');
    try { localStorage.setItem('cinematch_ranking_detail_view', mode); } catch(e) {}
}
(function () {
    try {
        const saved = localStorage.getItem('cinematch_ranking_detail_view');
        if (saved === 'list') setView('list');
    } catch(e) {}
})();

/* ── 플로팅 호버 프리뷰 ── */
(function () {
    const preview = document.getElementById('hoverPreview');
    const PW = 220;
    let timer = null;
    const actionState = {};
    const ICONS = {
        like:       '<svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>',
        dislike:    '<svg viewBox="0 0 24 24"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/></svg>',
        later:      '<svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>',
        collection: '<svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>'
    };
    const TITLES = { like:'좋아요', dislike:'별로에요', later:'나중에 볼게요', collection:'컬렉션에 추가' };
    function rankColor(r) { return r==1?'#fbbf24':r==2?'#cbd5e1':r==3?'#d97706':'white'; }

    function buildPreview(card) {
        const code=card.dataset.code||'', poster=card.dataset.poster||'', title=card.dataset.title||'',
              year=card.dataset.year||'', rank=card.dataset.rank||'', metric=card.dataset.metric||'';
        const badge=card.querySelector('.card-badge');
        const state=actionState[code]||{};
        const posterHtml = poster ? `<img src="${poster}" alt="${title}" style="width:100%;aspect-ratio:2/3;display:block;object-fit:cover;">`
                                  : `<div class="hp-fallback">${title}</div>`;
        const actionsHtml = ['like','dislike','later','collection'].map(act => {
            const on=(act==='like'&&state.liked)||(act==='dislike'&&state.disliked)||(act==='later'&&state.later)||(act==='collection'&&state.collected);
            return `<button class="hp-btn${on?' active':''}" data-code="${code}" data-action="${act}" title="${TITLES[act]}" onclick="doActionPreview(event,this)">${ICONS[act]}</button>`;
        }).join('');
        preview.innerHTML = `
            <div class="hp-poster-wrap">
                ${posterHtml}
                ${badge?`<div class="hp-badge">${badge.textContent}</div>`:''}
                <div class="hp-rank" style="color:${rankColor(rank)}">${rank}</div>
            </div>
            <div class="hp-body">
                <div class="hp-title">${title}</div>
                <div class="hp-meta">${year}</div>
                ${metric?`<div class="hp-metric">${metric}</div>`:''}
                <div class="hp-actions">${actionsHtml}
                    <a class="hp-detail-btn" href="/movies/${code}" title="상세보기"><svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a>
                </div>
            </div>`;
    }

    function positionPreview(card) {
        const rect=card.getBoundingClientRect(), vw=window.innerWidth, vh=window.innerHeight;
        const ph=PW*1.5+120;
        let left=rect.right+8;
        if (left+PW>vw-8) left=rect.left-PW-8;
        if (left<8) left=Math.max(8,Math.min(rect.left+rect.width/2-PW/2,vw-PW-8));
        let top=rect.top+rect.height/2-ph/2;
        top=Math.max(8,Math.min(top,vh-ph-8));
        preview.style.left=left+'px'; preview.style.top=top+'px'; preview.style.width=PW+'px';
    }

    function show(card) { if(!card.dataset.code)return; buildPreview(card); positionPreview(card); preview.classList.add('visible'); }
    function hide() { preview.classList.remove('visible'); }

    document.addEventListener('mouseover', function(e) {
        const card=e.target.closest('.movie-card[data-code]');
        if (card) { clearTimeout(timer); timer=setTimeout(function(){show(card);},260); return; }
        if (!e.target.closest('#hoverPreview')) { clearTimeout(timer); timer=setTimeout(hide,120); }
    });
    preview.addEventListener('mouseenter',function(){clearTimeout(timer);});
    preview.addEventListener('mouseleave',function(){timer=setTimeout(hide,80);});

    window.doActionPreview = function(e, btn) {
        e.preventDefault(); e.stopPropagation();
        const code=btn.dataset.code, action=btn.dataset.action;
        if (!code||!action) return;
        fetch('/api/movies/'+code+'/'+action,{method:'POST',headers:{'X-Requested-With':'XMLHttpRequest'}})
            .then(r=>{if(r.status===401){window.location.href='/login';return null;}return r.ok?r.json():null;})
            .then(data=>{
                if(!data)return;
                actionState[code]={liked:data.liked,disliked:data.disliked,later:data.later,collected:data.collected};
                preview.querySelectorAll('.hp-btn[data-code="'+code+'"]').forEach(b=>{
                    const act=b.dataset.action;
                    b.classList.toggle('active',(act==='like'&&data.liked)||(act==='dislike'&&data.disliked)||(act==='later'&&data.later)||(act==='collection'&&data.collected));
                });
            }).catch(()=>{});
    };

    function doAction(e,btn){e.preventDefault();e.stopPropagation();const code=btn.dataset.code,action=btn.dataset.action;if(!code||!action)return;fetch('/api/movies/'+code+'/'+action,{method:'POST',headers:{'X-Requested-With':'XMLHttpRequest'}}).then(r=>{if(r.status===401){window.location.href='/login';return null;}return r.ok?r.json():null;}).then(data=>{if(!data)return;document.querySelectorAll('.cact-btn[data-code="'+code+'"]').forEach(b=>{const act=b.dataset.action;b.classList.toggle('active',(act==='like'&&data.liked)||(act==='dislike'&&data.disliked)||(act==='later'&&data.later)||(act==='collection'&&data.collected));});}).catch(()=>{});}
    window.doAction=doAction;
})();
</script>
</body>
</html>
