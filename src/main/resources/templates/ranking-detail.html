<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${algorithm.title()} + ' | CineMatch'">랭킹 상세 | CineMatch</title>
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <style>
        :root {
            --blue: #0048FF;
            --bg: #070B14;
            --surface: #101828;
            --text: #F8FAFC;
            --text-sub: #CBD5E1;
            --text-hint: #94A3B8;
            --border: rgba(148,163,184,0.18);
            --shadow: 0 24px 60px rgba(2,6,23,0.42);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard', 'Segoe UI', sans-serif;
            background:
                radial-gradient(circle at top right, rgba(0,72,255,0.16), transparent 28%),
                linear-gradient(180deg, #06101f 0%, #070b14 45%, #0a1222 100%);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Navbar ── */
        .navbar {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 32px; height: 68px;
            background: rgba(7,11,20,0.82);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(148,163,184,0.12);
        }
        .navbar-left { display: flex; align-items: center; gap: 16px; }
        .back-btn {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--text-hint); text-decoration: none;
            font-size: 0.88rem; font-weight: 700;
            transition: color 0.15s;
        }
        .back-btn:hover { color: white; }
        .back-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
        .navbar-logo {
            display: inline-flex; align-items: center; gap: 10px;
            color: white; text-decoration: none;
            font-size: 1.1rem; font-weight: 900; letter-spacing: -0.03em;
        }
        .logo-mark {
            width: 30px; height: 30px; border-radius: 9px;
            display: inline-flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0048FF, #38BDF8);
        }
        .logo-mark svg { width: 15px; height: 15px; fill: white; }
        .navbar-right { display: flex; align-items: center; gap: 12px; }
        .user-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 14px; border-radius: 999px;
            background: rgba(255,255,255,0.08);
            color: white; text-decoration: none;
            font-size: 0.88rem; font-weight: 700;
        }
        .logout-btn {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 92px; height: 40px; border-radius: 999px;
            background: white; color: #0F172A;
            text-decoration: none; font-size: 0.88rem; font-weight: 800;
        }
        .notif-wrap { position: relative; }
        .notif-btn { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; border: none; background: rgba(255,255,255,0.08); color: white; cursor: pointer; transition: background 0.15s; }
        .notif-btn:hover { background: rgba(255,255,255,0.15); }
        .notif-badge { position: absolute; top: 4px; right: 4px; min-width: 16px; height: 16px; padding: 0 3px; border-radius: 999px; background: #EF4444; color: white; font-size: 0.65rem; font-weight: 900; display: flex; align-items: center; justify-content: center; }
        .notif-badge:empty { display: none; }
        .notif-panel { position: absolute; top: calc(100% + 10px); right: 0; width: 360px; max-height: 480px; border-radius: 16px; background: #111827; border: 1px solid rgba(148,163,184,0.15); box-shadow: 0 24px 60px rgba(2,6,23,0.55); z-index: 9999; overflow: hidden; display: flex; flex-direction: column; }
        .notif-panel[hidden] { display: none; }
        .notif-panel-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; border-bottom: 1px solid rgba(148,163,184,0.1); font-weight: 800; font-size: 0.95rem; flex-shrink: 0; }
        .notif-read-all-btn { border: none; background: none; color: #60A5FA; font-size: 0.78rem; font-weight: 700; cursor: pointer; padding: 4px 8px; border-radius: 6px; font-family: inherit; }
        .notif-read-all-btn:hover { background: rgba(96,165,250,0.1); }
        .notif-list { overflow-y: auto; flex: 1; }
        .notif-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-bottom: 1px solid rgba(148,163,184,0.07); text-decoration: none; color: inherit; transition: background 0.12s; }
        .notif-item:hover { background: rgba(255,255,255,0.04); }
        .notif-item.unread { background: rgba(0,72,255,0.07); }
        .notif-item.unread:hover { background: rgba(0,72,255,0.12); }
        .notif-avatar { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.12); flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1rem; color: white; }
        .notif-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .notif-content { flex: 1; min-width: 0; }
        .notif-text { font-size: 0.83rem; line-height: 1.45; color: #CBD5E1; }
        .notif-text strong { color: white; font-weight: 700; }
        .notif-time { margin-top: 3px; font-size: 0.73rem; color: #64748B; }
        .notif-movie-thumb { width: 46px; height: 64px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: rgba(255,255,255,0.06); }
        .notif-empty { padding: 40px 20px; text-align: center; color: #64748B; font-size: 0.88rem; }

        /* ── Layout ── */
        .page { max-width: 1200px; margin: 0 auto; padding: 28px 24px 72px; }

        /* ── Hero ── */
        .hero {
            padding: 36px 40px;
            border-radius: 28px;
            background: linear-gradient(120deg, rgba(0,72,255,0.86) 0%, rgba(14,165,233,0.7) 52%, rgba(10,18,34,0.94) 100%);
            box-shadow: var(--shadow);
            margin-bottom: 28px;
            position: relative; overflow: hidden;
        }
        .hero::after {
            content: ''; position: absolute; right: -30px; bottom: -30px;
            width: 200px; height: 200px; border-radius: 50%;
            background: rgba(255,255,255,0.07);
        }
        .hero-top {
            display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
        }
        .hero-category-chip {
            padding: 6px 12px; border-radius: 999px;
            background: rgba(255,255,255,0.18);
            font-size: 0.76rem; font-weight: 800;
            color: rgba(255,255,255,0.92);
        }
        .hero h1 {
            font-size: clamp(1.8rem, 3.5vw, 2.8rem);
            line-height: 1.08; letter-spacing: -0.04em; margin-bottom: 10px;
        }
        .hero p {
            max-width: 540px;
            color: rgba(255,255,255,0.78); line-height: 1.7; font-size: 0.96rem;
        }
        .hero-meta {
            display: flex; align-items: center; gap: 20px;
            margin-top: 18px;
        }
        .hero-meta-item {
            font-size: 0.82rem; color: rgba(255,255,255,0.7);
        }
        .hero-meta-item strong {
            color: white; font-weight: 800; margin-right: 4px;
        }

        /* ── 순위 리스트 ── */
        .ranking-list {
            display: flex; flex-direction: column; gap: 10px;
            margin-bottom: 36px;
        }

        /* ── 순위 카드 ── */
        .rank-card {
            display: grid;
            grid-template-columns: 52px 80px 1fr auto;
            align-items: center;
            gap: 16px;
            padding: 14px 20px;
            border-radius: 18px;
            background: rgba(14,23,38,0.88);
            border: 1px solid rgba(148,163,184,0.12);
            text-decoration: none; color: inherit;
            transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
        }
        .rank-card:hover {
            transform: translateX(4px);
            border-color: rgba(96,165,250,0.38);
            box-shadow: 0 12px 30px rgba(2,6,23,0.28);
        }

        /* 순위 번호 */
        .rank-no {
            text-align: center;
            font-size: 1.5rem; font-weight: 900;
            letter-spacing: -0.04em;
            color: var(--text-hint);
        }
        .rank-card:nth-child(1) .rank-no { color: #f59e0b; font-size: 1.8rem; }
        .rank-card:nth-child(2) .rank-no { color: #94a3b8; font-size: 1.6rem; }
        .rank-card:nth-child(3) .rank-no { color: #b45309; font-size: 1.6rem; }

        /* 포스터 */
        .rank-poster-wrap {
            aspect-ratio: 2/3;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(148,163,184,0.14);
            position: relative;
        }
        .rank-poster {
            width: 100%; height: 100%; display: block; object-fit: cover;
        }
        .rank-poster-fallback {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 8px;
            background: linear-gradient(135deg, rgba(0,72,255,0.25), rgba(14,165,233,0.22));
            color: rgba(255,255,255,0.8);
            font-size: 0.72rem; font-weight: 800;
        }

        /* 뱃지 (포스터 위) */
        .rank-badge {
            position: absolute; left: 6px; top: 6px;
            padding: 3px 7px; border-radius: 6px;
            font-size: 0.66rem; font-weight: 800;
            background: rgba(15,23,42,0.88);
            color: #fde68a;
            white-space: nowrap;
        }

        /* 영화 정보 */
        .rank-info { min-width: 0; }
        .rank-title {
            font-size: 1.02rem; font-weight: 800;
            line-height: 1.35; margin-bottom: 4px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .rank-sub {
            font-size: 0.8rem; color: var(--text-hint);
            margin-bottom: 6px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .rank-meta {
            display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
        }
        .rank-year {
            font-size: 0.76rem; color: var(--text-hint);
            padding: 3px 8px; border-radius: 999px;
            background: rgba(255,255,255,0.06);
        }

        /* 지표 (오른쪽) */
        .rank-metric {
            text-align: right; flex-shrink: 0;
        }
        .rank-metric-label {
            font-size: 0.74rem; color: var(--text-hint); margin-bottom: 4px;
        }
        .rank-metric-value {
            font-size: 1rem; font-weight: 900;
            letter-spacing: -0.02em;
            color: white;
        }

        /* ── 연관 차트 ── */
        .related-section { margin-top: 40px; }
        .related-head {
            font-size: 1rem; font-weight: 900;
            margin-bottom: 14px; color: var(--text-sub);
        }
        .related-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
        }
        .related-card {
            display: flex; flex-direction: column;
            padding: 18px 20px 16px;
            border-radius: 16px;
            background: rgba(14,23,38,0.88);
            border: 1px solid rgba(148,163,184,0.12);
            text-decoration: none; color: inherit;
            transition: transform 0.18s ease, border-color 0.18s ease;
        }
        .related-card:hover {
            transform: translateY(-3px);
            border-color: rgba(96,165,250,0.3);
        }
        .related-card-title {
            font-size: 0.92rem; font-weight: 800;
            margin-bottom: 6px;
        }
        .related-card-desc {
            font-size: 0.78rem; color: var(--text-hint); line-height: 1.5; flex: 1;
        }
        .related-card-cta {
            display: flex; align-items: center; gap: 4px;
            margin-top: 12px;
            font-size: 0.76rem; font-weight: 800;
            color: rgba(96,165,250,0.8);
        }
        .related-card-cta svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }

        /* ── 빈 결과 ── */
        .empty {
            padding: 52px; text-align: center;
            color: var(--text-hint);
            border: 1px dashed rgba(148,163,184,0.2);
            border-radius: 20px;
        }

        /* ── 반응형 ── */
        @media (max-width: 640px) {
            .navbar { padding: 0 16px; }
            .page { padding: 20px 14px 56px; }
            .hero { padding: 26px 20px; }
            .rank-card {
                grid-template-columns: 40px 62px 1fr;
                padding: 12px 14px;
            }
            .rank-metric { display: none; }
            .rank-card:nth-child(1) .rank-no { font-size: 1.4rem; }
            .rank-card:nth-child(2) .rank-no,
            .rank-card:nth-child(3) .rank-no { font-size: 1.3rem; }
            .rank-no { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="navbar-left">
        <a class="back-btn" th:href="@{/ranking}">
            <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
            차트 목록
        </a>
        <a class="navbar-logo" th:href="@{/charts}">
            <span class="logo-mark">
                <svg viewBox="0 0 16 16"><path d="M2 2h3v3H2zm0 4.5h3v3H2zm0 4.5h3v3H2zM6.5 2h3v3h-3zm0 4.5h3v3h-3zm0 4.5h3v3h-3zM11 2h3v3h-3zm0 4.5h3v3H11zm0 4.5h3v3H11z"/></svg>
            </span>
            <span>CineMatch</span>
        </a>
    </div>
    <div class="navbar-right">
        <div class="notif-wrap">
            <button class="notif-btn" id="notifBtn" aria-label="알림">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
                <span class="notif-badge" id="notifBadge"></span>
            </button>
            <div class="notif-panel" id="notifPanel" hidden>
                <div class="notif-panel-header">
                    <span>알림</span>
                    <button class="notif-read-all-btn" id="notifReadAll">전체 읽음</button>
                </div>
                <div class="notif-list" id="notifList">
                    <div class="notif-empty">새 알림이 없습니다</div>
                </div>
            </div>
        </div>
        <a class="user-badge" th:href="@{/mypage}">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            <span th:text="${loginUserNickname}">nickname</span>
        </a>
        <a class="logout-btn" th:href="@{/logout}">로그아웃</a>
    </div>
</nav>

<main class="page">
    <!-- Hero -->
    <section class="hero">
        <div class="hero-top">
            <span class="hero-category-chip" th:text="${algorithm.category().label()}">카테고리</span>
        </div>
        <h1 th:text="${algorithm.title()}">차트 제목</h1>
        <p th:text="${algorithm.description()}">차트 설명</p>
        <div class="hero-meta">
            <div class="hero-meta-item">
                <strong th:text="${rows.size()}">0</strong>위까지 표시
            </div>
            <div class="hero-meta-item">
                <strong>CineMatch</strong> 박스오피스 데이터 기반
            </div>
        </div>
    </section>

    <!-- 순위 리스트 -->
    <div class="ranking-list" th:if="${!#lists.isEmpty(rows)}">
        <a class="rank-card"
           th:each="row : ${rows}"
           th:href="${row.movieCode() != null ? '/movies/' + row.movieCode() : null}">

            <!-- 순위 번호 -->
            <div class="rank-no" th:text="${row.rankNo()}">1</div>

            <!-- 포스터 -->
            <div class="rank-poster-wrap">
                <img class="rank-poster"
                     th:if="${!#strings.isEmpty(row.posterImageUrl())}"
                     th:src="${row.posterImageUrl()}"
                     th:alt="${row.movieName()}">
                <div class="rank-poster-fallback"
                     th:if="${#strings.isEmpty(row.posterImageUrl())}">
                    <span th:text="${row.movieName()}">영화 제목</span>
                </div>
                <!-- 뱃지 -->
                <span class="rank-badge"
                      th:if="${row.badgeLabel() != null}"
                      th:text="${row.badgeLabel()}">뱃지</span>
            </div>

            <!-- 영화 정보 -->
            <div class="rank-info">
                <div class="rank-title" th:text="${row.movieName()}">영화 제목</div>
                <div class="rank-sub"
                     th:text="${!#strings.isEmpty(row.movieNameEn()) ? row.movieNameEn() : row.movieCode()}">
                    English Title
                </div>
                <div class="rank-meta">
                    <span class="rank-year"
                          th:if="${row.productionYear() != null}"
                          th:text="${row.productionYear()}">2024</span>
                    <span class="rank-year"
                          th:if="${row.productionYear() == null and row.openDate() != null}"
                          th:text="${#temporals.format(row.openDate(), 'yyyy')}">2024</span>
                </div>
            </div>

            <!-- 지표 -->
            <div class="rank-metric">
                <div class="rank-metric-label" th:text="${row.metricLabel()}">지표</div>
                <div class="rank-metric-value" th:text="${row.metricValue()}">—</div>
            </div>
        </a>
    </div>

    <!-- 결과 없음 -->
    <div class="empty" th:if="${#lists.isEmpty(rows)}">
        해당 차트에 표시할 데이터가 없습니다.
    </div>

    <!-- 연관 차트 -->
    <section class="related-section" th:if="${!#lists.isEmpty(relatedCharts)}">
        <div class="related-head">같은 카테고리 다른 차트</div>
        <div class="related-grid">
            <a class="related-card"
               th:each="related : ${relatedCharts}"
               th:href="@{|/ranking/${related.code()}|}">
                <div class="related-card-title" th:text="${related.title()}">차트 이름</div>
                <div class="related-card-desc" th:text="${related.description()}">차트 설명</div>
                <div class="related-card-cta">
                    순위 보기
                    <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </div>
            </a>
        </div>
    </section>
</main>
<script>
(function () {
    const btn = document.getElementById('notifBtn'), panel = document.getElementById('notifPanel'),
          badge = document.getElementById('notifBadge'), list = document.getElementById('notifList'),
          readAllBtn = document.getElementById('notifReadAll');
    function timeAgo(s) { if (!s) return ''; const d = Math.floor((Date.now() - new Date(s)) / 1000); if (d < 60) return '방금 전'; if (d < 3600) return Math.floor(d/60)+'분 전'; if (d < 86400) return Math.floor(d/3600)+'시간 전'; return Math.floor(d/86400)+'일 전'; }
    function renderItems(items) {
        if (!items || !items.length) { list.innerHTML = '<div class="notif-empty">새 알림이 없습니다</div>'; return; }
        list.innerHTML = items.map(item => {
            const av = item.actorProfileImageUrl ? `<img src="${item.actorProfileImageUrl}" alt="">` : (item.actorNickname||'?')[0];
            const th = item.moviePosterUrl ? `<img class="notif-movie-thumb" src="${item.moviePosterUrl}" alt="">` : '';
            const txt = item.type === 'FOLLOW' ? `<strong>${item.actorNickname}</strong>님이 회원님을 팔로우하기 시작했습니다` : `<strong>${item.actorNickname}</strong>님이 <strong>${item.movieName}</strong>을(를) 인생영화로 추가했습니다`;
            return `<a class="notif-item${!item.isRead?' unread':''}" href="${item.linkUrl||'#'}"><div class="notif-avatar">${av}</div><div class="notif-content"><div class="notif-text">${txt}</div><div class="notif-time">${timeAgo(item.createdAt)}</div></div>${th}</a>`;
        }).join('');
    }
    function upd(n) { badge.textContent = n > 0 ? (n > 99 ? '99+' : n) : ''; }
    fetch('/api/notifications').then(r => r.ok ? r.json() : null).then(d => { if (d) upd(d.unreadCount); }).catch(()=>{});
    btn.addEventListener('click', e => { e.stopPropagation(); const op = panel.hidden; panel.hidden = !op; if (!op) return; fetch('/api/notifications').then(r => r.ok ? r.json() : null).then(d => { if (!d) return; upd(d.unreadCount); renderItems(d.items); }).catch(()=>{}); });
    readAllBtn.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); fetch('/api/notifications/read-all',{method:'POST'}).then(() => { upd(0); document.querySelectorAll('.notif-item.unread').forEach(el=>el.classList.remove('unread')); }).catch(()=>{}); });
    document.addEventListener('click', e => { if (!panel.hidden && !panel.contains(e.target) && e.target !== btn) panel.hidden = true; });
})();
</script>
</body>
</html>
