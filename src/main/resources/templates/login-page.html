<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 — CineMatch</title>
    <link rel="stylesheet" href="/css/hp-theme.css">
    <style>
        :root {
            --blue:      var(--hp-blue);
            --blue-dark: var(--hp-blue-deep);
            --blue-soft: var(--hp-blue-soft);
            --bg:        var(--hp-bg);
            --surface:   var(--hp-surface);
            --text:      var(--hp-text);
            --text-sub:  var(--hp-text-sub);
            --text-hint: var(--hp-text-hint);
            --border:    var(--hp-border);
            --shadow:    var(--hp-shadow-lg);
            --error-bg:  rgba(179,38,43,0.12);
            --error:     #f87171;
        }
        body {
            min-height: 100vh; display: grid; place-items: center;
            padding: 20px;
            background: var(--hp-bg);
        }

        .card {
            width: min(100%, 440px);
            padding: 40px;
            background: var(--hp-surface);
            border: 1px solid var(--hp-border-strong);
            border-radius: var(--r-xl);
            box-shadow: var(--hp-shadow-lg);
        }

        /* 로고 */
        .logo {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 36px; height: 36px; background: var(--hp-blue);
            border-radius: var(--r-lg); display: flex; align-items: center; justify-content: center;
        }
        .logo-icon svg { width: 18px; height: 18px; fill: white; }
        .logo-text { font-size: 1.1rem; font-weight: 700; color: var(--hp-text); letter-spacing: -0.01em; }

        /* 타이틀 */
        .eyebrow {
            font-size: 12px; font-weight: 600; color: var(--hp-blue-bright);
            letter-spacing: 0.7px; text-transform: uppercase; margin-bottom: 6px;
        }
        h1 { font-size: 32px; font-weight: 500; letter-spacing: -0.01em; margin-bottom: 6px; }
        .subtitle { font-size: 16px; color: var(--hp-text-sub); line-height: 1.5; margin-bottom: 28px; }
        .error-box {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 12px 16px; margin-bottom: 20px;
            background: var(--error-bg); border: 1px solid rgba(248,113,113,0.3);
            border-radius: var(--r-lg); font-size: 14px; color: var(--error);
        }
        .error-box svg { flex-shrink: 0; margin-top: 1px; }
        label {
            display: block; font-size: 14px; font-weight: 600;
            color: var(--hp-text-sub); margin-bottom: 6px;
        }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 12px 16px;
            border: 1px solid var(--hp-border-strong); border-radius: var(--r-md);
            background: var(--hp-surface-2); font-family: inherit; font-size: 16px;
            color: var(--hp-text); margin-bottom: 16px;
            transition: border-color 0.15s; outline: none;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--hp-blue-bright);
        }
        .btn-primary {
            width: 100%; height: 44px;
            background: var(--hp-blue); color: white;
            border: none; border-radius: var(--r-md);
            font-family: inherit; font-size: 13px; font-weight: 600;
            letter-spacing: 0.7px; text-transform: uppercase;
            cursor: pointer; margin-bottom: 10px;
            transition: background 0.15s;
        }
        .btn-primary:hover { background: var(--hp-blue-deep); }
        .btn-secondary {
            display: block; width: 100%; height: 44px; line-height: 44px;
            background: transparent; color: var(--hp-text-sub);
            border: 1px solid var(--hp-border-strong); border-radius: var(--r-md);
            font-family: inherit; font-size: 13px; font-weight: 600;
            letter-spacing: 0.7px; text-transform: uppercase;
            text-align: center; text-decoration: none;
            transition: border-color 0.15s, color 0.15s;
        }
        .btn-secondary:hover { border-color: var(--hp-blue-bright); color: var(--hp-blue-bright); }
        .hint {
            margin-top: 20px; padding: 12px 16px;
            background: var(--hp-blue-soft); border-radius: var(--r-lg);
            font-size: 13px; color: var(--hp-blue-bright); line-height: 1.6;
            border: 1px solid rgba(41,110,249,0.25);
        }
        .hint code {
            background: rgba(2,74,216,0.2); padding: 1px 6px;
            border-radius: var(--r-xs); font-family: monospace;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="logo-icon">
            <svg viewBox="0 0 16 16"><path d="M2 2h3v3H2zm0 4.5h3v3H2zm0 4.5h3v3H2zM6.5 2h3v3h-3zm0 4.5h3v3h-3zm0 4.5h3v3h-3zM11 2h3v3h-3zm0 4.5h3v3H11zm0 4.5h3v3H11z"/></svg>
        </div>
        <span class="logo-text">CineMatch</span>
    </div>

    <p class="eyebrow">Welcome back</p>
    <h1>로그인</h1>
    <p class="subtitle">등록된 사용자만 영화 차트와 상세 페이지를 볼 수 있어요.</p>

    <div class="error-box" th:if="${loginError}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
        </svg>
        <span th:text="${loginError}">로그인 오류</span>
    </div>

    <form th:action="@{/login}" method="post">
        <label for="id">아이디</label>
        <input id="id" name="id" type="text" placeholder="아이디를 입력하세요" required autocomplete="username">

        <label for="pw">비밀번호</label>
        <input id="pw" name="pw" type="password" placeholder="비밀번호를 입력하세요" required autocomplete="current-password">

        <button class="btn-primary" type="submit">로그인</button>
        <a class="btn-secondary" th:href="@{/signup}">회원가입</a>
    </form>

    <div class="hint">
        기본 테스트 계정: <code>movieadmin / 0000</code>
    </div>
</div>
</body>
</html>
