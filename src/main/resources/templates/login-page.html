<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 — CineMatch</title>
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <style>
        :root {
            --blue:      #0048FF;
            --blue-dark: #003AD1;
            --blue-soft: #EEF2FF;
            --blue-mid:  #C7D2FE;
            --bg:        #F7F8FC;
            --surface:   #FFFFFF;
            --text:      #0F172A;
            --text-sub:  #475569;
            --text-hint: #94A3B8;
            --border:    rgba(15,23,42,0.10);
            --shadow:    0 20px 60px rgba(0,72,255,0.12);
            --error-bg:  #FEF2F2;
            --error:     #DC2626;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard', 'Segoe UI', sans-serif;
            min-height: 100vh; display: grid; place-items: center;
            padding: 20px;
            background:
                radial-gradient(ellipse at top left, rgba(0,72,255,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(14,165,233,0.08) 0%, transparent 50%),
                var(--bg);
            color: var(--text);
        }

        .card {
            width: min(100%, 440px);
            padding: 40px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: var(--shadow);
        }

        /* 로고 */
        .logo {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 40px; height: 40px; background: var(--blue);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
        }
        .logo-icon svg { width: 20px; height: 20px; fill: white; }
        .logo-text { font-size: 1.4rem; font-weight: 900; color: var(--blue); letter-spacing: -0.04em; }

        /* 타이틀 */
        .eyebrow {
            font-size: 0.75rem; font-weight: 700; color: var(--blue);
            letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px;
        }
        h1 { font-size: 2rem; font-weight: 900; letter-spacing: -0.04em; margin-bottom: 6px; }
        .subtitle { font-size: 0.9rem; color: var(--text-hint); line-height: 1.6; margin-bottom: 28px; }

        /* 에러 */
        .error-box {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 12px 16px; margin-bottom: 20px;
            background: var(--error-bg); border: 1px solid #FECACA;
            border-radius: 12px; font-size: 0.875rem; color: var(--error);
        }
        .error-box svg { flex-shrink: 0; margin-top: 1px; }

        /* 폼 */
        label {
            display: block; font-size: 0.875rem; font-weight: 700;
            color: var(--text-sub); margin-bottom: 6px;
        }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 13px 16px;
            border: 1.5px solid var(--border); border-radius: 12px;
            background: var(--bg); font-family: inherit; font-size: 1rem;
            color: var(--text); margin-bottom: 16px;
            transition: border-color 0.15s, box-shadow 0.15s;
            outline: none;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(0,72,255,0.12);
            background: white;
        }

        .btn-primary {
            width: 100%; padding: 14px;
            background: var(--blue); color: white;
            border: none; border-radius: 12px;
            font-family: inherit; font-size: 1rem; font-weight: 700;
            cursor: pointer; margin-bottom: 10px;
            transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
        }
        .btn-primary:hover {
            background: var(--blue-dark);
            box-shadow: 0 6px 20px rgba(0,72,255,0.35);
        }
        .btn-primary:active { transform: scale(0.98); }

        .btn-secondary {
            display: block; width: 100%; padding: 13px;
            background: var(--bg); color: var(--text-sub);
            border: 1.5px solid var(--border); border-radius: 12px;
            font-family: inherit; font-size: 1rem; font-weight: 700;
            text-align: center; text-decoration: none;
            transition: border-color 0.15s, color 0.15s;
        }
        .btn-secondary:hover { border-color: var(--blue); color: var(--blue); }

        .hint {
            margin-top: 20px; padding: 12px 16px;
            background: var(--blue-soft); border-radius: 10px;
            font-size: 0.82rem; color: var(--blue); line-height: 1.6;
        }
        .hint code {
            background: rgba(0,72,255,0.1); padding: 1px 6px;
            border-radius: 4px; font-family: monospace;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="logo-icon">
            <svg viewBox="0 0 16 16"><path d="M2 2h3v3H2zm0 4.5h3v3H2zm0 4.5h3v3H2zM6.5 2h3v3h-3zm0 4.5h3v3h-3zm0 4.5h3v3h-3zM11 2h3v3h-3zm0 4.5h3v3H11zm0 4.5h3v3H11z"/></svg>
        </div>
        <span class="logo-text">CineMatch</span>
    </div>

    <p class="eyebrow">Welcome back</p>
    <h1>로그인</h1>
    <p class="subtitle">등록된 사용자만 영화 차트와 상세 페이지를 볼 수 있어요.</p>

    <div class="error-box" th:if="${loginError}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
        </svg>
        <span th:text="${loginError}">로그인 오류</span>
    </div>

    <form th:action="@{/login}" method="post">
        <label for="id">아이디</label>
        <input id="id" name="id" type="text" placeholder="아이디를 입력하세요" required autocomplete="username">

        <label for="pw">비밀번호</label>
        <input id="pw" name="pw" type="password" placeholder="비밀번호를 입력하세요" required autocomplete="current-password">

        <button class="btn-primary" type="submit">로그인</button>
        <a class="btn-secondary" th:href="@{/signup}">회원가입</a>
    </form>

    <div class="hint">
        기본 테스트 계정: <code>movieadmin / 0000</code>
    </div>
</div>
</body>
</html>
