<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>랭킹 차트 | CineMatch</title>
    <link rel="stylesheet" href="/css/hp-theme.css">
    <style>
        :root {
            --blue: var(--hp-blue); --bg: var(--hp-bg); --surface: var(--hp-surface);
            --text: var(--hp-text); --text-sub: var(--hp-text-sub); --text-hint: var(--hp-text-hint);
            --border: var(--hp-border); --shadow: var(--hp-shadow-lg);
        }
        .navbar {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 32px; height: 64px;
            background: rgba(15,15,15,0.88); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--hp-border);
        }
        .navbar-logo {
            display: inline-flex; align-items: center; gap: 10px;
            color: white; text-decoration: none; font-size: 1.1rem; font-weight: 700; letter-spacing: -0.01em;
        }
        .logo-mark {
            width: 32px; height: 32px; border-radius: var(--r-lg);
            display: inline-flex; align-items: center; justify-content: center;
            background: var(--hp-blue);
        }
        .logo-mark svg { width: 16px; height: 16px; fill: white; }
        .navbar-right { display: flex; align-items: center; gap: 10px; }
        .user-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 7px 13px; border-radius: 999px;
            background: rgba(255,255,255,0.07);
            color: white; text-decoration: none;
            font-size: 0.85rem; font-weight: 700;
        }
        .logout-btn {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 84px; height: 36px; border-radius: var(--r-md);
            background: var(--hp-blue); color: #fff;
            text-decoration: none; font-size: 12px; font-weight: 600;
            letter-spacing: 0.7px; text-transform: uppercase;
        }
        .notif-wrap { position: relative; }
        .notif-btn { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: var(--r-md); border: 1px solid var(--hp-border); background: var(--hp-surface-2); color: white; cursor: pointer; transition: background 0.15s; }
        .notif-btn:hover { background: var(--hp-card); }
        .notif-badge { position: absolute; top: 4px; right: 4px; min-width: 16px; height: 16px; padding: 0 3px; border-radius: 999px; background: var(--hp-blue); color: white; font-size: 0.65rem; font-weight: 700; display: flex; align-items: center; justify-content: center; }
        .notif-badge:empty { display: none; }
        .notif-panel { position: absolute; top: calc(100% + 10px); right: 0; width: 360px; max-height: 480px; border-radius: var(--r-xl); background: var(--hp-surface); border: 1px solid var(--hp-border-strong); box-shadow: var(--hp-shadow-lg); z-index: 9999; overflow: hidden; display: flex; flex-direction: column; }
        .notif-panel[hidden] { display: none; }
        .notif-panel-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 12px; border-bottom: 1px solid var(--hp-border); font-weight: 600; font-size: 0.95rem; flex-shrink: 0; }
        .notif-read-all-btn { border: none; background: none; color: var(--hp-blue-bright); font-size: 0.78rem; font-weight: 600; cursor: pointer; padding: 4px 8px; border-radius: var(--r-md); font-family: inherit; }
        .notif-read-all-btn:hover { background: var(--hp-blue-soft); }
        .notif-list { overflow-y: auto; flex: 1; }
        .notif-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--hp-border); text-decoration: none; color: inherit; transition: background 0.12s; }
        .notif-item:hover { background: var(--hp-surface-2); }
        .notif-item.unread { background: var(--hp-blue-soft); }
        .notif-item.unread:hover { background: rgba(2,74,216,0.22); }
        .notif-avatar { width: 40px; height: 40px; border-radius: var(--r-md); background: var(--hp-card); flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1rem; color: var(--hp-text-sub); }
        .notif-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .notif-content { flex: 1; min-width: 0; }
        .notif-text { font-size: 0.83rem; line-height: 1.45; color: var(--hp-text-sub); }
        .notif-text strong { color: var(--hp-text); font-weight: 600; }
        .notif-time { margin-top: 3px; font-size: 0.73rem; color: var(--hp-text-hint); }
        .notif-movie-thumb { width: 46px; height: 64px; border-radius: var(--r-md); object-fit: cover; flex-shrink: 0; background: var(--hp-card); }
        .notif-empty { padding: 40px 20px; text-align: center; color: var(--hp-text-hint); font-size: 0.88rem; }

        .page { max-width: 1280px; margin: 0 auto; padding: 24px 24px 80px; }

        .hero {
            padding: 32px 40px; border-radius: var(--r-xl);
            background: var(--hp-surface); border: 1px solid var(--hp-border);
            border-left: 4px solid var(--hp-blue);
            margin-bottom: 24px; position: relative; overflow: hidden;
        }
        .hero-eyebrow {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 12px; border-radius: var(--r-lg);
            background: var(--hp-blue-soft); border: 1px solid rgba(41,110,249,0.28);
            color: var(--hp-blue-bright);
            font-size: 12px; font-weight: 600; letter-spacing: 0.7px; text-transform: uppercase;
            margin-bottom: 12px;
        }
        .hero h1 { font-size: clamp(1.6rem, 3.5vw, 2.4rem); line-height: 1.1; letter-spacing: -0.01em; font-weight: 500; margin-bottom: 8px; }
        .hero p { max-width: 520px; color: var(--hp-text-sub); font-size: 16px; line-height: 1.5; }

        .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        .tabs { display: flex; flex-wrap: wrap; gap: 8px; }
        .tab {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 8px 16px; border-radius: var(--r-pill);
            text-decoration: none; font-size: 13px; font-weight: 600;
            border: 1px solid var(--hp-border); background: transparent; color: var(--hp-text-sub);
            transition: all 0.14s ease;
        }
        .tab:hover { color: var(--hp-text); border-color: var(--hp-border-strong); }
        .tab.active { background: var(--hp-blue); color: #fff; border-color: var(--hp-blue); }
        .tab-count {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 18px; height: 18px; padding: 0 5px;
            border-radius: 999px; font-size: 11px; font-weight: 700;
            background: rgba(255,255,255,0.12);
        }
        .tab.active .tab-count { background: rgba(255,255,255,0.22); }
        .view-toggle { display: flex; gap: 4px; flex-shrink: 0; }
        .view-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: var(--r-md);
            background: var(--hp-surface-2); border: 1px solid var(--hp-border);
            color: var(--hp-text-hint); cursor: pointer; transition: all 0.14s ease;
        }
        .view-btn:hover { color: var(--hp-text); border-color: var(--hp-border-strong); }
        .view-btn.active { background: var(--hp-surface); color: var(--hp-text); border-color: var(--hp-border-strong); }
        .view-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

        .chart-section {
            margin-bottom: 40px; border-radius: var(--r-xl);
            background: var(--hp-surface); border: 1px solid var(--hp-border);
        }

        .chart-section-header {
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
            padding: 18px 22px 14px;
            border-bottom: 1px solid rgba(148,163,184,0.07);
        }
        .section-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
        .section-icon {
            width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(148,163,184,0.1);
        }
        .section-icon svg { width: 18px; height: 18px; stroke: var(--text-sub); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
        .section-texts { min-width: 0; }
        .section-title { font-size: 1rem; font-weight: 900; letter-spacing: -0.02em; margin-bottom: 1px; }
        .section-desc { font-size: 0.76rem; color: var(--text-hint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .section-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .cat-badge {
            padding: 3px 9px; border-radius: 999px;
            font-size: 0.7rem; font-weight: 800;
            background: rgba(255,255,255,0.06); color: var(--text-hint);
        }
        .see-all {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 7px 13px; border-radius: 999px;
            font-size: 0.78rem; font-weight: 800;
            background: rgba(0,72,255,0.15); color: #93c5fd;
            text-decoration: none;
            border: 1px solid rgba(0,72,255,0.25);
            transition: background 0.14s ease;
        }
        .see-all:hover { background: rgba(0,72,255,0.28); color: white; }
        .see-all svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }

        /* ═══════════════════════════════════════════
           GRID VIEW (기본값 — 5×2)
        ═══════════════════════════════════════════ */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            padding: 14px 18px 18px;
        }

        .movie-card {
            display: flex; flex-direction: column;
            text-decoration: none; color: inherit;
            cursor: pointer;
        }
        .movie-card:hover .card-title { color: white; }

        .card-poster {
            position: relative;
            aspect-ratio: 2/3;
            border-radius: var(--r-xl);
            overflow: hidden;
            background: var(--hp-surface-2);
            border: 1px solid var(--hp-border);
            margin-bottom: 7px;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }
        .movie-card:hover .card-poster {
            transform: translateY(-4px);
            box-shadow: 0 16px 36px rgba(0,0,0,0.55);
            border-color: var(--hp-blue);
        }
        .card-poster img { width: 100%; height: 100%; display: block; object-fit: cover; }
        .card-poster-fallback {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 8px;
            background: linear-gradient(135deg, rgba(0,72,255,0.22), rgba(14,165,233,0.18));
            color: rgba(255,255,255,0.65); font-size: 0.7rem; font-weight: 700;
        }
        .card-rank {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 28px 8px 5px;
            background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, transparent 100%);
            font-size: 1.8rem; font-weight: 900; letter-spacing: -0.05em;
            color: white; line-height: 1; pointer-events: none;
        }
        .movie-card:nth-child(1) .card-rank { color: #fbbf24; }
        .movie-card:nth-child(2) .card-rank { color: #cbd5e1; }
        .movie-card:nth-child(3) .card-rank { color: #d97706; }
        .card-badge {
            position: absolute; top: 6px; left: 6px;
            padding: 2px 6px; border-radius: 5px;
            font-size: 0.6rem; font-weight: 800;
            background: rgba(10,16,28,0.9); color: #fde68a; z-index: 2;
        }
        .card-info { padding: 0 2px; }
        .card-title {
            font-size: 0.8rem; font-weight: 700; line-height: 1.35;
            overflow: hidden; display: -webkit-box;
            -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            margin-bottom: 3px; color: var(--text-sub);
        }
        .card-year { font-size: 0.7rem; color: var(--text-hint); }

        /* ── 카드 호버 오버레이 (인플레이스) ── */
        .card-hover {
            position: absolute; inset: 0; z-index: 2;
            display: flex; flex-direction: column;
            justify-content: space-between;
            padding: 8px 8px 40px;
            background: rgba(0,0,0,0);
            opacity: 0;
            transition: opacity 0.18s ease, background 0.18s ease;
        }
        .movie-card:hover .card-hover { opacity: 1; background: rgba(0,0,0,0.52); }
        .card-hover-metric {
            font-size: 0.66rem; font-weight: 700;
            color: rgba(255,255,255,0.92); background: rgba(0,0,0,0.65);
            border-radius: 4px; padding: 3px 6px;
            align-self: flex-start; max-width: 100%;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .card-actions { display: flex; gap: 4px; justify-content: center; }
        .cact-btn {
            flex: 1; height: 28px; border-radius: 7px;
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(15,23,42,0.82); color: white;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.13s, transform 0.1s; font-size: 0;
        }
        .cact-btn:hover { background: rgba(255,255,255,0.18); transform: scale(1.1); }
        .cact-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; pointer-events: none; }
        .cact-btn.active[data-action="like"]       { background: rgba(244,63,94,0.7); border-color: #F43F5E; }
        .cact-btn.active[data-action="dislike"]    { background: rgba(100,116,139,0.7); border-color: #64748B; }
        .cact-btn.active[data-action="later"]      { background: rgba(245,158,11,0.7); border-color: #F59E0B; }
        .cact-btn.active[data-action="collection"] { background: rgba(139,92,246,0.7); border-color: #8B5CF6; }

        /* ═══════════════════════════════════════════
           LIST VIEW
        ═══════════════════════════════════════════ */
        .rank-list { display: none; }
        .rank-row {
            display: grid;
            grid-template-columns: 48px 58px 1fr auto;
            align-items: center;
            gap: 12px;
            padding: 11px 22px;
            border-bottom: 1px solid rgba(148,163,184,0.06);
            text-decoration: none; color: inherit;
            transition: background 0.12s ease;
        }
        .rank-row:last-child { border-bottom: none; }
        .rank-row:hover { background: rgba(255,255,255,0.03); }
        .rank-no {
            text-align: center;
            font-size: 1.3rem; font-weight: 900; letter-spacing: -0.04em;
            color: var(--text-hint); line-height: 1;
        }
        .rank-row:nth-child(1) .rank-no { color: #fbbf24; font-size: 1.6rem; }
        .rank-row:nth-child(2) .rank-no { color: #94a3b8; font-size: 1.45rem; }
        .rank-row:nth-child(3) .rank-no { color: #d97706; font-size: 1.45rem; }
        .rank-poster-wrap {
            aspect-ratio: 2/3; border-radius: 7px; overflow: hidden;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(148,163,184,0.1);
            position: relative;
        }
        .rank-poster { width: 100%; height: 100%; display: block; object-fit: cover; }
        .rank-poster-fallback {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 5px;
            background: linear-gradient(135deg, rgba(0,72,255,0.2), rgba(14,165,233,0.16));
            color: rgba(255,255,255,0.65); font-size: 0.6rem; font-weight: 700;
        }
        .rank-badge-overlay {
            position: absolute; left: 3px; top: 3px;
            padding: 2px 5px; border-radius: 4px;
            font-size: 0.56rem; font-weight: 800;
            background: rgba(10,16,28,0.9); color: #fde68a;
        }
        .rank-info { min-width: 0; }
        .rank-title {
            font-size: 0.92rem; font-weight: 800;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-bottom: 3px;
        }
        .rank-sub {
            font-size: 0.74rem; color: var(--text-hint);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        .rank-year-chip {
            display: inline-block; font-size: 0.68rem; color: var(--text-hint);
            padding: 2px 7px; border-radius: 999px;
            background: rgba(255,255,255,0.06);
        }
        .rank-metric { text-align: right; flex-shrink: 0; }
        .rank-metric-label { font-size: 0.66rem; color: var(--text-hint); margin-bottom: 3px; }
        .rank-metric-value { font-size: 0.9rem; font-weight: 900; color: white; letter-spacing: -0.02em; }

        /* 뷰 전환 */
        body.list-view .movie-grid { display: none; }
        body.list-view .rank-list { display: block; }

        .section-empty {
            padding: 28px; text-align: center;
            color: var(--text-hint); font-size: 0.86rem;
        }

        @media (max-width: 1024px) {
            .movie-grid { grid-template-columns: repeat(4, 1fr); }
        }
        @media (max-width: 768px) {
            .navbar { padding: 0 16px; }
            .page { padding: 18px 14px 60px; }
            .hero { padding: 26px 22px; }
            .chart-section-header { padding: 14px 16px 12px; flex-wrap: wrap; }
            .movie-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px; }
            .card-rank { font-size: 1.4rem; }
            .rank-row { grid-template-columns: 38px 48px 1fr; padding: 9px 14px; }
            .rank-metric { display: none; }
            .toolbar { flex-direction: column; align-items: flex-start; }
        }
        @media (max-width: 480px) {
            .movie-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/app-shell :: shell}"></div>

<main class="page">

    <!-- Hero -->
    <section class="hero">
        <div class="hero-eyebrow">CHART RANKINGS</div>
        <h1>랭킹 차트</h1>
        <p>매출·관객·효율·평점·시대·장르·인물 — 총
            <span th:text="${totalCount}">16</span>가지 알고리즘으로 영화를 다각도로 분석합니다.</p>
    </section>

    <!-- 카테고리 탭 + 뷰 토글 -->
    <div class="toolbar">
        <nav class="tabs">
            <a class="tab"
               th:classappend="${selectedCategory == null} ? ' active' : ''"
               th:href="@{/ranking}">
                전체
                <span class="tab-count" th:text="${totalCount}">16</span>
            </a>
            <a class="tab"
               th:each="cat : ${categories}"
               th:classappend="${cat == selectedCategory} ? ' active' : ''"
               th:href="@{/ranking(category=${cat.name()})}"
               th:text="${cat.label()}">카테고리</a>
        </nav>

        <div class="view-toggle">
            <button class="view-btn active" id="btn-grid" onclick="setView('grid')" title="그리드 뷰">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            </button>
            <button class="view-btn" id="btn-list" onclick="setView('list')" title="리스트 뷰">
                <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            </button>
        </div>
    </div>

    <!-- 차트 섹션 목록 -->
    <div th:each="section : ${sections}" class="chart-section">

        <!-- 섹션 헤더 -->
        <div class="chart-section-header">
            <div class="section-left">
                <span class="section-icon">
                    <!-- 아이콘 분기 -->
                    <svg th:if="${section.entry().icon() == 'chart-bar'}" viewBox="0 0 24 24"><rect x="3" y="12" width="4" height="9"/><rect x="10" y="7" width="4" height="14"/><rect x="17" y="4" width="4" height="17"/></svg>
                    <svg th:if="${section.entry().icon() == 'users'}" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    <svg th:if="${section.entry().icon() == 'user'}" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <svg th:if="${section.entry().icon() == 'trending-up'}" viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
                    <svg th:if="${section.entry().icon() == 'eye'}" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
                    <svg th:if="${section.entry().icon() == 'film'}" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>
                    <svg th:if="${section.entry().icon() == 'zap'}" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
                    <svg th:if="${section.entry().icon() == 'clock'}" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <svg th:if="${section.entry().icon() == 'star'}" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                    <svg th:if="${section.entry().icon() == 'calendar'}" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    <svg th:if="${section.entry().icon() == 'tag'}" viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                    <svg th:if="${section.entry().icon() == 'video'}" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
                    <svg th:if="${section.entry().icon() == 'globe'}" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                    <svg th:if="${section.entry().icon() == 'heart'}" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                    <svg th:if="${section.entry().icon() == 'seat'}" viewBox="0 0 24 24"><path d="M4 6V4a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v2"/><path d="M20 10v10H4V10"/><path d="M2 10h20"/><path d="M7 21v-5m10 5v-5"/></svg>
                </span>
                <div class="section-texts">
                    <div class="section-title" th:text="${section.entry().title()}">차트 이름</div>
                    <div class="section-desc" th:text="${section.entry().description()}">차트 설명</div>
                </div>
            </div>
            <div class="section-right">
                <span class="cat-badge" th:text="${section.entry().category().label()}">카테고리</span>
                <a class="see-all" th:href="@{|/ranking/${section.entry().code()}|}">
                    전체 보기
                    <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </a>
            </div>
        </div>

        <!-- 그리드 뷰 (기본 — 5×2) -->
        <div class="movie-grid" th:if="${!#lists.isEmpty(section.rows())}">
            <a class="movie-card"
               th:each="row : ${section.rows()}"
               th:href="@{|/movies/${row.movieCode()}|}">
                <div class="card-poster">
                    <img th:if="${!#strings.isEmpty(row.posterImageUrl())}"
                         th:src="${row.posterImageUrl()}"
                         th:alt="${row.movieName()}"
                         loading="lazy">
                    <div class="card-poster-fallback"
                         th:if="${#strings.isEmpty(row.posterImageUrl())}"
                         th:text="${row.movieName()}">영화</div>
                    <span class="card-badge"
                          th:if="${row.badgeLabel() != null}"
                          th:text="${row.badgeLabel()}">뱃지</span>
                    <div class="card-hover">
                        <div class="card-hover-metric"
                             th:text="${row.metricLabel() + ' ' + (row.metricValue() != null ? row.metricValue() : '')}">지표</div>
                        <div class="card-actions">
                            <button class="cact-btn" th:attr="data-code=${row.movieCode()}" data-action="like" title="좋아요" onclick="doAction(event,this)">
                                <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                            </button>
                            <button class="cact-btn" th:attr="data-code=${row.movieCode()}" data-action="dislike" title="별로에요" onclick="doAction(event,this)">
                                <svg viewBox="0 0 24 24"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/></svg>
                            </button>
                            <button class="cact-btn" th:attr="data-code=${row.movieCode()}" data-action="later" title="나중에 볼게요" onclick="doAction(event,this)">
                                <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                            </button>
                            <button class="cact-btn" th:attr="data-code=${row.movieCode()}" data-action="collection" title="컬렉션" onclick="doAction(event,this)">
                                <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="card-rank" th:text="${row.rankNo()}">1</div>
                </div>
                <div class="card-info">
                    <div class="card-title" th:text="${row.movieName()}">영화 제목</div>
                    <div class="card-year"
                         th:text="${row.productionYear() != null ? row.productionYear() : (row.openDate() != null ? #temporals.format(row.openDate(), 'yyyy') : '')}">2024</div>
                </div>
            </a>
        </div>

        <!-- 리스트 뷰 -->
        <div class="rank-list" th:if="${!#lists.isEmpty(section.rows())}">
            <a class="rank-row"
               th:each="row : ${section.rows()}"
               th:href="${row.movieCode() != null ? '/movies/' + row.movieCode() : null}">

                <!-- 순위 번호 -->
                <div class="rank-no" th:text="${row.rankNo()}">1</div>
                <div class="rank-poster-wrap">
                    <img class="rank-poster"
                         th:if="${!#strings.isEmpty(row.posterImageUrl())}"
                         th:src="${row.posterImageUrl()}"
                         th:alt="${row.movieName()}" loading="lazy">
                    <div class="rank-poster-fallback"
                         th:unless="${!#strings.isEmpty(row.posterImageUrl())}"
                         th:text="${row.movieName()}">영화</div>
                    <span class="rank-badge-overlay"
                          th:if="${row.badgeLabel() != null}"
                          th:text="${row.badgeLabel()}">뱃지</span>
                </div>
                <div class="rank-info">
                    <div class="rank-title" th:text="${row.movieName()}">영화 제목</div>
                    <div class="rank-sub"
                         th:if="${!#strings.isEmpty(row.movieNameEn())}"
                         th:text="${row.movieNameEn()}">English Title</div>
                    <span class="rank-year-chip"
                          th:if="${row.productionYear() != null}"
                          th:text="${row.productionYear()}">2024</span>
                    <span class="rank-year-chip"
                          th:if="${row.productionYear() == null and row.openDate() != null}"
                          th:text="${#temporals.format(row.openDate(), 'yyyy')}">2024</span>
                </div>
                <div class="rank-metric">
                    <div class="rank-metric-label" th:text="${row.metricLabel()}">지표</div>
                    <div class="rank-metric-value" th:text="${row.metricValue()}">—</div>
                </div>
            </a>
        </div>

        <div class="section-empty" th:if="${#lists.isEmpty(section.rows())}">
            표시할 데이터가 없습니다.
        </div>
    </div>

</main>

<script>
/* ── 알림 ── */
(function () {
    const btn = document.getElementById('notifBtn'), panel = document.getElementById('notifPanel'),
          badge = document.getElementById('notifBadge'), list = document.getElementById('notifList'),
          readAllBtn = document.getElementById('notifReadAll');
    function timeAgo(s) { if (!s) return ''; const d = Math.floor((Date.now() - new Date(s)) / 1000); if (d < 60) return '방금 전'; if (d < 3600) return Math.floor(d/60)+'분 전'; if (d < 86400) return Math.floor(d/3600)+'시간 전'; return Math.floor(d/86400)+'일 전'; }
    function renderItems(items) {
        if (!items || !items.length) { list.innerHTML = '<div class="notif-empty">새 알림이 없습니다</div>'; return; }
        list.innerHTML = items.map(item => {
            const av = item.actorProfileImageUrl ? `<img src="${item.actorProfileImageUrl}" alt="">` : (item.actorNickname||'?')[0];
            const th = item.moviePosterUrl ? `<img class="notif-movie-thumb" src="${item.moviePosterUrl}" alt="">` : '';
            const txt = item.notifText || (item.type === 'FOLLOW' ? `<strong>${item.actorNickname}</strong>님이 회원님을 팔로우하기 시작했습니다` : `<strong>${item.actorNickname}</strong>님이 <strong>${item.movieName}</strong>을(를) 인생영화로 추가했습니다`);
            return `<a class="notif-item${!item.isRead?' unread':''}" href="${item.linkUrl||'#'}"><div class="notif-avatar">${av}</div><div class="notif-content"><div class="notif-text">${txt}</div><div class="notif-time">${timeAgo(item.createdAt)}</div></div>${th}</a>`;
        }).join('');
    }
    function upd(n) { badge.textContent = n > 0 ? (n > 99 ? '99+' : n) : ''; }
    fetch('/api/notifications').then(r => r.ok ? r.json() : null).then(d => { if (d) upd(d.unreadCount); }).catch(()=>{});
    btn.addEventListener('click', e => { e.stopPropagation(); const op = panel.hidden; panel.hidden = !op; if (!op) return; fetch('/api/notifications').then(r => r.ok ? r.json() : null).then(d => { if (!d) return; upd(d.unreadCount); renderItems(d.items); }).catch(()=>{}); });
    readAllBtn.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); fetch('/api/notifications/read-all',{method:'POST'}).then(() => { upd(0); document.querySelectorAll('.notif-item.unread').forEach(el=>el.classList.remove('unread')); }).catch(()=>{}); });
    document.addEventListener('click', e => { if (!panel.hidden && !panel.contains(e.target) && e.target !== btn) panel.hidden = true; });
})();

/* ── 뷰 토글 ── */
function setView(mode) {
    document.body.classList.toggle('list-view', mode === 'list');
    document.getElementById('btn-grid').classList.toggle('active', mode === 'grid');
    document.getElementById('btn-list').classList.toggle('active', mode === 'list');
    try { localStorage.setItem('cinematch_ranking_view', mode); } catch(e) {}
}
(function () {
    try { const s = localStorage.getItem('cinematch_ranking_view'); if (s === 'list') setView('list'); } catch(e) {}
})();

/* ── 카드 액션버튼 ── */
function doAction(e, btn) {
    e.preventDefault(); e.stopPropagation();
    const code = btn.dataset.code, action = btn.dataset.action;
    if (!code || !action) return;
    fetch('/api/movies/' + code + '/' + action, { method: 'POST', headers: { 'X-Requested-With': 'XMLHttpRequest' } })
        .then(r => { if (r.status === 401) { window.location.href = '/login'; return null; } return r.ok ? r.json() : null; })
        .then(data => {
            if (!data) return;
            document.querySelectorAll('.cact-btn[data-code="' + code + '"]').forEach(b => {
                const act = b.dataset.action;
                b.classList.toggle('active', (act==='like'&&data.liked)||(act==='dislike'&&data.disliked)||(act==='later'&&data.later)||(act==='collection'&&data.collected));
            });
        }).catch(() => {});
}
</script>
</body>
</html>
