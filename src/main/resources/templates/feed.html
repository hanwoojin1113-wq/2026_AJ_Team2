<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>피드 | CineMatch</title>
    <link rel="stylesheet" href="/css/hp-theme.css">
    <link rel="stylesheet" href="/css/badges.css">
    <style>
        :root {
            --bg: var(--hp-bg);
            --surface: var(--hp-surface);
            --surface-soft: var(--hp-surface-2);
            --border: var(--hp-border);
            --text: var(--hp-text);
            --sub: var(--hp-text-sub);
            --hint: var(--hp-text-hint);
            --accent: var(--hp-blue);
        }
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 18% 0%, rgba(2,74,216,0.18), transparent 28%),
                linear-gradient(180deg, #0f1117 0%, #090b10 100%);
            color: var(--text);
        }
        a { color: inherit; }
        .page {
            width: min(100%, 920px);
            margin: 0 auto;
            padding: 30px 20px 72px;
            display: flex;
            gap: 28px;
            align-items: flex-start;
        }
        .feed-column {
            flex: 1 1 0;
            min-width: 0;
        }
        .right-sidebar {
            width: 268px;
            flex-shrink: 0;
            position: sticky;
            top: 84px;
        }
        .sidebar-widget {
            background: rgba(22,26,38,0.97);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 14px;
        }
        .sidebar-widget-title {
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #8fb3ff;
            margin: 0 0 16px;
        }
        .trending-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 9px 0;
            text-decoration: none;
            color: inherit;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: opacity 0.15s;
        }
        .trending-item:last-child { border-bottom: none; }
        .trending-item:hover { opacity: 0.78; }
        .trending-rank {
            font-size: 0.78rem;
            font-weight: 900;
            color: #475569;
            width: 18px;
            text-align: center;
            flex-shrink: 0;
        }
        .trending-poster {
            width: 36px;
            height: 54px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
            background: rgba(255,255,255,0.06);
        }
        .trending-poster-empty {
            width: 36px;
            height: 54px;
            border-radius: 6px;
            background: rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: #475569;
        }
        .trending-info { min-width: 0; }
        .trending-title {
            font-size: 0.86rem;
            font-weight: 700;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .trending-sub {
            font-size: 0.74rem;
            color: var(--hint);
            margin-top: 2px;
        }
        .suggest-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .suggest-item:last-child { border-bottom: none; }
        .suggest-avatar,
        .suggest-avatar-fallback {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            background: rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
        }
        .suggest-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .suggest-avatar-fallback svg { width: 16px; height: 16px; fill: currentColor; }
        .suggest-name {
            flex: 1;
            min-width: 0;
            font-size: 0.86rem;
            font-weight: 700;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .suggest-follow-btn {
            flex-shrink: 0;
            border: none;
            border-radius: 999px;
            background: #fff;
            color: #0f172a;
            height: 28px;
            padding: 0 12px;
            font: inherit;
            font-size: 0.74rem;
            font-weight: 900;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
        }
        .suggest-follow-btn.following {
            background: rgba(255,255,255,0.08);
            color: #e2e8f0;
            border: 1px solid rgba(255,255,255,0.12);
        }
        .suggest-follow-btn:hover { opacity: 0.85; }
        .suggest-follow-btn:active { transform: scale(0.95); }
        .feed-hero {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 18px;
            margin-bottom: 20px;
            padding: 20px 22px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(2,74,216,0.14) 0%, rgba(30,35,48,0.96) 60%);
            box-shadow: 0 16px 48px rgba(2,6,23,0.3);
        }
        .feed-kicker {
            font-size: 0.76rem;
            font-weight: 900;
            letter-spacing: 0.1em;
            color: #8fb3ff;
            text-transform: uppercase;
        }
        .feed-title {
            margin: 8px 0 0;
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            letter-spacing: -0.05em;
        }
        .feed-copy {
            margin-top: 8px;
            color: var(--sub);
            font-size: 0.95rem;
            line-height: 1.65;
        }
        .create-post-cta {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 44px;
            padding: 0 18px;
            border-radius: 999px;
            background: #fff;
            color: #0f172a;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 900;
            box-shadow: 0 16px 36px rgba(255,255,255,0.14);
        }
        .create-post-cta svg {
            width: 17px;
            height: 17px;
        }
        .feed {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .post-card {
            overflow: hidden;
            border-radius: 16px;
            background: rgba(22,26,38,0.97);
            border: 1px solid rgba(255,255,255,0.08);
            border-top-color: rgba(255,255,255,0.14);
            box-shadow: 0 8px 32px rgba(2,6,23,0.28);
        }
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            padding: 18px 20px;
        }
        .author-link {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
            text-decoration: none;
        }
        .author-avatar,
        .author-avatar-fallback {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            background: rgba(255,255,255,0.08);
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 0 2px #024ad8;
        }
        .author-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .author-avatar-fallback svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
        .author-copy {
            min-width: 0;
        }
        .author-name {
            font-size: 0.94rem;
            font-weight: 900;
        }
        .post-date {
            margin-top: 3px;
            color: var(--hint);
            font-size: 0.76rem;
        }
        .follow-btn {
            border: none;
            border-radius: 999px;
            background: #fff;
            color: #0f172a;
            min-width: 78px;
            height: 34px;
            padding: 0 14px;
            font: inherit;
            font-size: 0.78rem;
            font-weight: 900;
            cursor: pointer;
            transition: background 0.18s, box-shadow 0.18s, transform 0.1s;
        }
        .follow-btn.following {
            background: rgba(255,255,255,0.08);
            color: #e2e8f0;
            border: 1px solid rgba(255,255,255,0.12);
        }
        .follow-btn:hover:not(.following) {
            box-shadow: 0 4px 14px rgba(255,255,255,0.18);
        }
        .follow-btn.following:hover {
            background: rgba(255,255,255,0.14);
        }
        .follow-btn:active {
            transform: scale(0.96);
        }
        .post-carousel {
            position: relative;
            aspect-ratio: 4 / 5;
            background: #0f1117;
            overflow: hidden;
        }
        .carousel-track {
            display: flex;
            height: 100%;
            transition: transform 0.3s ease;
        }
        .carousel-slide {
            flex: 0 0 100%;
            height: 100%;
        }
        .carousel-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .carousel-prev,
        .carousel-next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: rgba(0,0,0,0.52);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }
        .carousel-prev { left: 10px; }
        .carousel-next { right: 10px; }
        .carousel-dots {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 2;
        }
        .carousel-dot {
            width: 6px;
            height: 6px;
            border-radius: 999px;
            border: none;
            background: rgba(255,255,255,0.45);
            cursor: pointer;
            transition: width 0.2s, background 0.2s;
        }
        .carousel-dot.active {
            width: 18px;
            background: #fff;
        }
        .post-image-empty {
            display: none;
        }
        .post-body {
            display: grid;
            gap: 14px;
            padding: 18px 20px 22px;
        }
        .post-content {
            margin: 0;
            color: #e2e8f0;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 0.96rem;
        }
        .post-edit-btn {
            justify-self: start;
            border: none;
            background: transparent;
            padding: 0;
            color: rgba(255,255,255,0.42);
            font: inherit;
            font-size: 0.78rem;
            font-weight: 800;
            cursor: pointer;
        }
        .post-edit-btn:hover { color: #60a5fa; }
        .inline-edit-box { display: grid; gap: 8px; }
        .inline-edit-box textarea {
            width: 100%;
            min-height: 80px;
            box-sizing: border-box;
            resize: vertical;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.06);
            color: #fff;
            font: inherit;
            font-size: 0.9rem;
            line-height: 1.5;
            outline: none;
        }
        .inline-edit-box textarea:focus { border-color: #024ad8; }
        .inline-edit-actions { display: flex; justify-content: flex-end; gap: 8px; }
        .inline-edit-actions button {
            height: 32px;
            padding: 0 16px;
            border-radius: 999px;
            border: none;
            font: inherit;
            font-size: 0.8rem;
            font-weight: 800;
            cursor: pointer;
        }
        .inline-edit-cancel {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15) !important;
            color: rgba(255,255,255,0.65);
        }
        .inline-edit-save { background: #024ad8; color: #fff; }
        .inline-edit-save:disabled { opacity: 0.5; cursor: not-allowed; }
        .post-actions {
            display: flex;
            align-items: center;
            gap: 16px;
            padding-top: 4px;
        }
        .icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border: none;
            background: transparent;
            color: #e2e8f0;
            padding: 0;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.15s, transform 0.12s;
        }
        .icon-btn:hover:not(:disabled) {
            color: #fff;
            transform: translateY(-1px);
        }
        .icon-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .icon-btn svg {
            width: 22px;
            height: 22px;
        }
        .like-btn.liked {
            color: #f87171;
        }
        @keyframes likePopBtn { 0%{transform:scale(1)} 25%{transform:scale(0.72)} 60%{transform:scale(1.38)} 100%{transform:scale(1)} }
        .like-pop { animation: likePopBtn 0.42s cubic-bezier(0.36,0.07,0.19,0.97) forwards; }
        @keyframes likeParticle { 0%{transform:translate(0,0) scale(1);opacity:1} 100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0} }
        .like-particle { position:fixed; width:7px; height:7px; border-radius:50%; pointer-events:none; z-index:9999; animation:likeParticle 0.6s ease-out forwards; }
        .rollup-wrap { display:inline-block; overflow:hidden; height:1.15em; vertical-align:middle; position:relative; }
        .rollup-old, .rollup-new { display:block; position:absolute; width:100%; transition:transform 0.28s cubic-bezier(0.25,0.46,0.45,0.94); }
        @keyframes dblHeart { 0%{transform:translate(-50%,-50%) scale(0);opacity:1} 50%{transform:translate(-50%,-50%) scale(1.25);opacity:1} 100%{transform:translate(-50%,-50%) scale(1);opacity:0} }
        .dbl-heart { position:absolute; font-size:80px; pointer-events:none; z-index:10; animation:dblHeart 0.75s ease-out forwards; filter:drop-shadow(0 2px 8px rgba(0,0,0,0.5)); }
        .post-engagement {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            color: #f8fafc;
            font-size: 0.9rem;
            font-weight: 800;
            margin-top: -2px;
        }
        .post-engagement .like-count,
        .post-engagement .comment-count {
            color: #fff;
            font-weight: 900;
        }
        .friend-signal { display:flex; align-items:center; gap:6px; font-size:0.78rem; color:rgba(255,255,255,0.52); padding:4px 0 0; }
        .friend-signal span:first-child { font-size:0.72rem; }
        .movie-tag-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            color: inherit;
            text-decoration: none;
            transition: background 0.18s, border-color 0.18s;
        }
        .movie-tag-card:hover {
            background: rgba(255,255,255,0.07);
            border-color: rgba(96,165,250,0.28);
        }
        .movie-tag-poster,
        .movie-tag-poster-fallback {
            width: 40px;
            height: 60px;
            border-radius: 8px;
            flex: 0 0 auto;
            object-fit: cover;
            background: rgba(255,255,255,0.06);
        }
        .movie-tag-poster-fallback {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #475569;
        }
        .movie-tag-poster-fallback svg {
            width: 22px;
            height: 22px;
        }
        .movie-tag-label {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--hint);
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
        }
        .movie-tag-label svg {
            width: 12px;
            height: 12px;
        }
        .movie-tag-title {
            margin-top: 6px;
            font-size: 0.98rem;
            font-weight: 900;
        }
        .feed-empty,
        .feed-status {
            padding: 34px 20px;
            border-radius: 22px;
            border: 1px dashed rgba(255,255,255,0.14);
            color: var(--hint);
            text-align: center;
            background: rgba(30,35,48,0.62);
        }
        .feed-status {
            margin-top: 18px;
            display: none;
        }
        .feed-status.visible {
            display: block;
        }
        /* ── 스토리링 ── */
        .story-bar {
            display: flex;
            gap: 18px;
            padding: 14px 2px 18px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .story-bar::-webkit-scrollbar { display: none; }
        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            text-decoration: none;
            color: inherit;
            width: 64px;
        }
        .story-ring {
            width: 56px; height: 56px;
            border-radius: 50%;
            padding: 2.5px;
            background: var(--hp-surface-2);
        }
        .story-ring.active {
            background: linear-gradient(135deg, #024ad8, #8b5cf6, #f43f5e);
        }
        .story-avatar {
            width: 100%; height: 100%;
            border-radius: 50%;
            background: var(--hp-card);
            border: 2px solid var(--hp-bg);
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; font-weight: 700; color: var(--hp-text-sub);
        }
        .story-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .story-name {
            font-size: 0.68rem;
            font-weight: 600;
            color: var(--hint);
            text-align: center;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .story-item:hover .story-name { color: var(--text); }

        @media (max-width: 860px) {
            .right-sidebar { display: none; }
        }
        @media (max-width: 768px) {
            .page {
                padding: 16px 12px 56px;
                display: block;
            }
            .feed-hero {
                align-items: flex-start;
                flex-direction: column;
                margin-bottom: 14px;
            }
        }
        /* ── New post types ── */
        .post-video-wrap {
            background: #000;
            border-radius: 0;
        }
        .post-video {
            width: 100%;
            max-height: 400px;
            display: block;
        }
        .post-file-card {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 0 16px 4px;
            padding: 14px 16px;
            border-radius: 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            text-decoration: none;
            color: inherit;
            transition: background 0.15s;
        }
        .post-file-card:hover { background: rgba(255,255,255,0.07); }
        .post-file-icon { font-size: 2rem; flex-shrink: 0; }
        .post-file-info { min-width: 0; }
        .post-file-name { font-weight: 700; font-size: 0.88rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .post-file-size { color: var(--hint); font-size: 0.76rem; margin-top: 2px; }
        .post-poll-wrap, .post-quiz-wrap {
            margin: 0 16px 4px;
            padding: 16px;
            border-radius: 16px;
            background: rgba(37,99,235,0.07);
            border: 1px solid rgba(96,165,250,0.14);
        }
        .post-poll-question, .post-quiz-question {
            font-weight: 800;
            font-size: 0.96rem;
            margin: 0 0 12px;
            line-height: 1.5;
        }
        .post-poll-options, .post-quiz-options { display: grid; gap: 8px; }
        .poll-option-bar {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            background: rgba(255,255,255,0.04);
            transition: border-color 0.15s;
        }
        .poll-option-bar:hover { border-color: rgba(96,165,250,0.4); }
        .poll-option-bar.voted { border-color: rgba(96,165,250,0.6); }
        .poll-option-fill {
            position: absolute; inset-y-0: 0; left: 0; top: 0; bottom: 0;
            background: rgba(37,99,235,0.22);
            transition: width 0.5s ease;
            pointer-events: none;
        }
        .poll-option-bar.voted .poll-option-fill { background: rgba(37,99,235,0.36); }
        .poll-option-inner {
            position: relative;
            display: flex; align-items: center; justify-content: space-between;
            padding: 9px 12px;
            font-size: 0.88rem; font-weight: 600;
        }
        .poll-option-pct {
            font-size: 0.78rem; font-weight: 800;
            color: rgba(255,255,255,0.55);
        }
        .poll-voted-mark { margin-left: 6px; color: #60a5fa; font-size: 0.75rem; }
        .poll-meta {
            margin-top: 8px;
            font-size: 0.76rem; color: var(--hint);
        }
        .quiz-option-btn {
            width: 100%;
            display: flex; align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            color: inherit; font: inherit; font-size: 0.88rem; font-weight: 600;
            cursor: pointer; text-align: left;
            transition: all 0.15s;
        }
        .quiz-option-btn:hover:not(:disabled) { border-color: rgba(96,165,250,0.4); background: rgba(37,99,235,0.1); }
        .quiz-option-btn:disabled { cursor: default; }
        .quiz-option-btn.correct { border-color: rgba(34,197,94,0.6); background: rgba(34,197,94,0.12); color: #86efac; }
        .quiz-option-btn.wrong { border-color: rgba(239,68,68,0.5); background: rgba(239,68,68,0.1); color: #fca5a5; }
        .quiz-option-btn.my-answer { font-weight: 800; }
        .quiz-result-badge {
            margin-top: 10px;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 0.8rem; font-weight: 800;
            display: inline-flex; align-items: center; gap: 5px;
        }
        .quiz-result-badge.correct { background: rgba(34,197,94,0.15); color: #86efac; }
        .quiz-result-badge.wrong { background: rgba(239,68,68,0.12); color: #fca5a5; }
        .post-type-badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 8px; border-radius: 999px;
            font-size: 0.68rem; font-weight: 800;
            background: rgba(255,255,255,0.06); color: #64748b;
            margin-bottom: 4px;
        }
    </style>
</head>
<body data-app-shell-notif="true">
<div th:replace="~{fragments/app-shell :: shell}"></div>

<main class="page"
      id="feedPage"
      th:attr="data-next-cursor=${nextCursor},data-has-more=${hasMore}">
    <div class="feed-column">
    <section class="feed-hero">
        <div>
            <div class="feed-kicker">Community Feed</div>
            <h1 class="feed-title">최신 영화 게시물</h1>
            <p class="feed-copy">모든 사용자가 남긴 영화 게시물을 최신순으로 둘러보세요.</p>
        </div>
        <a class="create-post-cta" th:href="@{/posts/create}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" aria-hidden="true">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            새 게시물 작성
        </a>
    </section>

    <div class="story-bar" th:if="${storyUsers != null and !storyUsers.isEmpty()}">
        <a class="story-item"
           th:each="u : ${storyUsers}"
           th:href="@{|/users/${u.loginId}|}">
            <div th:class="${u.hasRecentPost} ? 'story-ring active' : 'story-ring'">
                <div class="story-avatar">
                    <img th:if="${u.profileImageUrl != null and !#strings.isEmpty(u.profileImageUrl.toString())}"
                         th:src="${u.profileImageUrl}" th:alt="${u.nickname}">
                    <span th:if="${u.profileImageUrl == null or #strings.isEmpty(u.profileImageUrl.toString())}"
                          th:text="${#strings.substring(u.nickname, 0, 1)}">U</span>
                </div>
            </div>
            <span class="story-name" th:text="${u.nickname}">닉네임</span>
        </a>
    </div>

    <div class="feed" id="feedList" th:if="${posts != null and !posts.isEmpty()}">
        <article class="post-card" th:each="post : ${posts}" th:id="|post-${post.postId}|" th:attr="data-content=${post.content}">
            <header class="post-header">
                <a class="author-link" th:href="@{|/users/${post.loginId}|}">
                    <div class="author-avatar" th:if="${post.profileImageUrl != null and !#strings.isEmpty(post.profileImageUrl)}">
                        <img th:src="${post.profileImageUrl}" th:alt="${post.nickname}">
                    </div>
                    <div class="author-avatar-fallback" th:if="${post.profileImageUrl == null or #strings.isEmpty(post.profileImageUrl)}">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 12.2c2.6 0 4.6-2 4.6-4.5S14.6 3.2 12 3.2 7.4 5.2 7.4 7.7s2 4.5 4.6 4.5Zm0 2.3c-4.1 0-7.5 2.4-8.3 5.8-.1.5.2.9.7.9h15.2c.5 0 .8-.4.7-.9-.8-3.4-4.2-5.8-8.3-5.8Z"/>
                        </svg>
                    </div>
                    <div class="author-copy">
                        <div class="author-name-row" style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;">
                            <span class="author-name" th:text="${post.nickname}">nickname</span>
                            <span th:if="${post.badgeCode != null}"
                                  th:classappend="'ubadge ubadge-t' + ${post.badgeTier}"
                                  class="ubadge"
                                  th:title="${post.badgeName}">
                                <span class="ubadge-icon" th:text="${post.badgeIcon}"></span>
                                <span th:text="${post.badgeName}"></span>
                            </span>
                        </div>
                        <div class="post-date" th:attr="data-created-at=${post.createdAt}" th:text="${post.createdAtLabel}">2026.05.15</div>
                    </div>
                </a>
                <button th:if="${loginUserId != null and !post.isMyPost}"
                        class="follow-btn"
                        type="button"
                        data-follow-toggle
                        th:classappend="${post.isFollowing} ? ' following' : ''"
                        th:attr="data-login-id=${post.loginId},data-following=${post.isFollowing}">
                    <span th:text="${post.isFollowing ? '팔로잉' : '팔로우'}">팔로우</span>
                </button>
            </header>

            <!-- Photo carousel -->
            <div class="post-carousel" th:if="${post.images != null and !post.images.isEmpty()}" data-carousel>
                <div class="carousel-track">
                    <div class="carousel-slide" th:each="img : ${post.images}">
                        <img class="carousel-img" th:src="${img}" alt="" loading="lazy">
                    </div>
                </div>
                <div class="carousel-dots" th:if="${post.images.size() > 1}">
                    <button class="carousel-dot active"
                            th:each="img, stat : ${post.images}"
                            th:classappend="${stat.index == 0} ? ' active' : ''"
                            th:attr="data-index=${stat.index}"
                            type="button"
                            aria-label="이미지 이동"></button>
                </div>
                <button class="carousel-prev" th:if="${post.images.size() > 1}" type="button" aria-label="이전">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <button class="carousel-next" th:if="${post.images.size() > 1}" type="button" aria-label="다음">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
            </div>

            <!-- Video -->
            <div class="post-video-wrap" th:if="${post.postType == 'video' and post.attachment != null}">
                <video class="post-video" controls preload="metadata"
                       th:src="${post.attachment.fileUrl}"></video>
            </div>

            <!-- File attachment -->
            <a class="post-file-card" th:if="${post.postType == 'file' and post.attachment != null}"
               th:href="${post.attachment.fileUrl}" target="_blank" rel="noopener">
                <span class="post-file-icon">📎</span>
                <div class="post-file-info">
                    <div class="post-file-name" th:text="${post.attachment.fileName}">파일명</div>
                    <div class="post-file-size" th:text="${post.attachment.fileSize != null ? (post.attachment.fileSize / 1024) + ' KB' : ''}"></div>
                </div>
            </a>

            <!-- Poll -->
            <div class="post-poll-wrap" th:if="${post.postType == 'poll' and post.poll != null}"
                 th:attr="data-poll-id=${post.poll.pollId},data-has-voted=${post.poll.hasVoted},data-my-vote=${post.poll.myVotedOptionId},data-total=${post.poll.totalVotes}">
                <p class="post-poll-question" th:text="${post.poll.question}">투표 질문</p>
                <div class="post-poll-options">
                    <div th:each="opt : ${post.poll.options}"
                         class="poll-option-bar"
                         th:classappend="${opt.isMyVote} ? ' voted' : ''"
                         th:attr="data-option-id=${opt.optionId}">
                        <div class="poll-option-fill"
                             th:style="${post.poll.hasVoted and post.poll.totalVotes > 0} ? 'width:' + ${(opt.voteCount * 100 / post.poll.totalVotes)} + '%' : 'width:0%'"></div>
                        <div class="poll-option-inner">
                            <span th:text="${opt.optionText}">선택지</span>
                            <span>
                                <span class="poll-option-pct" th:if="${post.poll.hasVoted}"
                                      th:text="${post.poll.totalVotes > 0} ? ${#numbers.formatDecimal(opt.voteCount * 100.0 / post.poll.totalVotes, 1, 0)} + '%' : '0%'"></span>
                                <span class="poll-voted-mark" th:if="${opt.isMyVote}">✓</span>
                            </span>
                        </div>
                    </div>
                </div>
                <div class="poll-meta">
                    <span th:text="${post.poll.totalVotes} + '명 참여'">0명 참여</span>
                    <span th:if="${!post.poll.hasVoted}" style="margin-left:8px;color:#60a5fa;">· 투표하기</span>
                </div>
            </div>

            <!-- Quiz -->
            <div class="post-quiz-wrap" th:if="${post.postType == 'quiz' and post.quiz != null}"
                 th:attr="data-quiz-id=${post.quiz.quizId},data-has-answered=${post.quiz.hasAnswered},data-my-answer=${post.quiz.myAnswerOptionId},data-my-correct=${post.quiz.myAnswerCorrect}">
                <p class="post-quiz-question" th:text="${post.quiz.question}">퀴즈 질문</p>
                <div class="post-quiz-options">
                    <button type="button" class="quiz-option-btn"
                            th:each="opt : ${post.quiz.options}"
                            th:classappend="${post.quiz.hasAnswered and opt.isCorrect} ? ' correct' : (${post.quiz.hasAnswered and opt.isMyAnswer and !opt.isCorrect} ? ' wrong my-answer' : (${post.quiz.hasAnswered and opt.isMyAnswer} ? ' my-answer' : ''))"
                            th:disabled="${post.quiz.hasAnswered}"
                            th:attr="data-option-id=${opt.optionId}"
                            th:text="${opt.optionText}">선택지</button>
                </div>
                <div th:if="${post.quiz.hasAnswered}">
                    <span class="quiz-result-badge correct" th:if="${post.quiz.myAnswerCorrect}">✓ 정답!</span>
                    <span class="quiz-result-badge wrong" th:if="${post.quiz.hasAnswered and !post.quiz.myAnswerCorrect}">✗ 오답</span>
                </div>
            </div>

            <div class="post-body">
                <span class="post-type-badge" th:if="${post.postType == 'video'}">🎥 동영상</span>
                <span class="post-type-badge" th:if="${post.postType == 'file'}">📎 파일</span>
                <span class="post-type-badge" th:if="${post.postType == 'poll'}">☑ 투표</span>
                <span class="post-type-badge" th:if="${post.postType == 'quiz'}">❓ 퀴즈</span>
                <p class="post-content" th:if="${post.content != null and !#strings.isEmpty(post.content)}" th:text="${post.content}">게시물 설명</p>
                <button class="post-edit-btn"
                        type="button"
                        th:if="${loginUserId != null and post.isMyPost}"
                        th:attr="data-post-id=${post.postId}">수정</button>
                <div class="post-actions">
                    <button class="icon-btn like-btn" type="button"
                            th:classappend="${post.likedByMe} ? ' liked' : ''"
                            th:attr="data-post-id=${post.postId},data-liked=${post.likedByMe}"
                            aria-label="좋아요">
                        <svg viewBox="0 0 24 24"
                             th:attr="fill=${post.likedByMe ? 'currentColor' : 'none'}"
                             stroke="currentColor" stroke-width="2">
                            <path d="M12 20s-6.5-4.2-8.3-8A4.7 4.7 0 0 1 8.2 5a4.9 4.9 0 0 1 3.8 1.9A4.9 4.9 0 0 1 15.8 5a4.7 4.7 0 0 1 4.5 7c-1.8 3.8-8.3 8-8.3 8Z"/>
                        </svg>
                    </button>
                    <a class="icon-btn comment-link" th:href="@{|/posts/${post.postId}#comments|}" aria-label="댓글">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        </svg>
                    </a>
                    <button class="icon-btn" type="button" disabled aria-label="북마크">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                        </svg>
                    </button>
                </div>
                <div class="post-engagement">
                    <span>좋아요 <span class="like-count" th:text="${post.likeCount}">0</span>개</span>
                    <span>댓글 <span class="comment-count" th:text="${post.commentCount}">0</span>개</span>
                </div>
                <div th:if="${post.friendLikedSignal != null}" class="friend-signal">
                    <span>❤️</span><span th:text="${post.friendLikedSignal}"></span>
                </div>
                <a class="movie-tag-card" th:href="@{|/movies/${post.movieCode}|}">
                    <img class="movie-tag-poster"
                         th:if="${post.moviePosterUrl != null and !#strings.isEmpty(post.moviePosterUrl)}"
                         th:src="${post.moviePosterUrl}"
                         th:alt="${post.movieTitle}">
                    <div class="movie-tag-poster-fallback"
                         th:if="${post.moviePosterUrl == null or #strings.isEmpty(post.moviePosterUrl)}">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect>
                            <line x1="7" y1="2" x2="7" y2="22"></line>
                            <line x1="17" y1="2" x2="17" y2="22"></line>
                            <line x1="2" y1="12" x2="22" y2="12"></line>
                            <line x1="2" y1="7" x2="22" y2="7"></line>
                            <line x1="2" y1="17" x2="22" y2="17"></line>
                        </svg>
                    </div>
                    <div>
                        <div class="movie-tag-label">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect>
                                <line x1="7" y1="2" x2="7" y2="22"></line>
                                <line x1="17" y1="2" x2="17" y2="22"></line>
                                <line x1="2" y1="12" x2="22" y2="12"></line>
                                <line x1="2" y1="7" x2="22" y2="7"></line>
                                <line x1="2" y1="17" x2="22" y2="17"></line>
                            </svg>
                            <span>태그한 영화</span>
                        </div>
                        <div class="movie-tag-title" th:text="${post.movieTitle}">영화 제목</div>
                    </div>
                </a>
            </div>
        </article>
    </div>
    <div class="feed-empty" th:if="${posts == null or posts.isEmpty()}">아직 올라온 게시물이 없습니다.</div>
    <div class="feed-status" id="feedStatus">게시물을 불러오는 중입니다.</div>
    <div id="feedSentinel" style="height:1px"></div>
    </div><!-- /.feed-column -->

    <aside class="right-sidebar">
        <!-- 실시간 인기 영화 -->
        <div class="sidebar-widget" th:if="${trendingMovies != null and !trendingMovies.isEmpty()}">
            <p class="sidebar-widget-title">실시간 인기 영화</p>
            <a class="trending-item"
               th:each="movie, stat : ${trendingMovies}"
               th:href="${movie.detailUrl}"
               th:if="${stat.index < 5}">
                <span class="trending-rank" th:text="${stat.index + 1}">1</span>
                <img class="trending-poster"
                     th:if="${movie.posterImageUrl != null and !#strings.isEmpty(movie.posterImageUrl)}"
                     th:src="${movie.posterImageUrl}"
                     th:alt="${movie.title}"
                     loading="lazy">
                <div class="trending-poster-empty"
                     th:if="${movie.posterImageUrl == null or #strings.isEmpty(movie.posterImageUrl)}">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                        <rect x="2" y="2" width="20" height="20" rx="2" ry="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/>
                    </svg>
                </div>
                <div class="trending-info">
                    <div class="trending-title" th:text="${movie.title}">영화 제목</div>
                    <div class="trending-sub" th:text="${movie.subtitle}">2024</div>
                </div>
            </a>
        </div>

        <!-- 추천 팔로우 -->
        <div class="sidebar-widget" th:if="${suggestedUsers != null and !suggestedUsers.isEmpty()}">
            <p class="sidebar-widget-title">팔로우 추천</p>
            <div class="suggest-item" th:each="su : ${suggestedUsers}">
                <div class="suggest-avatar" th:if="${su.profileImageUrl != null and !#strings.isEmpty(su.profileImageUrl)}">
                    <img th:src="${su.profileImageUrl}" th:alt="${su.nickname}">
                </div>
                <div class="suggest-avatar-fallback" th:if="${su.profileImageUrl == null or #strings.isEmpty(su.profileImageUrl)}">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 12.2c2.6 0 4.6-2 4.6-4.5S14.6 3.2 12 3.2 7.4 5.2 7.4 7.7s2 4.5 4.6 4.5Zm0 2.3c-4.1 0-7.5 2.4-8.3 5.8-.1.5.2.9.7.9h15.2c.5 0 .8-.4.7-.9-.8-3.4-4.2-5.8-8.3-5.8Z"/>
                    </svg>
                </div>
                <a class="suggest-name" th:href="@{|/users/${su.loginId}|}" th:text="${su.nickname}">닉네임</a>
                <button class="suggest-follow-btn"
                        type="button"
                        data-follow-toggle
                        th:classappend="${su.followingByCurrentUser} ? ' following' : ''"
                        th:attr="data-login-id=${su.loginId},data-following=${su.followingByCurrentUser}">
                    <span th:text="${su.followingByCurrentUser ? '팔로잉' : '팔로우'}">팔로우</span>
                </button>
            </div>
        </div>
    </aside>
</main>

<script>
window.addEventListener('pageshow', function(e) {
    if (e.persisted) window.location.reload();
});
(function () {
    const page = document.getElementById('feedPage');
    const feedList = document.getElementById('feedList');
    const status = document.getElementById('feedStatus');
    const sentinel = document.getElementById('feedSentinel');
    if (!page || !feedList || !sentinel) return;

    let nextCursor = page.dataset.nextCursor || '';
    let hasMore = page.dataset.hasMore === 'true';
    let loading = false;

    function escapeHtml(value) {
        return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function timeAgo(value) {
        if (!value) return '';
        const seconds = Math.max(0, Math.floor((Date.now() - new Date(value).getTime()) / 1000));
        if (seconds < 60) return '방금 전';
        if (seconds < 3600) return `${Math.floor(seconds / 60)}분 전`;
        if (seconds < 86400) return `${Math.floor(seconds / 3600)}시간 전`;
        return `${Math.floor(seconds / 86400)}일 전`;
    }

    function badgeMarkup(post) {
        if (!post.badgeCode) return '';
        return `<span class="ubadge ubadge-t${post.badgeTier}" title="${escapeHtml(post.badgeName || '')}"><span class="ubadge-icon">${escapeHtml(post.badgeIcon || '')}</span><span>${escapeHtml(post.badgeName || '')}</span></span>`;
    }

    function avatarMarkup(post) {
        const name = escapeHtml(post.nickname || '?');
        const href = `/users/${encodeURIComponent(post.loginId || '')}`;
        const badge = badgeMarkup(post);
        const nameLine = `<div class="author-name-row" style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;"><span class="author-name">${name}</span>${badge}</div>`;
        if (post.profileImageUrl) {
            return `<a class="author-link" href="${href}">
                <div class="author-avatar"><img src="${escapeHtml(post.profileImageUrl)}" alt="${name}"></div>
                <div class="author-copy">${nameLine}<div class="post-date">${timeAgo(post.createdAt)}</div></div>
            </a>`;
        }
        return `<a class="author-link" href="${href}">
            <div class="author-avatar-fallback">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12.2c2.6 0 4.6-2 4.6-4.5S14.6 3.2 12 3.2 7.4 5.2 7.4 7.7s2 4.5 4.6 4.5Zm0 2.3c-4.1 0-7.5 2.4-8.3 5.8-.1.5.2.9.7.9h15.2c.5 0 .8-.4.7-.9-.8-3.4-4.2-5.8-8.3-5.8Z"/></svg>
            </div>
            <div class="author-copy">${nameLine}<div class="post-date">${timeAgo(post.createdAt)}</div></div>
        </a>`;
    }

    function videoMarkup(post) {
        if (post.postType !== 'video' || !post.attachment) return '';
        return `<div class="post-video-wrap"><video class="post-video" controls preload="metadata" src="${escapeHtml(post.attachment.fileUrl)}"></video></div>`;
    }

    function fileMarkup(post) {
        if (post.postType !== 'file' || !post.attachment) return '';
        const sizeKb = post.attachment.fileSize ? Math.round(post.attachment.fileSize / 1024) + ' KB' : '';
        return `<a class="post-file-card" href="${escapeHtml(post.attachment.fileUrl)}" target="_blank" rel="noopener">
            <span class="post-file-icon">📎</span>
            <div class="post-file-info">
                <div class="post-file-name">${escapeHtml(post.attachment.fileName || '')}</div>
                <div class="post-file-size">${escapeHtml(sizeKb)}</div>
            </div>
        </a>`;
    }

    function pollMarkup(post) {
        if (post.postType !== 'poll' || !post.poll) return '';
        const poll = post.poll;
        const total = poll.totalVotes || 0;
        const options = (poll.options || []).map(opt => {
            const pct = total > 0 ? Math.round(opt.voteCount * 100 / total) : 0;
            const voted = opt.isMyVote ? ' voted' : '';
            const fill = poll.hasVoted ? `width:${pct}%` : 'width:0%';
            const pctSpan = poll.hasVoted ? `<span class="poll-option-pct">${pct}%</span>` : '';
            const checkSpan = opt.isMyVote ? `<span class="poll-voted-mark">✓</span>` : '';
            return `<div class="poll-option-bar${voted}" data-option-id="${opt.optionId}">
                <div class="poll-option-fill" style="${fill}"></div>
                <div class="poll-option-inner"><span>${escapeHtml(opt.optionText)}</span><span>${pctSpan}${checkSpan}</span></div>
            </div>`;
        }).join('');
        const voteHint = poll.hasVoted ? '' : '<span style="margin-left:8px;color:#60a5fa;">· 투표하기</span>';
        return `<div class="post-poll-wrap" data-poll-id="${poll.pollId}" data-has-voted="${poll.hasVoted}" data-my-vote="${poll.myVotedOptionId || ''}" data-total="${total}">
            <p class="post-poll-question">${escapeHtml(poll.question)}</p>
            <div class="post-poll-options">${options}</div>
            <div class="poll-meta"><span>${total}명 참여</span>${voteHint}</div>
        </div>`;
    }

    function quizMarkup(post) {
        if (post.postType !== 'quiz' || !post.quiz) return '';
        const quiz = post.quiz;
        const answered = quiz.hasAnswered === true;
        const options = (quiz.options || []).map(opt => {
            let cls = 'quiz-option-btn';
            if (answered) {
                if (opt.isCorrect) cls += ' correct';
                else if (opt.isMyAnswer && !opt.isCorrect) cls += ' wrong my-answer';
                else if (opt.isMyAnswer) cls += ' my-answer';
            }
            return `<button type="button" class="${cls}"${answered ? ' disabled' : ''} data-option-id="${opt.optionId}">${escapeHtml(opt.optionText)}</button>`;
        }).join('');
        let resultBadge = '';
        if (answered) {
            resultBadge = quiz.myAnswerCorrect
                ? '<div><span class="quiz-result-badge correct">✓ 정답!</span></div>'
                : '<div><span class="quiz-result-badge wrong">✗ 오답</span></div>';
        }
        return `<div class="post-quiz-wrap" data-quiz-id="${quiz.quizId}" data-has-answered="${answered}" data-my-answer="${quiz.myAnswerOptionId || ''}" data-my-correct="${quiz.myAnswerCorrect || ''}">
            <p class="post-quiz-question">${escapeHtml(quiz.question)}</p>
            <div class="post-quiz-options">${options}</div>
            ${resultBadge}
        </div>`;
    }

    function typeBadgeMarkup(post) {
        const labels = { video: '🎥 동영상', file: '📎 파일', poll: '☑ 투표', quiz: '❓ 퀴즈' };
        return labels[post.postType] ? `<span class="post-type-badge">${labels[post.postType]}</span>` : '';
    }

    function carouselMarkup(post) {
        const images = Array.isArray(post.images) ? post.images : [];
        if (!images.length) return '';
        const slides = images.map((img) => `<div class="carousel-slide"><img class="carousel-img" src="${escapeHtml(img)}" alt="" loading="lazy"></div>`).join('');
        const dots = images.length > 1
            ? `<div class="carousel-dots">${images.map((_, index) => `<button class="carousel-dot${index === 0 ? ' active' : ''}" data-index="${index}" type="button" aria-label="이미지 이동"></button>`).join('')}</div>`
            : '';
        const buttons = images.length > 1
            ? `<button class="carousel-prev" type="button" aria-label="이전"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
               <button class="carousel-next" type="button" aria-label="다음"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></button>`
            : '';
        return `<div class="post-carousel" data-carousel><div class="carousel-track">${slides}</div>${dots}${buttons}</div>`;
    }

    function moviePosterMarkup(post) {
        if (post.moviePosterUrl) {
            return `<img class="movie-tag-poster" src="${escapeHtml(post.moviePosterUrl)}" alt="${escapeHtml(post.movieTitle)}">`;
        }
        return `<div class="movie-tag-poster-fallback"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="22" y2="7"></line><line x1="2" y1="17" x2="22" y2="17"></line></svg></div>`;
    }

    function renderPost(post) {
        const liked = post.likedByMe === true;
        const following = post.isFollowing === true;
        const followButton = post.isMyPost
            ? ''
            : `<button class="follow-btn${following ? ' following' : ''}" type="button" data-follow-toggle data-login-id="${escapeHtml(post.loginId)}" data-following="${following}"><span>${following ? '팔로잉' : '팔로우'}</span></button>`;
        const content = post.content ? `<p class="post-content">${escapeHtml(post.content)}</p>` : '';
        const editButton = post.isMyPost
            ? `<button class="post-edit-btn" type="button" data-post-id="${post.postId}">수정</button>`
            : '';
        return `<article class="post-card" id="post-${post.postId}" data-content="${escapeHtml(post.content || '')}">
            <header class="post-header">${avatarMarkup(post)}${followButton}</header>
            ${carouselMarkup(post)}
            ${videoMarkup(post)}
            ${fileMarkup(post)}
            ${pollMarkup(post)}
            ${quizMarkup(post)}
            <div class="post-body">
                ${typeBadgeMarkup(post)}
                ${content}
                ${editButton}
                <div class="post-actions">
                    <button class="icon-btn like-btn${liked ? ' liked' : ''}" type="button" data-post-id="${post.postId}" data-liked="${liked}" aria-label="좋아요">
                        <svg viewBox="0 0 24 24" fill="${liked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M12 20s-6.5-4.2-8.3-8A4.7 4.7 0 0 1 8.2 5a4.9 4.9 0 0 1 3.8 1.9A4.9 4.9 0 0 1 15.8 5a4.7 4.7 0 0 1 4.5 7c-1.8 3.8-8.3 8-8.3 8Z"/></svg>
                    </button>
                    <a class="icon-btn comment-link" href="/posts/${post.postId}#comments" aria-label="댓글"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></a>
                    <button class="icon-btn" type="button" disabled aria-label="북마크"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg></button>
                </div>
                <div class="post-engagement">
                    <span>좋아요 <span class="like-count">${post.likeCount || 0}</span>개</span>
                    <span>댓글 <span class="comment-count">${post.commentCount || 0}</span>개</span>
                </div>
                ${post.friendLikedSignal ? `<div class="friend-signal"><span>❤️</span><span>${escapeHtml(post.friendLikedSignal)}</span></div>` : ''}
                <a class="movie-tag-card" href="/movies/${encodeURIComponent(post.movieCode || '')}">
                    ${moviePosterMarkup(post)}
                    <div>
                        <div class="movie-tag-label"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="22" y2="7"></line><line x1="2" y1="17" x2="22" y2="17"></line></svg><span>태그한 영화</span></div>
                        <div class="movie-tag-title">${escapeHtml(post.movieTitle || '영화')}</div>
                    </div>
                </a>
            </div>
        </article>`;
    }

    function initializeCarousel(carousel) {
        if (!carousel || carousel.dataset.carouselReady === 'true') return;
        carousel.dataset.carouselReady = 'true';
        const track = carousel.querySelector('.carousel-track');
        const dots = carousel.querySelectorAll('.carousel-dot');
        const prev = carousel.querySelector('.carousel-prev');
        const next = carousel.querySelector('.carousel-next');
        if (!track) return;
        let current = 0;
        const total = track.children.length;
        function goTo(index) {
            current = (index + total) % total;
            track.style.transform = `translateX(-${current * 100}%)`;
            dots.forEach((dot, i) => dot.classList.toggle('active', i === current));
        }
        prev?.addEventListener('click', () => goTo(current - 1));
        next?.addEventListener('click', () => goTo(current + 1));
        dots.forEach((dot) => dot.addEventListener('click', () => goTo(Number(dot.dataset.index))));
        let startX = 0;
        track.addEventListener('touchstart', (event) => { startX = event.touches[0].clientX; }, { passive: true });
        track.addEventListener('touchend', (event) => {
            const diff = startX - event.changedTouches[0].clientX;
            if (Math.abs(diff) > 40) goTo(diff > 0 ? current + 1 : current - 1);
        });
    }

    function initializeCarousels(root) {
        root.querySelectorAll('[data-carousel]').forEach(initializeCarousel);
    }

    function makeSkelPost() {
        return `<div class="post-card" style="pointer-events:none">
            <header class="post-header" style="margin-bottom:14px">
                <div style="display:flex;align-items:center;gap:12px">
                    <div class="skel" style="width:40px;height:40px;border-radius:50%;flex-shrink:0"></div>
                    <div style="flex:1">
                        <div class="skel" style="width:90px;height:13px;margin-bottom:6px"></div>
                        <div class="skel" style="width:55px;height:11px"></div>
                    </div>
                </div>
            </header>
            <div class="skel" style="width:100%;aspect-ratio:1;border-radius:12px;margin-bottom:14px"></div>
            <div class="skel" style="width:65%;height:13px;margin-bottom:8px"></div>
            <div class="skel" style="width:38%;height:11px"></div>
        </div>`;
    }

    async function loadMore() {
        if (!hasMore || loading || !nextCursor) return;
        loading = true;
        const skelCards = [makeSkelPost(), makeSkelPost()].map((html) => {
            const el = document.createElement('div');
            el.innerHTML = html;
            const card = el.firstElementChild;
            feedList.appendChild(card);
            return card;
        });
        try {
            const response = await fetch(`/api/feed/posts?cursor=${encodeURIComponent(nextCursor)}&limit=10`);
            if (response.status === 401) {
                window.location.href = '/login';
                return;
            }
            if (!response.ok) {
                hasMore = false;
                return;
            }
            const data = await response.json();
            if (Array.isArray(data.posts) && data.posts.length) {
                feedList.insertAdjacentHTML('beforeend', data.posts.map(renderPost).join(''));
                initializeCarousels(feedList);
            }
            hasMore = data.hasMore === true;
            nextCursor = data.nextCursor || '';
        } finally {
            skelCards.forEach((card) => card.remove());
            loading = false;
            status?.classList.remove('visible');
            if (!hasMore && status) {
                status.textContent = '마지막 게시물입니다.';
                status.classList.add('visible');
            }
        }
    }

    function popLike(btn) {
        btn.classList.remove('like-pop');
        void btn.offsetWidth;
        btn.classList.add('like-pop');
        btn.addEventListener('animationend', () => btn.classList.remove('like-pop'), { once: true });
        const colors = ['#f43f5e','#fb923c','#facc15','#f87171','#fda4af','#fb7185'];
        const r = btn.getBoundingClientRect();
        const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
        for (let i = 0; i < 6; i++) {
            const angle = (i / 6) * 2 * Math.PI;
            const dist = 28 + Math.random() * 14;
            const p = document.createElement('div');
            p.className = 'like-particle';
            p.style.cssText = `left:${cx-3.5}px;top:${cy-3.5}px;background:${colors[i]};--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px`;
            document.body.appendChild(p);
            p.addEventListener('animationend', () => p.remove(), { once: true });
        }
    }

    function rollupCount(el, newVal) {
        const oldStr = el.textContent.trim();
        const newStr = String(newVal);
        if (oldStr === newStr) return;
        const going = parseInt(newStr) > parseInt(oldStr) ? 1 : -1;
        const wrap = document.createElement('span');
        wrap.className = 'rollup-wrap';
        wrap.style.minWidth = el.offsetWidth + 'px';
        const oldSpan = document.createElement('span');
        oldSpan.className = 'rollup-old';
        oldSpan.textContent = oldStr;
        const newSpan = document.createElement('span');
        newSpan.className = 'rollup-new';
        newSpan.style.transform = `translateY(${going > 0 ? '100%' : '-100%'})`;
        newSpan.textContent = newStr;
        wrap.appendChild(oldSpan);
        wrap.appendChild(newSpan);
        el.textContent = '';
        el.appendChild(wrap);
        requestAnimationFrame(() => requestAnimationFrame(() => {
            oldSpan.style.transform = `translateY(${going > 0 ? '-100%' : '100%'})`;
            newSpan.style.transform = 'translateY(0)';
        }));
        setTimeout(() => { el.textContent = newStr; }, 320);
    }

    function showDblHeart(carousel, x, y) {
        const heart = document.createElement('span');
        heart.className = 'dbl-heart';
        heart.textContent = '❤️';
        heart.style.left = x + 'px';
        heart.style.top  = y + 'px';
        carousel.appendChild(heart);
        heart.addEventListener('animationend', () => heart.remove(), { once: true });
    }

    document.addEventListener('dblclick', async (event) => {
        const carousel = event.target.closest('.post-carousel');
        if (!carousel) return;
        const card = carousel.closest('.post-card');
        if (!card) return;

        const rect = carousel.getBoundingClientRect();
        showDblHeart(carousel, event.clientX - rect.left, event.clientY - rect.top);

        const likeBtn = card.querySelector('.like-btn[data-post-id]');
        if (!likeBtn || likeBtn.classList.contains('liked')) return;

        const response = await fetch(`/api/posts/${likeBtn.dataset.postId}/like`, { method: 'POST' });
        if (!response.ok) return;
        const data = await response.json();
        if (!data.liked) return;
        likeBtn.classList.add('liked');
        likeBtn.dataset.liked = 'true';
        const svg = likeBtn.querySelector('svg');
        if (svg) svg.setAttribute('fill', 'currentColor');
        const count = card.querySelector('.like-count');
        if (count) rollupCount(count, data.likeCount);
        popLike(likeBtn);
    });

    function startInlineEdit(displayEl, currentText, updateUrl, onSave) {
        if (!displayEl || displayEl.nextElementSibling?.classList.contains('inline-edit-box')) return;
        displayEl.style.display = 'none';
        const box = document.createElement('div');
        box.className = 'inline-edit-box';
        const textarea = document.createElement('textarea');
        textarea.maxLength = 1000;
        textarea.value = currentText || '';
        const actions = document.createElement('div');
        actions.className = 'inline-edit-actions';
        const cancelBtn = document.createElement('button');
        cancelBtn.type = 'button';
        cancelBtn.className = 'inline-edit-cancel';
        cancelBtn.textContent = '취소';
        const saveBtn = document.createElement('button');
        saveBtn.type = 'button';
        saveBtn.className = 'inline-edit-save';
        saveBtn.textContent = '저장';
        actions.append(cancelBtn, saveBtn);
        box.append(textarea, actions);
        displayEl.insertAdjacentElement('afterend', box);
        textarea.focus();

        const close = () => {
            box.remove();
            displayEl.style.display = '';
        };
        cancelBtn.addEventListener('click', close);
        saveBtn.addEventListener('click', async () => {
            const value = textarea.value.trim();
            if (!value) return;
            saveBtn.disabled = true;
            try {
                const response = await fetch(updateUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'content=' + encodeURIComponent(value)
                });
                if (!response.ok) throw new Error();
                const data = await response.json();
                if (!data.ok) throw new Error();
                onSave(value);
                close();
            } catch (_) {
                alert('수정에 실패했습니다.');
                saveBtn.disabled = false;
            }
        });
    }

    document.addEventListener('click', async (event) => {
        const editButton = event.target.closest('.post-edit-btn');
        if (editButton) {
            const card = editButton.closest('.post-card');
            if (!card) return;
            let contentEl = card.querySelector('.post-content');
            if (!contentEl) {
                contentEl = document.createElement('p');
                contentEl.className = 'post-content';
                editButton.insertAdjacentElement('beforebegin', contentEl);
            }
            startInlineEdit(contentEl, card.dataset.content || '', `/api/posts/${editButton.dataset.postId}/update`, (value) => {
                contentEl.textContent = value;
                card.dataset.content = value;
            });
            return;
        }

        const likeButton = event.target.closest('.like-btn[data-post-id]');
        if (likeButton) {
            const response = await fetch(`/api/posts/${likeButton.dataset.postId}/like`, { method: 'POST' });
            if (response.status === 401) {
                window.location.href = '/login';
                return;
            }
            if (!response.ok) return;
            const data = await response.json();
            likeButton.classList.toggle('liked', data.liked);
            likeButton.dataset.liked = String(data.liked);
            if (data.liked) popLike(likeButton);
            const svg = likeButton.querySelector('svg');
            if (svg) svg.setAttribute('fill', data.liked ? 'currentColor' : 'none');
            const count = likeButton.closest('.post-card')?.querySelector('.like-count');
            if (count) rollupCount(count, data.likeCount);
            return;
        }

        const followButton = event.target.closest('[data-follow-toggle]');
        if (followButton) {
            const following = followButton.dataset.following === 'true';
            const endpoint = following ? '/api/people/unfollow' : '/api/people/follow';
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ loginId: followButton.dataset.loginId })
            });
            if (response.status === 401) { window.location.href = '/login'; return; }
            if (!response.ok) return;
            const payload = await response.json();
            document.querySelectorAll(`[data-follow-toggle][data-login-id="${payload.loginId}"]`).forEach((button) => {
                button.dataset.following = String(payload.followingByCurrentUser);
                button.classList.toggle('following', payload.followingByCurrentUser);
                const label = button.querySelector('span');
                if (label) label.textContent = payload.followingByCurrentUser ? '팔로잉' : '팔로우';
            });
            return;
        }

        // Poll vote
        const pollBar = event.target.closest('.poll-option-bar');
        if (pollBar) {
            const wrap = pollBar.closest('.post-poll-wrap');
            if (!wrap || wrap.dataset.hasVoted === 'true') return;
            const pollId = wrap.dataset.pollId;
            const optionId = pollBar.dataset.optionId;
            const response = await fetch(`/api/polls/${pollId}/vote`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ optionId })
            });
            if (response.status === 401) { window.location.href = '/login'; return; }
            if (!response.ok) return;
            const data = await response.json();
            wrap.dataset.hasVoted = 'true';
            wrap.dataset.myVote = data.votedOptionId;
            wrap.dataset.total = data.totalVotes;
            const total = data.totalVotes;
            const optionMap = {};
            data.options.forEach(o => { optionMap[o.optionId] = o.voteCount; });
            wrap.querySelectorAll('.poll-option-bar').forEach(bar => {
                const oid = bar.dataset.optionId;
                const cnt = optionMap[oid] || 0;
                const pct = total > 0 ? Math.round(cnt * 100 / total) : 0;
                bar.querySelector('.poll-option-fill').style.width = pct + '%';
                const pctEl = bar.querySelector('.poll-option-pct');
                if (pctEl) pctEl.textContent = pct + '%';
                else {
                    const inner = bar.querySelector('.poll-option-inner');
                    if (inner) inner.insertAdjacentHTML('beforeend', `<span class="poll-option-pct">${pct}%</span>`);
                }
                if (String(oid) === String(data.votedOptionId)) {
                    bar.classList.add('voted');
                    if (!bar.querySelector('.poll-voted-mark')) {
                        const inner = bar.querySelector('.poll-option-inner span:last-child');
                        if (inner) inner.insertAdjacentHTML('beforeend', '<span class="poll-voted-mark">✓</span>');
                    }
                }
            });
            const meta = wrap.querySelector('.poll-meta');
            if (meta) meta.innerHTML = `<span>${total}명 참여</span>`;
            return;
        }

        // Quiz answer
        const quizBtn = event.target.closest('.quiz-option-btn');
        if (quizBtn) {
            const wrap = quizBtn.closest('.post-quiz-wrap');
            if (!wrap || wrap.dataset.hasAnswered === 'true') return;
            const quizId = wrap.dataset.quizId;
            const optionId = quizBtn.dataset.optionId;
            const response = await fetch(`/api/quizzes/${quizId}/answer`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ optionId })
            });
            if (response.status === 401) { window.location.href = '/login'; return; }
            if (response.status === 400) return;
            if (!response.ok) return;
            const data = await response.json();
            wrap.dataset.hasAnswered = 'true';
            wrap.querySelectorAll('.quiz-option-btn').forEach(btn => {
                btn.disabled = true;
                const oid = String(btn.dataset.optionId);
                const opt = data.options.find(o => String(o.optionId) === oid);
                if (!opt) return;
                if (opt.isCorrect) btn.classList.add('correct');
                if (String(oid) === String(data.answeredOptionId) && !opt.isCorrect) { btn.classList.add('wrong'); btn.classList.add('my-answer'); }
            });
            const resultEl = document.createElement('div');
            resultEl.innerHTML = data.isCorrect
                ? '<span class="quiz-result-badge correct">✓ 정답!</span>'
                : '<span class="quiz-result-badge wrong">✗ 오답</span>';
            wrap.querySelector('.post-quiz-options').after(resultEl);
            return;
        }
    });

    initializeCarousels(document);
    const observer = new IntersectionObserver((entries) => {
        if (entries.some((entry) => entry.isIntersecting)) loadMore();
    }, { rootMargin: '520px 0px' });
    observer.observe(sentinel);
})();
</script>
</body>
</html>
