<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyPage | CineMatch</title>
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <style>
        :root {
            --blue: #0048FF;
            --blue-dark: #003AD1;
            --blue-soft: #EEF2FF;
            --blue-mid: #C7D2FE;
            --bg: #F7F8FC;
            --surface: #FFFFFF;
            --text: #0F172A;
            --text-sub: #475569;
            --text-hint: #94A3B8;
            --border: rgba(15,23,42,0.08);
            --shadow-sm: 0 2px 8px rgba(0,72,255,0.06);
            --shadow-md: 0 12px 32px rgba(0,72,255,0.10);
            --shadow-lg: 0 20px 48px rgba(0,72,255,0.14);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Pretendard', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        .navbar {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 32px; height: 64px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        .back-btn, .logout-btn {
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .back-btn { color: var(--blue); }
        .navbar-right { display: flex; align-items: center; gap: 12px; }
        .user-badge {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 14px; background: var(--blue-soft);
            border-radius: 999px; font-size: 0.875rem; font-weight: 600; color: var(--blue);
            text-decoration: none; transition: background 0.15s, transform 0.15s;
        }
        .user-badge:hover { background: #dfe7ff; transform: translateY(-1px); }
        .logout-btn {
            color: white;
            background: var(--text);
            padding: 8px 18px;
            border-radius: 999px;
        }
        .page {
            max-width: 1280px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }
        .hero {
            padding: 34px;
            border-radius: 28px;
            background: linear-gradient(135deg, #0048FF 0%, #2563EB 60%, #0EA5E9 100%);
            color: white;
            box-shadow: var(--shadow-md);
            margin-bottom: 26px;
        }
        .hero p {
            opacity: 0.78;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-size: 0.78rem;
            font-weight: 700;
        }
        .hero h1 {
            font-size: clamp(2rem, 4vw, 2.8rem);
            line-height: 1.1;
            letter-spacing: -0.04em;
            margin-bottom: 8px;
        }
        .hero span {
            display: block;
            font-size: 1rem;
            color: rgba(255,255,255,0.82);
        }
        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 34px;
        }
        .profile-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 22px;
            box-shadow: 0 6px 20px rgba(15,23,42,0.05);
        }
        .profile-card h2 {
            color: var(--text-sub);
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .profile-card p {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--text);
        }
        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
        }
        .section-head h2 {
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: -0.03em;
        }
        .section-head span {
            color: var(--text-hint);
            font-size: 0.92rem;
        }
        .more-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background: var(--blue);
            color: white;
            font-size: 1.4rem;
            font-weight: 700;
            box-shadow: 0 8px 18px rgba(0,72,255,0.25);
        }
        .search-toggle-btn {
            width: auto;
            padding: 0 16px;
            border-radius: 999px;
            font-size: 0.92rem;
        }
        .stored-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 18px;
        }
        .card {
            display: block;
            text-decoration: none;
            color: inherit;
            border-radius: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: transform 220ms cubic-bezier(0.34,1.56,0.64,1), box-shadow 220ms ease, border-color 220ms ease;
        }
        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--shadow-lg);
            border-color: var(--blue-mid);
        }
        .card-poster-wrap {
            position: relative;
            aspect-ratio: 2/3;
            overflow: hidden;
        }
        .poster {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .poster-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, #EEF2FF, #DBEAFE);
            color: var(--blue);
            font-size: 0.82rem;
            font-weight: 700;
            text-align: center;
            padding: 16px;
        }
        .poster-fallback svg { width: 32px; height: 32px; opacity: 0.35; }
        .rank-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 2;
            width: 32px;
            height: 32px;
            background: var(--blue);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78rem;
            font-weight: 900;
            box-shadow: 0 2px 10px rgba(0,72,255,0.45);
        }
        .card-body { padding: 13px 14px 15px; }
        .card-title {
            font-size: 0.92rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.4;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-sub {
            font-size: 0.78rem;
            color: var(--text-hint);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .empty-panel {
            padding: 36px;
            border: 1px dashed var(--blue-mid);
            border-radius: 20px;
            background: rgba(255,255,255,0.72);
            color: var(--text-hint);
            text-align: center;
        }
        .section-block { margin-bottom: 34px; }
        .search-panel {
            margin-top: 18px;
            padding: 22px;
            border-radius: 22px;
            background: linear-gradient(135deg, #ffffff 0%, #eff6ff 100%);
            border: 1px solid var(--blue-mid);
            box-shadow: var(--shadow-sm);
        }
        .search-panel form {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
        }
        .search-panel input[type="text"] {
            flex: 1;
            padding: 13px 16px;
            border: 1.5px solid var(--border);
            border-radius: 14px;
            background: white;
            font: inherit;
            outline: none;
        }
        .search-panel input[type="text"]:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(0,72,255,0.12);
        }
        .search-btn, .close-btn, .add-life-btn {
            border: none;
            border-radius: 14px;
            font: inherit;
            font-weight: 800;
            cursor: pointer;
        }
        .search-btn {
            padding: 0 18px;
            background: var(--blue);
            color: white;
        }
        .close-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            background: #e2e8f0;
            color: var(--text-sub);
            text-decoration: none;
        }
        .search-results {
            display: grid;
            gap: 12px;
        }
        .search-result {
            display: grid;
            grid-template-columns: 58px 1fr auto;
            gap: 14px;
            align-items: center;
            padding: 14px;
            border-radius: 16px;
            background: white;
            border: 1px solid rgba(15,23,42,0.08);
        }
        .search-result-poster {
            width: 58px;
            aspect-ratio: 2/3;
            border-radius: 12px;
            object-fit: cover;
            background: #e2e8f0;
        }
        .search-result-title {
            font-size: 0.95rem;
            font-weight: 800;
            margin-bottom: 3px;
        }
        .search-result-sub {
            font-size: 0.8rem;
            color: var(--text-hint);
        }
        .add-life-btn {
            width: 42px;
            height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--blue);
            color: white;
            box-shadow: 0 8px 18px rgba(0,72,255,0.22);
        }
        .add-life-btn[disabled] {
            background: #cbd5e1;
            box-shadow: none;
            cursor: default;
        }
        .search-empty {
            padding: 18px;
            color: var(--text-hint);
            text-align: center;
            border: 1px dashed var(--blue-mid);
            border-radius: 16px;
            background: rgba(255,255,255,0.7);
        }
        @media (max-width: 1080px) {
            .stored-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        }
        @media (max-width: 640px) {
            .navbar { padding: 0 16px; }
            .page { padding: 24px 16px 56px; }
            .hero { padding: 24px; }
            .stored-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
            .search-panel form { flex-wrap: wrap; }
            .search-btn { height: 44px; }
            .search-result { grid-template-columns: 50px 1fr auto; gap: 10px; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <a class="back-btn" th:href="@{/charts}">차트로 돌아가기</a>
    <div class="navbar-right">
        <a class="user-badge" th:href="@{/mypage}">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            <span th:text="${loginUserNickname}">nickname</span>
        </a>
        <a class="logout-btn" th:href="@{/logout}">로그아웃</a>
    </div>
</nav>

<main class="page">
    <section class="hero">
        <p>MyPage</p>
        <h1 th:text="${userProfile.nickname}">nickname</h1>
        <span th:text="|아이디 ${userProfile.loginId}|">아이디 user</span>
    </section>

    <section class="profile-grid">
        <article class="profile-card">
            <h2>NickName</h2>
            <p th:text="${userProfile.nickname}">nickname</p>
        </article>
    </section>

    <section class="section-block">
        <div class="section-head">
            <div>
                <h2>나의 인생영화</h2>
                <span>내 취향을 가장 잘 보여주는 영화</span>
            </div>
            <a class="more-btn search-toggle-btn" th:href="@{/mypage(showLifeSearch=true)}" aria-label="인생영화 검색 열기">영화 검색/추가</a>
        </div>

        <div class="stored-grid" th:if="${!#lists.isEmpty(lifeMovies)}">
            <a class="card" th:each="movie : ${lifeMovies}" th:href="@{|/movies/${movie.movieCode}|}">
                <div class="card-poster-wrap">
                    <div class="rank-badge" th:text="${movie.ranking}">1</div>
                    <img class="poster"
                         th:if="${!#strings.isEmpty(movie.posterImageUrl)}"
                         th:src="${movie.posterImageUrl}"
                         th:alt="${movie.movieName}">
                    <div class="poster-fallback" th:if="${#strings.isEmpty(movie.posterImageUrl)}">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M18 4H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2zM8 8h3v4H8V8zm0 6h8v1H8v-1zm0 2h8v1H8v-1zm5-8h3v4h-3V8z"/>
                        </svg>
                        <span th:text="${movie.movieName}">영화 제목</span>
                    </div>
                </div>
                <div class="card-body">
                    <p class="card-title" th:text="${movie.movieName}">영화 제목</p>
                    <p class="card-sub" th:text="${#strings.isEmpty(movie.movieNameEn) ? movie.movieCode : movie.movieNameEn}">movie</p>
                </div>
            </a>
        </div>

        <div class="empty-panel" th:if="${#lists.isEmpty(lifeMovies)}">
            아직 인생영화가 없습니다. + 버튼을 눌러 검색해서 추가해보세요.
        </div>

        <div class="search-panel" th:if="${showLifeSearch}">
            <form th:action="@{/mypage}" method="get">
                <input type="hidden" name="showLifeSearch" value="true">
                <input type="text" name="lifeQuery" th:value="${lifeQuery}" placeholder="영화 제목 또는 영문 제목으로 검색">
                <button class="search-btn" type="submit">검색</button>
                <a class="close-btn" th:href="@{/mypage}" aria-label="검색 닫기">×</a>
            </form>

            <div class="search-results" th:if="${!#lists.isEmpty(lifeSearchResults)}">
                <div class="search-result" th:each="result : ${lifeSearchResults}">
                    <img class="search-result-poster"
                         th:if="${!#strings.isEmpty(result.posterImageUrl)}"
                         th:src="${result.posterImageUrl}"
                         th:alt="${result.movieName}">
                    <div class="search-result-poster poster-fallback" th:if="${#strings.isEmpty(result.posterImageUrl)}">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M18 4H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2zM8 8h3v4H8V8zm0 6h8v1H8v-1zm0 2h8v1H8v-1zm5-8h3v4h-3V8z"/>
                        </svg>
                    </div>
                    <div>
                        <div class="search-result-title" th:text="${result.movieName}">영화 제목</div>
                        <div class="search-result-sub"
                             th:text="${#strings.isEmpty(result.movieNameEn) ? result.movieCode : result.movieNameEn}">movie</div>
                    </div>
                    <form th:action="@{/mypage/life}" method="post">
                        <input type="hidden" name="movieCode" th:value="${result.movieCode}">
                        <button class="add-life-btn" type="submit" th:disabled="${result.alreadyAdded}" th:attr="aria-label=${result.alreadyAdded ? '이미 추가됨' : '인생영화 추가'}">
                            <span th:text="${result.alreadyAdded} ? '✓' : '+'">+</span>
                        </button>
                    </form>
                </div>
            </div>

            <div class="search-empty" th:if="${#lists.isEmpty(lifeSearchResults)} and ${!#strings.isEmpty(lifeQuery)}">
                검색 결과가 없습니다.
            </div>
            <div class="search-empty" th:if="${#lists.isEmpty(lifeSearchResults)} and ${#strings.isEmpty(lifeQuery)}">
                추가하고 싶은 영화를 검색해보세요.
            </div>
        </div>
    </section>

    <section>
        <div class="section-head">
            <div>
                <h2>내가 찜한 영화</h2>
                <span th:text="|총 ${storedMovieCount}편|">총 0편</span>
            </div>
            <a class="more-btn" th:href="@{/stored}" aria-label="찜한 영화 전체 보기">+</a>
        </div>

        <div class="stored-grid" th:if="${!#lists.isEmpty(storedMovies)}">
            <a class="card" th:each="movie : ${storedMovies}" th:href="@{|/movies/${movie.movieCode}|}">
                <div class="card-poster-wrap">
                    <div class="rank-badge" th:text="${movie.ranking}">1</div>
                    <img class="poster"
                         th:if="${!#strings.isEmpty(movie.posterImageUrl)}"
                         th:src="${movie.posterImageUrl}"
                         th:alt="${movie.movieName}">
                    <div class="poster-fallback" th:if="${#strings.isEmpty(movie.posterImageUrl)}">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M18 4H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2zM8 8h3v4H8V8zm0 6h8v1H8v-1zm0 2h8v1H8v-1zm5-8h3v4h-3V8z"/>
                        </svg>
                        <span th:text="${movie.movieName}">영화 제목</span>
                    </div>
                </div>
                <div class="card-body">
                    <p class="card-title" th:text="${movie.movieName}">영화 제목</p>
                    <p class="card-sub" th:text="${#strings.isEmpty(movie.movieNameEn) ? movie.movieCode : movie.movieNameEn}">movie</p>
                </div>
            </a>
        </div>

        <div class="empty-panel" th:if="${#lists.isEmpty(storedMovies)}">
            아직 찜한 영화가 없습니다. 영화 상세 페이지에서 북마크 버튼으로 저장해보세요.
        </div>
    </section>
</main>
</body>
</html>
