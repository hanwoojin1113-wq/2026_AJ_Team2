spring.application.name=login
spring.profiles.active=local
spring.datasource.url=jdbc:h2:file:./data/kobisdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
spring.h2.console.settings.trace=false
spring.sql.init.mode=never
kobis.poster-fetch.enabled=false
kobis.base-url=https://www.kobis.or.kr/kobisopenapi/webservice/rest
kobis.api-key=${KOBIS_API_KEY:}
kobis.connect-timeout-ms=5000
kobis.read-timeout-ms=10000
tmdb.base-url=https://api.themoviedb.org/3
tmdb.token=${TMDB_TOKEN:}
app.schema-bootstrap.enabled=true
app.csv-init.enabled=false
app.startup-sync.enabled=false
app.startup-sync.import-existing-limit=200
app.startup-sync.kobis-start-year=2016
app.startup-sync.kobis-end-year=2025
app.startup-sync.kobis-target-per-year=20

# 파일 업로드 설정
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 업로드 파일 저장 경로 (프로젝트 루트 기준)
app.upload.dir=uploads
